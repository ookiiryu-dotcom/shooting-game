<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>スマホ対応シューティングゲーム</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #111;
  color: white;
  font-family: sans-serif;
  text-align: center;
}

h1 {
  margin: 14px 0 6px;
  font-size: 24px;
}

p {
  margin: 6px 0 12px;
  font-size: 14px;
}

.game-area {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 18px;
  padding: 0 12px 20px;
}

.play-area {
  display: flex;
  flex-direction: column;
  align-items: center;
}

canvas {
  background: #000;
  border: 3px solid #fff;
  width: 400px;
  max-width: 100%;
  height: auto;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 14px 0 0;
  flex-wrap: wrap;
}

.controls button {
  min-width: 74px;
  height: 54px;
  border: none;
  border-radius: 12px;
  background: #333;
  color: white;
  font-size: 18px;
  font-weight: bold;
}

.controls .shot {
  min-width: 104px;
  background: #b22222;
}

.controls .reset {
  min-width: 104px;
  background: #1f5fbf;
}

.score-board {
  width: 180px;
  background: #1e1e1e;
  border: 1px solid #444;
  border-radius: 10px;
  padding: 12px;
  text-align: left;
}

.score-board h2 {
  margin: 0 0 10px;
  font-size: 18px;
  text-align: center;
}

.score-board ol {
  margin: 0;
  padding-left: 24px;
}

.score-board li {
  margin-bottom: 6px;
  font-size: 15px;
}

@media (max-width: 700px) {
  .game-area {
    flex-direction: column;
    align-items: center;
  }

  .play-area {
    width: 100%;
  }

  canvas {
    width: 96vw;
    max-width: 400px;
  }

  .controls {
    width: 96vw;
    max-width: 400px;
  }

  .controls button {
    flex: 1;
    min-width: 70px;
  }

  .controls .shot,
  .controls .reset {
    flex: 1.2;
  }

  .score-board {
    width: 96vw;
    max-width: 400px;
    margin-top: 6px;
  }
}
</style>
</head>

<body>

<h1>シューティングゲーム</h1>
<p>PC：← → で移動 / Spaceで弾 / Rでリセット</p>

<div class="game-area">

  <div class="play-area">

    <canvas id="game" width="400" height="500"></canvas>

    <div class="controls">
      <button id="leftBtn">←</button>
      <button id="shotBtn" class="shot">SHOT</button>
      <button id="rightBtn">→</button>
      <button id="resetBtn" class="reset">RESET</button>
    </div>

  </div>

  <div class="score-board">
    <h2>High Scores</h2>
    <ol id="highScores"></ol>
  </div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const highScoresList = document.getElementById("highScores");

const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");
const shotBtn = document.getElementById("shotBtn");
const resetBtn = document.getElementById("resetBtn");

let player;
let bullets;
let enemies;
let keys;
let score;
let gameOver;
let enemyTimer;
let enemyBaseSpeed;
let gameStartTime;
let scoreSaved;

function resetGame() {
  player = {
    x: 180,
    y: 440,
    width: 40,
    height: 40,
    speed: 5
  };

  bullets = [];
  enemies = [];
  keys = {};
  score = 0;
  gameOver = false;
  enemyBaseSpeed = 2;
  gameStartTime = Date.now();
  scoreSaved = false;

  clearInterval(enemyTimer);
  enemyTimer = setInterval(createEnemy, 900);
}

function getHighScores() {
  const data = localStorage.getItem("shootingHighScores");
  return data ? JSON.parse(data) : [];
}

function saveHighScore() {
  if (scoreSaved) return;

  let scores = getHighScores();
  scores.push(score);
  scores.sort((a, b) => b - a);
  scores = scores.slice(0, 10);

  localStorage.setItem("shootingHighScores", JSON.stringify(scores));
  scoreSaved = true;
  showHighScores();
}

function showHighScores() {
  const scores = getHighScores();
  highScoresList.innerHTML = "";

  for (let i = 0; i < 10; i++) {
    const li = document.createElement("li");
    li.textContent = scores[i] !== undefined ? scores[i] + " 点" : "-";
    highScoresList.appendChild(li);
  }
}

function shoot() {
  if (gameOver) return;

  bullets.push({
    x: player.x + player.width / 2 - 3,
    y: player.y,
    width: 6,
    height: 12,
    speed: 7
  });
}

document.addEventListener("keydown", e => {
  keys[e.code] = true;

  if (e.code === "Space") {
    shoot();
  }

  if (e.code === "KeyR") {
    resetGame();
  }
});

document.addEventListener("keyup", e => {
  keys[e.code] = false;
});

function createEnemy() {
  if (gameOver) return;

  const elapsed = Math.floor((Date.now() - gameStartTime) / 10000);
  enemyBaseSpeed = 2 + elapsed * 0.4;

  enemies.push({
    x: Math.random() * (canvas.width - 40),
    y: -40,
    width: 40,
    height: 40,
    speed: enemyBaseSpeed + Math.random()
  });
}

function update() {
  if (gameOver) return;

  if (keys["ArrowLeft"] && player.x > 0) {
    player.x -= player.speed;
  }

  if (keys["ArrowRight"] && player.x < canvas.width - player.width) {
    player.x += player.speed;
  }

  bullets.forEach(bullet => {
    bullet.y -= bullet.speed;
  });

  enemies.forEach(enemy => {
    enemy.y += enemy.speed;
  });

  bullets = bullets.filter(bullet => bullet.y > -20);

  enemies.forEach(enemy => {
    if (enemy.y > canvas.height) {
      gameOver = true;
      saveHighScore();
    }
  });

  enemies.forEach(enemy => {
    if (
      enemy.x < player.x + player.width &&
      enemy.x + enemy.width > player.x &&
      enemy.y < player.y + player.height &&
      enemy.y + enemy.height > player.y
    ) {
      gameOver = true;
      saveHighScore();
    }
  });

  bullets.forEach((bullet, bulletIndex) => {
    enemies.forEach((enemy, enemyIndex) => {
      if (
        bullet.x < enemy.x + enemy.width &&
        bullet.x + bullet.width > enemy.x &&
        bullet.y < enemy.y + enemy.height &&
        bullet.y + bullet.height > enemy.y
      ) {
        bullets.splice(bulletIndex, 1);
        enemies.splice(enemyIndex, 1);
        score++;
      }
    });
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "cyan";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  ctx.fillStyle = "yellow";
  bullets.forEach(bullet => {
    ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
  });

  ctx.fillStyle = "red";
  enemies.forEach(enemy => {
    ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
  });

  ctx.fillStyle = "white";
  ctx.font = "20px sans-serif";
  ctx.fillText("Score: " + score, 10, 30);

  ctx.font = "16px sans-serif";
  ctx.fillText("Speed: " + enemyBaseSpeed.toFixed(1), 10, 55);

  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "40px sans-serif";
    ctx.fillText("GAME OVER", 80, 230);

    ctx.font = "20px sans-serif";
    ctx.fillText("RESETボタンで再開", 115, 280);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function pressKey(code) {
  keys[code] = true;
}

function releaseKey(code) {
  keys[code] = false;
}

function addHoldButton(button, code) {
  button.addEventListener("touchstart", e => {
    e.preventDefault();
    pressKey(code);
  });

  button.addEventListener("touchend", e => {
    e.preventDefault();
    releaseKey(code);
  });

  button.addEventListener("mousedown", () => {
    pressKey(code);
  });

  button.addEventListener("mouseup", () => {
    releaseKey(code);
  });

  button.addEventListener("mouseleave", () => {
    releaseKey(code);
  });
}

addHoldButton(leftBtn, "ArrowLeft");
addHoldButton(rightBtn, "ArrowRight");

shotBtn.addEventListener("touchstart", e => {
  e.preventDefault();
  shoot();
});

shotBtn.addEventListener("click", () => {
  shoot();
});

resetBtn.addEventListener("touchstart", e => {
  e.preventDefault();
  resetGame();
});

resetBtn.addEventListener("click", () => {
  resetGame();
});

showHighScores();
resetGame();
gameLoop();
</script>

</body>
</html>
