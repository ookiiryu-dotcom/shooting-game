<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CYBER QUOKKA FIGHTER EX7.1</title>

<style>
*{box-sizing:border-box;}
html{touch-action:manipulation;}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top,#15243a,#03060d 72%),
    linear-gradient(180deg,#050914,#020409);
  color:white;
  font-family:Arial,"Yu Gothic",sans-serif;
  text-align:center;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,255,255,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,255,.035) 1px,transparent 1px);
  background-size:42px 42px;
  pointer-events:none;
}
h1{
  margin:18px 0 6px;
  color:#66ccff;
  letter-spacing:2px;
  text-shadow:0 0 10px #66ccff,0 0 28px rgba(102,204,255,.8);
}
p{
  margin:6px 12px 14px;
  color:#d9ecff;
  line-height:1.6;
}
.top-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:14px;
  flex-wrap:wrap;
}
.top-buttons button,
.top-buttons a{
  width:160px;
  height:46px;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:bold;
  color:white;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.reset-btn{background:#1f5fbf;}
.back-btn{
  background:#222;
  border:1px solid #66ccff;
}
.game-layout{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:18px;
  padding:0 12px 24px;
}
.game-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}
canvas{
  width:760px;
  max-width:96vw;
  height:auto;
  background:linear-gradient(to bottom,#09111f,#02040a);
  border:2px solid #66ccff;
  box-shadow:0 0 22px rgba(102,204,255,.9),inset 0 0 24px rgba(0,255,255,.10);
}
.controls{
  width:760px;
  max-width:96vw;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:14px;
}
.control-side{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:68px 68px;
  gap:10px;
}
#specialBtn{grid-column:1/3;}
.controls button{
  border:none;
  border-radius:15px;
  color:white;
  font-size:15px;
  font-weight:bold;
  background:#1a1a1a;
  border:1px solid #66ccff;
  box-shadow:0 0 10px rgba(0,255,255,.28);
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.move{background:#2a2a2a!important;}
.attack{background:#992222!important;}
.guard{background:#224499!important;}
.special{background:#7d2cff!important;}
.score-board{
  width:285px;
  background:rgba(10,20,35,.95);
  border:1px solid #66ccff;
  border-radius:14px;
  padding:14px;
  text-align:left;
  box-shadow:0 0 15px rgba(0,255,255,.2);
}
.score-board h2{
  text-align:center;
  color:#66ccff;
  margin-top:4px;
}
.score-board ol{padding-left:24px;}
.score-board li{
  margin-bottom:8px;
  color:#eee;
  font-size:14px;
}
.score-note{
  font-size:12px;
  color:#aaa;
  text-align:center;
  line-height:1.6;
}
.command-list{
  margin-top:14px;
  border-top:1px solid rgba(102,204,255,.35);
  padding-top:12px;
  font-size:13px;
  line-height:1.7;
  color:#dcecff;
}

@media(max-width:920px){
  .game-layout{
    flex-direction:column;
    align-items:center;
  }
  .score-board{
    width:96vw;
    max-width:760px;
  }
  .controls{
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .control-side{
    grid-template-rows:62px 62px;
    gap:8px;
  }
  .controls button{
    font-size:13px;
    border-radius:13px;
  }
}

@media(max-width:520px){
  body{padding-bottom:18px;}
  h1{
    font-size:23px;
    letter-spacing:1.5px;
    margin-top:14px;
  }
  p{
    font-size:12px;
    line-height:1.45;
    margin:4px 12px 10px;
  }
  .top-buttons{
    gap:8px;
    margin-bottom:10px;
  }
  .top-buttons button,
  .top-buttons a{
    width:46vw;
    max-width:190px;
    height:48px;
    font-size:15px;
    border-radius:16px;
  }
  .game-layout{
    padding:0 8px 18px;
    gap:12px;
  }
  canvas{
    width:96vw;
    max-width:96vw;
  }
  .controls{
    width:96vw;
    max-width:96vw;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    grid-template-rows:56px 56px 62px;
    gap:8px;
    margin-top:10px;
  }
  .control-side{display:contents;}
  #leftBtn{grid-column:1;grid-row:1;}
  #rightBtn{grid-column:2;grid-row:1;}
  #attackBtn{grid-column:3;grid-row:1;}
  #jumpBtn{grid-column:1;grid-row:2;}
  #dashBtn{grid-column:2;grid-row:2;}
  #guardBtn{grid-column:3;grid-row:2;}
  #specialBtn{grid-column:1/4;grid-row:3;}
  .controls button{
    min-height:0;
    height:100%;
    font-size:13px;
    border-radius:14px;
    padding:0 4px;
  }
  .score-board{
    margin-top:0;
    padding:12px;
  }
  .score-board h2{font-size:28px;}
  .command-list{display:none;}
}

@media(max-width:380px){
  h1{font-size:20px;}
  .controls{
    grid-template-rows:52px 52px 58px;
    gap:7px;
  }
  .controls button{font-size:12px;}
  .top-buttons button,
  .top-buttons a{
    height:44px;
    font-size:14px;
  }
}
</style>
</head>

<body>

<h1>CYBER QUOKKA FIGHTER EX7.1</h1>
<p>← → 移動 / ↑ ジャンプ / Z 攻撃 / X ガード / Z+X 投げ / C 必殺技 / Shift 回避</p>

<div class="top-buttons">
  <button id="resetBtn" class="reset-btn">RESET</button>
  <a href="index.html" class="back-btn">← ホームへ戻る</a>
</div>

<div class="game-layout">
  <div class="game-wrap">
    <canvas id="game" width="760" height="460"></canvas>

    <div class="controls">
      <div class="control-side move-side">
        <button id="leftBtn" class="move">← LEFT</button>
        <button id="rightBtn" class="move">RIGHT →</button>
        <button id="jumpBtn" class="move">JUMP ↑</button>
        <button id="dashBtn" class="move">回避 SHIFT</button>
      </div>

      <div class="control-side attack-side">
        <button id="attackBtn" class="attack">攻撃 Z</button>
        <button id="guardBtn" class="guard">防御 X</button>
        <button id="specialBtn" class="special">必殺技 C</button>
      </div>
    </div>
  </div>

  <div class="score-board">
    <h2>High Scores</h2>
    <ol id="highScores"></ol>
    <div class="score-note">
      勝利した最高LEVELを保存します
    </div>

  </div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const FLOOR_Y=372;
const GRAVITY=.72;
const SCORE_KEY="cyberQuokkaFighterEX71HighScores";

const SKILL_CONFIG={
  input:{
    throwWindow:4
  },
  normal:{
    playerDamage:12,
    enemyBaseDamage:10,
    enemyLevelScale:0
  },
  special:{
    playerDamage:34,
    enemyBaseDamage:24,
    enemyLevelScale:0,
    cost:60
  },
  throw:{
    timer:24,
    hitFrame:11,
    range:56,
    height:58,
    offsetY:24,
    playerDamage:18,
    enemyBaseDamage:14,
    enemyLevelScale:0,
    knockbackX:10,
    knockbackY:-3.6,
    lockout:18,
    grabbedFreeze:12,
    knockdown:46,
    throwInvuln:45,
    afterWakeInvuln:60
  },
  parry:{
    window:5,
    attackerStun:15,
    hitStop:8,
    energyGain:18
  }
};

let keys={};
let player;
let enemy;
let effects=[];
let particles=[];
let hitStop=0;
let screenShake=0;
let screenFlash=0;
let finishTimer=0;
let finishText="";
let level=1;
let defeatedLevel=0;
let gameStarted=false;
let gameOver=false;
let scoreSaved=false;
let highScores=loadHighScores();

let frameCount=0;
let lastAttackPressFrame=-999;
let lastGuardPressFrame=-999;
let pendingAttackTimer=0;
let pendingGuardTimer=0;
let attackTouchHeld=false;
let guardTouchHeld=false;
let throwInputLock=false;

let combo={
  count:0,
  timer:0,
  owner:null,
  max:0
};

function loadHighScores(){
  const data=localStorage.getItem(SCORE_KEY);
  if(!data)return [];
  try{
    const parsed=JSON.parse(data);
    return Array.isArray(parsed)?parsed.filter(v=>Number.isFinite(v)).slice(0,10):[];
  }catch(e){
    return [];
  }
}

function saveHighScores(){
  localStorage.setItem(SCORE_KEY,JSON.stringify(highScores));
}

function addHighScore(score){
  if(score<=0){
    displayHighScores();
    return;
  }
  highScores.push(score);
  highScores.sort((a,b)=>b-a);
  highScores=highScores.slice(0,10);
  saveHighScores();
  displayHighScores();
}

function displayHighScores(){
  const list=document.getElementById("highScores");
  list.innerHTML="";
  if(highScores.length===0){
    const li=document.createElement("li");
    li.textContent="まだスコアなし";
    list.appendChild(li);
    return;
  }
  highScores.forEach((score,index)=>{
    const li=document.createElement("li");
    li.textContent=(index+1)+"位：LEVEL "+score+" まで勝利";
    list.appendChild(li);
  });
}

function makeFighter(x,y,w,h,face,isPlayer){
  return{
    x:x,
    y:y,
    vx:0,
    vy:0,
    width:w,
    height:h,
    face:face,
    hp:isPlayer?100:115+level*22,
    maxHp:isPlayer?100:115+level*22,
    energy:0,
    maxEnergy:100,
    guardGauge:isPlayer?100:92+level*3,
    maxGuardGauge:isPlayer?100:92+level*3,
    guardBreakTimer:0,
    guardRegenDelay:0,
    parryTimer:0,
    onGround:true,
    attackTimer:0,
    attackHitDone:false,
    throwTimer:0,
    throwHitDone:false,
    guard:false,
    dashTimer:0,
    dashCooldown:0,
    specialTimer:0,
    specialCooldown:isPlayer?0:90,
    hurtTimer:0,
    airComboCount:0,
    wallBounce:false,
    thrownFreezeTimer:0,
    throwSpin:0,
    knockdownTimer:0,
    knockdownAngle:0,
    throwInvulnTimer:0,
    throwLockout:0,
    pendingThrowKnockbackX:0,
    pendingThrowKnockbackY:0,
    inputBuffer:null,
    aiTimer:0,
    jumpChance:.004+level*.0007
  };
}

function resetGame(){
  player=makeFighter(120,FLOOR_Y-86,54,86,1,true);
  level=1;
  defeatedLevel=0;
  spawnEnemy();

  effects=[];
  particles=[];
  hitStop=0;
  screenShake=0;
  screenFlash=0;
  finishTimer=0;
  finishText="";
  combo={count:0,timer:0,owner:null,max:0};

  gameStarted=false;
  gameOver=false;
  scoreSaved=false;
  keys={};
  frameCount=0;
  lastAttackPressFrame=-999;
  lastGuardPressFrame=-999;
  pendingAttackTimer=0;
  pendingGuardTimer=0;
  attackTouchHeld=false;
  guardTouchHeld=false;
  throwInputLock=false;
}

function spawnEnemy(){
  enemy=makeFighter(590,FLOOR_Y-92,58,92,-1,false);
}

function startGame(){
  if(!gameOver)gameStarted=true;
}

function clamp(v,min,max){
  return Math.max(min,Math.min(max,v));
}

function centerX(f){
  return f.x+f.width/2;
}

function rectsHit(a,b){
  return a.x<b.x+b.width&&
         a.x+a.width>b.x&&
         a.y<b.y+b.height&&
         a.y+a.height>b.y;
}

function updateFacing(){
  if(player.onGround&&player.attackTimer<=0&&player.specialTimer<=0&&player.hurtTimer<=0&&player.dashTimer<=0){
    player.face=centerX(enemy)<centerX(player)?-1:1;
  }
  if(enemy.onGround&&enemy.attackTimer<=0&&enemy.specialTimer<=0&&enemy.hurtTimer<=0&&enemy.dashTimer<=0){
    enemy.face=centerX(player)<centerX(enemy)?-1:1;
  }
}

function faceOpponent(f){
  if(f===player){
    f.face=centerX(enemy)<centerX(player)?-1:1;
  }else{
    f.face=centerX(player)<centerX(enemy)?-1:1;
  }
}

function canAct(f){
  return f.attackTimer<=0&&
         f.specialTimer<=0&&
         f.throwTimer<=0&&
         f.hurtTimer<=0&&
         f.guardBreakTimer<=0;
}

function bufferInput(action){
  player.inputBuffer={
    action:action,
    timer:5
  };
}

function consumeInputBuffer(){
  if(!player.inputBuffer)return;

  player.inputBuffer.timer--;

  if(player.inputBuffer.timer<=0){
    player.inputBuffer=null;
    return;
  }

  if(!canAct(player))return;

  const action=player.inputBuffer.action;
  player.inputBuffer=null;

  if(action==="attack")normalAttack(player,false);
  if(action==="special")specialAttack(player,false);
  if(action==="throw")throwAttack(player,false);
  if(action==="jump")jump(player,false);
  if(action==="dash")dash(player,false);
}

function trySimultaneousThrow(){
  if(throwInputLock){
    return false;
  }

  if(!canAct(player)||!player.onGround||player.throwLockout>0){
    return false;
  }

  const keyboardClose=
    Math.abs(lastAttackPressFrame-lastGuardPressFrame)<=SKILL_CONFIG.input.throwWindow;

  const touchClose=attackTouchHeld&&guardTouchHeld;

  if(keyboardClose||touchClose){
    throwInputLock=true;
    pendingAttackTimer=0;
    pendingGuardTimer=0;
    player.guard=false;
    player.vx=0;
    player.vy=0;
    throwAttack(player);
    lastAttackPressFrame=-999;
    lastGuardPressFrame=-999;
    return true;
  }

  return false;
}

function processPendingInputs(){
  if(pendingAttackTimer>0){
    pendingAttackTimer--;

    if(trySimultaneousThrow()){
      return;
    }

    if(pendingAttackTimer<=0){
      normalAttack(player,false);
    }
  }

  if(pendingGuardTimer>0){
    pendingGuardTimer--;

    if(trySimultaneousThrow()){
      return;
    }

    if(pendingGuardTimer<=0&&keys["KeyX"]){
      startGame();

      if(canAct(player)&&player.onGround){
        player.parryTimer=SKILL_CONFIG.parry.window;
      }
    }
  }
}

function throwAttack(f,allowBuffer=true){
  if(!canAct(f)||f.throwLockout>0){
    if(f===player&&allowBuffer){
      bufferInput("throw");
    }
    return;
  }

  if(!f.onGround){
    if(f===player){
      addEffect("NO THROW",f.x+f.width/2,f.y-12,"#8888ff");
    }
    return;
  }

  faceOpponent(f);
  f.vx=0;
  f.vy=0;
  f.guard=false;
  f.throwTimer=SKILL_CONFIG.throw.timer;
  f.throwHitDone=false;
  f.throwLockout=SKILL_CONFIG.throw.lockout;
  startGame();

  addEffect("THROW",f.x+f.width/2,f.y-14,"#ff9944");
}

function getThrowBox(f){
  const cfg=SKILL_CONFIG.throw;

  if(f.face===1){
    return{
      x:f.x+f.width-2,
      y:f.y+cfg.offsetY,
      width:cfg.range,
      height:cfg.height
    };
  }

  return{
    x:f.x-cfg.range+2,
    y:f.y+cfg.offsetY,
    width:cfg.range,
    height:cfg.height
  };
}

function applyThrow(attacker,target){
  if(!rectsHit(getThrowBox(attacker),target)){
    addEffect("MISS",attacker.x+attacker.width/2,attacker.y-10,"#66ccff");
    return;
  }

  if(
    !target.onGround||
    target.dashTimer>0||
    target.throwInvulnTimer>0||
    target.thrownFreezeTimer>0||
    target.knockdownTimer>0||
    target.hurtTimer>0
  ){
    addEffect("MISS",target.x+target.width/2,target.y-10,"#66ccff");
    return;
  }

  const cfg=SKILL_CONFIG.throw;
  const damage=attacker===player
    ? cfg.playerDamage
    : Math.ceil(cfg.enemyBaseDamage);

  attacker.vx=0;
  attacker.vy=0;

  target.guard=false;
  target.attackTimer=0;
  target.specialTimer=0;
  target.throwTimer=0;
  target.attackHitDone=true;
  target.throwHitDone=true;
  target.inputBuffer=null;

  target.hp=Math.max(0,target.hp-damage);
  target.hurtTimer=24;
  target.thrownFreezeTimer=cfg.grabbedFreeze;
  target.throwSpin=34;
  target.knockdownTimer=cfg.knockdown;
  target.knockdownAngle=attacker.face;
  target.vx=0;
  target.vy=0;
  target.onGround=true;
  target.airComboCount=0;
  target.guardRegenDelay=24;
  target.throwInvulnTimer=cfg.throwInvuln;
  target.pendingThrowKnockbackX=attacker.face*cfg.knockbackX;
  target.pendingThrowKnockbackY=cfg.knockbackY;

  attacker.energy=clamp(attacker.energy+18,0,attacker.maxEnergy);

  registerCombo(attacker,false,false);
  addEffect("GRABBED",target.x+target.width/2,target.y-28,"#ff9944");
  addEffect("SLAM",target.x+target.width/2,target.y-52,"#ffcc66");
  spawnHitParticles(target.x+target.width/2,target.y+34,"#ff9944");

  hitStop=10;
  screenShake=12;
}

function normalAttack(f,allowBuffer=true){
  if(!canAct(f)){
    if(f===player&&allowBuffer)bufferInput("attack");
    return;
  }
  faceOpponent(f);
  f.attackTimer=18;
  f.attackHitDone=false;
  startGame();
}

function specialAttack(f,allowBuffer=true){
  if(!canAct(f)||f.specialCooldown>0){
    if(f===player&&allowBuffer)bufferInput("special");
    return;
  }

  if(f.energy<SKILL_CONFIG.special.cost){
    if(f===player)addEffect("NO ENERGY",f.x+f.width/2,f.y-12,"#8888ff");
    return;
  }

  faceOpponent(f);
  f.energy-=SKILL_CONFIG.special.cost;
  f.specialTimer=36;
  f.specialCooldown=120;
  f.attackHitDone=false;
  startGame();
  addEffect("SPECIAL",f.x+f.width/2,f.y-14,"#cc77ff");
  screenFlash=8;
}

function jump(f,allowBuffer=true){
  if(f.onGround&&f.hurtTimer<=0&&f.guardBreakTimer<=0){
    f.vy=-13.5;
    f.onGround=false;
    startGame();
  }else if(f===player&&allowBuffer){
    bufferInput("jump");
  }
}

function dash(f,allowBuffer=true){
  if(f.dashCooldown>0||f.hurtTimer>0||f.guardBreakTimer>0){
    if(f===player&&allowBuffer)bufferInput("dash");
    return;
  }
  f.dashTimer=16;
  f.dashCooldown=58;
  f.vx=f.face*11;
  f.guard=false;
  startGame();
  addEffect("EVADE",f.x+f.width/2,f.y+20,"#66ccff");
}

function getAttackBox(f,range,height,offsetY){
  if(f.face===1){
    return{
      x:f.x+f.width-4,
      y:f.y+offsetY,
      width:range,
      height:height
    };
  }
  return{
    x:f.x-range+4,
    y:f.y+offsetY,
    width:range,
    height:height
  };
}

function guardBreak(target){
  target.guard=false;
  target.guardGauge=0;
  target.guardBreakTimer=75;
  target.attackTimer=0;
  target.specialTimer=0;
  target.throwTimer=0;
  target.attackHitDone=true;
  target.throwHitDone=true;
  addEffect("GUARD BREAK",target.x+target.width/2,target.y-20,"#ffcc33");
  spawnHitParticles(target.x+target.width/2,target.y+34,"#ffcc33");
  screenShake=14;
}

function registerCombo(attacker,isCounter,isSpecial){
  if(!attacker)return;

  if(combo.owner!==attacker||combo.timer<=0){
    combo.count=0;
  }

  combo.owner=attacker;
  combo.count++;
  combo.timer=92;
  combo.max=Math.max(combo.max,combo.count);

  if(combo.count>=2){
    addEffect(combo.count+" HIT",canvas.width/2,118,attacker===player?"#66ffcc":"#ff99aa");
  }

  if(isCounter){
    addEffect("COUNTER",canvas.width/2,148,"#ffcc33");
  }

  if(isSpecial){
    screenFlash=Math.max(screenFlash,12);
  }
}

function takeDamage(target,amount,knockbackX,knockbackY,attacker,isSpecial){
  if(target.dashTimer>0){
    addEffect("MISS",target.x+target.width/2,target.y-10,"#66ccff");
    return;
  }

  if(target.parryTimer>0){
    target.parryTimer=0;
    target.guard=false;
    target.energy=clamp(target.energy+SKILL_CONFIG.parry.energyGain,0,target.maxEnergy);

    if(attacker){
      attacker.attackTimer=0;
      attacker.specialTimer=0;
      attacker.throwTimer=0;
      attacker.attackHitDone=true;
      attacker.throwHitDone=true;
      attacker.hurtTimer=Math.max(attacker.hurtTimer,SKILL_CONFIG.parry.attackerStun);
      attacker.vx=0;
    }

    addEffect("PARRY",target.x+target.width/2,target.y-18,"#66ff88");
    spawnHitParticles(target.x+target.width/2,target.y+34,"#66ff88");
    hitStop=SKILL_CONFIG.parry.hitStop;
    screenFlash=10;
    screenShake=7;
    return;
  }

  const isCounter=target.attackTimer>0||target.specialTimer>0||target.dashTimer>0;

  target.attackTimer=0;
  target.specialTimer=0;
  target.throwTimer=0;
  target.attackHitDone=true;
  target.throwHitDone=true;
  target.inputBuffer=null;

  let damage=amount;

  if(isCounter){
    damage=Math.ceil(damage*1.32);
  }

  if(!target.onGround){
    target.airComboCount++;
  }else{
    target.airComboCount=0;
  }

  if(target.airComboCount>3){
    target.guard=false;
    target.hurtTimer=24;
    target.vx=knockbackX*1.45;
    target.vy=-3.2;
    target.airComboCount=0;
    damage=Math.ceil(amount*.45);
    target.hp=Math.max(0,target.hp-damage);
    registerCombo(attacker,isCounter,isSpecial);
    addEffect("AIR BURST",target.x+target.width/2,target.y-20,"#66ffcc");
    spawnHitParticles(target.x+target.width/2,target.y+34,"#66ffcc");
    hitStop=8;
    screenShake=9;
    return;
  }

  if(target.guard&&target.guardBreakTimer<=0&&target.onGround){
    const guardDamage=isSpecial?30:20;
    target.guardGauge-=guardDamage;
    target.guardRegenDelay=42;

    if(target.guardGauge<=0){
      guardBreak(target);
      damage=Math.ceil(amount*.55);
    }else{
      damage=isSpecial?Math.ceil(amount*.18):0;
      addEffect(isSpecial?"CHIP":"GUARD",target.x+target.width/2,target.y-12,isSpecial?"#cc77ff":"#4488ff");
    }
  }else{
    addEffect("-"+damage,target.x+target.width/2,target.y-16,isCounter?"#ffcc33":"#ff5577");
  }

  target.hp=Math.max(0,target.hp-damage);
  registerCombo(attacker,isCounter,isSpecial);

  const comboPenalty=target.airComboCount*2;
  target.hurtTimer=Math.max(9,target.guard?8:18-comboPenalty);
  target.vx=knockbackX*Math.max(.72,1-target.airComboCount*.09);

  if(knockbackY!==0){
    target.vy=knockbackY*Math.max(.62,1-target.airComboCount*.13);
    target.onGround=false;
  }else if(!target.onGround){
    target.vy=Math.min(target.vy,-4.5);
  }

  target.energy=clamp(target.energy+8,0,target.maxEnergy);
  if(attacker)attacker.energy=clamp(attacker.energy+15,0,attacker.maxEnergy);

  checkWallBounce(target,attacker,isSpecial);

  hitStop=isSpecial?9:5;
  screenShake=isSpecial?13:7;
  spawnHitParticles(target.x+target.width/2,target.y+36,target.guard?"#4488ff":isCounter?"#ffcc33":"#ff5577");
}

function checkWallBounce(target,attacker,isSpecial){
  if(!isSpecial||target.wallBounce)return;

  const nearLeft=target.x<=38;
  const nearRight=target.x+target.width>=canvas.width-38;

  if(!nearLeft&&!nearRight)return;

  target.wallBounce=true;
  target.vx=nearLeft?8.5:-8.5;
  target.vy=-7.2;
  target.onGround=false;
  target.hurtTimer=26;

  if(attacker)attacker.energy=clamp(attacker.energy+12,0,attacker.maxEnergy);

  addEffect("WALL BOUNCE",target.x+target.width/2,target.y-22,"#cc77ff");
  spawnHitParticles(target.x+target.width/2,target.y+34,"#cc77ff");
  screenFlash=10;
}

function handleAttackHits(){
  if(player.throwTimer===SKILL_CONFIG.throw.hitFrame&&!player.throwHitDone){
    applyThrow(player,enemy);
    player.throwHitDone=true;
  }

  if(enemy.throwTimer===SKILL_CONFIG.throw.hitFrame&&!enemy.throwHitDone){
    applyThrow(enemy,player);
    enemy.throwHitDone=true;
  }

  if(player.attackTimer===9&&!player.attackHitDone){
    const box=getAttackBox(player,58,44,20);
    if(rectsHit(box,enemy)){
      takeDamage(enemy,SKILL_CONFIG.normal.playerDamage,player.face*5,enemy.onGround?-2.2:-5.2,player,false);
    }
    player.attackHitDone=true;
  }

  if(enemy.attackTimer===9&&!enemy.attackHitDone){
    const box=getAttackBox(enemy,58,44,22);
    if(rectsHit(box,player)){
      const damage=SKILL_CONFIG.normal.enemyBaseDamage;
      takeDamage(player,damage,enemy.face*5,player.onGround?-1.8:-4.8,enemy,false);
    }
    enemy.attackHitDone=true;
  }

  if(player.specialTimer===18&&!player.attackHitDone){
    const box=getAttackBox(player,122,70,8);
    if(rectsHit(box,enemy)){
      takeDamage(enemy,SKILL_CONFIG.special.playerDamage,player.face*9,-8.6,player,true);
    }
    player.attackHitDone=true;
  }

  if(enemy.specialTimer===18&&!enemy.attackHitDone){
    const box=getAttackBox(enemy,118,70,10);
    if(rectsHit(box,player)){
      const damage=SKILL_CONFIG.special.enemyBaseDamage;
      takeDamage(player,damage,enemy.face*9,-7.4,enemy,true);
    }
    enemy.attackHitDone=true;
  }
}

function updatePlayer(){
  const canGuard=player.onGround&&
    player.dashTimer<=0&&
    player.attackTimer<=0&&
    player.specialTimer<=0&&
    player.throwTimer<=0&&
    player.hurtTimer<=0&&
    player.guardBreakTimer<=0;

  player.guard=keys["KeyX"]&&canGuard&&pendingGuardTimer<=0;

  let accel=player.guard?.22:.72;
  let maxSpeed=player.guard?2:5.7;

  if(player.throwTimer>0){
    accel=0;
    player.vx=0;
  }

  if(player.hurtTimer>0||player.guardBreakTimer>0){
    accel=0;
  }

  if(keys["ArrowLeft"])player.vx-=accel;
  if(keys["ArrowRight"])player.vx+=accel;

  if(!keys["ArrowLeft"]&&!keys["ArrowRight"]&&player.dashTimer<=0){
    player.vx*=.78;
  }

  if(player.dashTimer<=0){
    player.vx=clamp(player.vx,-maxSpeed,maxSpeed);
  }

  applyPhysics(player);
}

function updateEnemyAI(){
  enemy.guard=false;

  const distance=Math.abs(centerX(player)-centerX(enemy));
  enemy.aiTimer--;

  const aggression=clamp(.45+level*.055,.45,.92);
  const reaction=Math.max(10,34-level*2);

  if(enemy.aiTimer<=0){
    enemy.aiTimer=reaction;

    if(enemy.guardBreakTimer<=0&&enemy.hurtTimer<=0&&enemy.throwTimer<=0){
      if(distance>92){
        enemy.vx+=enemy.face*(1.2+level*.08);
      }

      if(
        distance<52&&
        enemy.onGround&&
        enemy.throwLockout<=0&&
        player.throwInvulnTimer<=0&&
        player.knockdownTimer<=0&&
        player.hurtTimer<=0&&
        Math.random()<0.12+Math.min(0.10,level*0.006)
      ){
        throwAttack(enemy);
      }else if(distance<78&&Math.random()<aggression){
        normalAttack(enemy);
      }

      if(distance<135&&enemy.energy>=60&&enemy.specialCooldown<=0&&Math.random()<.35+level*.025){
        specialAttack(enemy);
      }

      if(distance<95&&Math.random()<.18+level*.014&&enemy.guardGauge>22&&enemy.onGround){
        enemy.guard=true;
      }

      if(distance<70&&enemy.dashCooldown<=0&&Math.random()<.12+level*.01){
        enemy.face=player.x<enemy.x?1:-1;
        dash(enemy);
        faceOpponent(enemy);
      }
    }
  }

  if(Math.random()<enemy.jumpChance&&enemy.onGround&&enemy.guardBreakTimer<=0){
    jump(enemy);
  }

  enemy.vx*=.88;
  enemy.vx=clamp(enemy.vx,-(3.6+level*.14),3.6+level*.14);

  applyPhysics(enemy);
}

function applyPhysics(f){
  const wasThrowing=f.throwTimer>0;
  const wasKnockdown=f.knockdownTimer>0;

  if(f.throwInvulnTimer>0){
    f.throwInvulnTimer--;
  }

  if(f.thrownFreezeTimer>0){
    f.thrownFreezeTimer--;
    f.vx=0;
    f.vy=0;

    if(f.parryTimer>0)f.parryTimer--;
    if(f.hurtTimer>0)f.hurtTimer--;
    if(f.throwSpin>0)f.throwSpin--;
    if(f.knockdownTimer>0)f.knockdownTimer--;
    if(f.throwLockout>0)f.throwLockout--;

    if(f.thrownFreezeTimer<=0){
      f.vx=f.pendingThrowKnockbackX||0;
      f.vy=f.pendingThrowKnockbackY||0;
      f.pendingThrowKnockbackX=0;
      f.pendingThrowKnockbackY=0;

      addEffect("DOWN",f.x+f.width/2,f.y-16,"#ffcc66");
      spawnHitParticles(f.x+f.width/2,f.y+f.height-12,"#ff9944");

      if(f.vy!==0){
        f.onGround=false;
      }
    }

    return;
  }

  if(f.throwTimer>0){
    f.vx=0;
    f.vy=0;
  }

  f.x+=f.vx;
  f.y+=f.vy;
  f.vy+=GRAVITY;

  if(f.y+f.height>=FLOOR_Y){
    f.y=FLOOR_Y-f.height;
    f.vy=0;
    f.onGround=true;
    f.airComboCount=0;
    f.wallBounce=false;

    if(f.knockdownTimer>0){
      f.vx*=0.55;
      f.hurtTimer=Math.max(f.hurtTimer,18);
    }
  }

  f.x=clamp(f.x,28,canvas.width-f.width-28);

  if(f.attackTimer>0)f.attackTimer--;
  if(f.specialTimer>0)f.specialTimer--;
  if(f.throwTimer>0)f.throwTimer--;
  if(f.parryTimer>0)f.parryTimer--;
  if(f.dashTimer>0)f.dashTimer--;
  if(f.dashCooldown>0)f.dashCooldown--;
  if(f.specialCooldown>0)f.specialCooldown--;
  if(f.hurtTimer>0)f.hurtTimer--;
  if(f.guardBreakTimer>0)f.guardBreakTimer--;
  if(f.throwSpin>0)f.throwSpin--;
  if(f.knockdownTimer>0)f.knockdownTimer--;
  if(f.throwLockout>0)f.throwLockout--;

  if(wasKnockdown&&f.knockdownTimer<=0){
    f.throwInvulnTimer=Math.max(
      f.throwInvulnTimer,
      SKILL_CONFIG.throw.afterWakeInvuln
    );
    addEffect("THROW SAFE",f.x+f.width/2,f.y-12,"#ffcc66");
  }

  if(wasThrowing&&f.throwTimer<=0){
    f.vx=0;
    f.vy=0;
  }

  if(f.guard){
    f.guardRegenDelay=Math.max(f.guardRegenDelay,30);
  }

  if(f.guardRegenDelay>0){
    f.guardRegenDelay--;
  }

  if(!f.guard&&f.guardBreakTimer<=0&&f.guardRegenDelay<=0){
    f.guardGauge=clamp(f.guardGauge+.11,0,f.maxGuardGauge);
  }

  f.energy=clamp(f.energy+.035,0,f.maxEnergy);
}


function resolveFighterPush(){
  const pLeft=player.x;
  const pRight=player.x+player.width;
  const eLeft=enemy.x;
  const eRight=enemy.x+enemy.width;

  const verticalOverlap=player.y<enemy.y+enemy.height&&player.y+player.height>enemy.y;
  if(!verticalOverlap)return;
  if(pRight<=eLeft||eRight<=pLeft)return;

  const overlap=Math.min(pRight-eLeft,eRight-pLeft);
  if(overlap<=0)return;

  const playerDashing=player.dashTimer>0;
  const enemyDashing=enemy.dashTimer>0;

  if(playerDashing||enemyDashing){
    const mover=playerDashing?player:enemy;
    const other=playerDashing?enemy:player;

    if(mover.dashTimer>7){
      mover.x+=mover.face*(overlap+3);
      mover.x=clamp(mover.x,28,canvas.width-mover.width-28);
      addEffect("CROSS",mover.x+mover.width/2,mover.y+10,"#66ccff");
      return;
    }

    other.x+=mover.face*-Math.min(overlap*.35,4);
    other.x=clamp(other.x,28,canvas.width-other.width-28);
    return;
  }

  const push=overlap/2+.2;

  if(centerX(player)<centerX(enemy)){
    player.x-=push;
    enemy.x+=push;
  }else{
    player.x+=push;
    enemy.x-=push;
  }

  player.x=clamp(player.x,28,canvas.width-player.width-28);
  enemy.x=clamp(enemy.x,28,canvas.width-enemy.width-28);

  player.vx*=.45;
  enemy.vx*=.45;
}

function updateEffects(){
  if(combo.timer>0){
    combo.timer--;
  }else{
    combo.count=0;
    combo.owner=null;
  }

  if(screenShake>0)screenShake--;
  if(screenFlash>0)screenFlash--;
  if(finishTimer>0)finishTimer--;

  effects.forEach(e=>{
    e.y-=e.vy;
    e.life--;
    e.alpha=e.life/e.maxLife;
  });
  effects=effects.filter(e=>e.life>0);

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=.12;
    p.life--;
    p.alpha=p.life/p.maxLife;
  });
  particles=particles.filter(p=>p.life>0);
}

function addEffect(text,x,y,color){
  effects.push({
    text:text,
    x:x,
    y:y,
    color:color,
    life:38,
    maxLife:38,
    alpha:1,
    vy:.85
  });
}

function spawnHitParticles(x,y,color){
  for(let i=0;i<12;i++){
    particles.push({
      x:x,
      y:y,
      vx:(Math.random()-.5)*5,
      vy:(Math.random()-.8)*4,
      size:3+Math.random()*4,
      color:color,
      life:24,
      maxLife:24,
      alpha:1
    });
  }
}

function checkRoundState(){
  if(enemy.hp<=0){
    defeatedLevel=level;

    if(player.specialTimer>0||combo.count>=3){
      finishTimer=95;
      finishText=player.specialTimer>0?"SPECIAL FINISH":"COMBO FINISH";
      screenFlash=22;
      screenShake=22;
    }

    level++;
    player.hp=player.maxHp;
    player.energy=clamp(player.energy+42,0,player.maxEnergy);
    player.guardGauge=player.maxGuardGauge;
    player.throwInvulnTimer=0;
    player.thrownFreezeTimer=0;
    player.knockdownTimer=0;
    player.throwSpin=0;
    player.inputBuffer=null;

    addEffect("LEVEL UP",canvas.width/2,155,"#66ffcc");
    spawnEnemy();
  }

  if(player.hp<=0){
    gameOver=true;
    if(!scoreSaved){
      scoreSaved=true;
      addHighScore(defeatedLevel);
    }
  }
}

function update(){
  frameCount++;

  processPendingInputs();

  if(!gameStarted||gameOver){
    updateEffects();
    return;
  }

  if(hitStop>0){
    hitStop--;
    updateEffects();
    return;
  }

  updateFacing();
  consumeInputBuffer();
  updatePlayer();
  updateEnemyAI();
  resolveFighterPush();
  updateFacing();
  handleAttackHits();
  updateEffects();
  checkRoundState();
}


function drawBackground(){
  ctx.fillStyle="#06101f";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const g=ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,"rgba(102,204,255,.12)");
  g.addColorStop(.65,"rgba(125,44,255,.04)");
  g.addColorStop(1,"rgba(0,0,0,.2)");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="rgba(0,255,255,.055)";
  for(let y=40;y<canvas.height;y+=40){
    ctx.fillRect(0,y,canvas.width,1);
  }

  ctx.fillStyle="rgba(0,255,255,.035)";
  for(let x=0;x<canvas.width;x+=40){
    ctx.fillRect(x,0,1,canvas.height);
  }

  ctx.strokeStyle="#66ccff";
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(30,FLOOR_Y+2);
  ctx.lineTo(canvas.width-30,FLOOR_Y+2);
  ctx.stroke();

  ctx.fillStyle="rgba(102,204,255,.10)";
  ctx.fillRect(30,FLOOR_Y+4,canvas.width-60,34);

  ctx.fillStyle="rgba(255,255,255,.08)";
  ctx.fillRect(0,FLOOR_Y+38,canvas.width,3);
}

function enemyLevelColor(){
  if(level >= 10){
    return "hsl(" + ((frameCount * 4) % 360) + ",100%,60%)";
  }

  const colors=[
    "#ff6688",
    "#ff8844",
    "#ffcc33",
    "#ccff44",
    "#66ff88",
    "#44ffd5",
    "#4488ff",
    "#9955ff",
    "#ff55cc"
  ];

  return colors[(level - 1) % colors.length];
}

function enemyCoreColor(){
  if(level >= 10){
    return "hsl(" + ((frameCount * 4 + 80) % 360) + ",100%,72%)";
  }

  const colors=[
    "#ffe1e8",
    "#ffe0cc",
    "#fff2aa",
    "#edffb5",
    "#ccffdd",
    "#c9fff4",
    "#d4e2ff",
    "#ead8ff",
    "#ffd6f2"
  ];

  return colors[(level - 1) % colors.length];
}

function drawSideQuokkaEar(x,y,angle,base,inner){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(angle);

  ctx.fillStyle=base;
  ctx.shadowColor=base;
  ctx.shadowBlur=10;
  ctx.beginPath();
  ctx.ellipse(0,0,8,24,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle=inner;
  ctx.shadowBlur=0;
  ctx.beginPath();
  ctx.ellipse(0,1,4,14,0,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawSideQuokkaTail(f,base){
  const dir=f.face;
  const tailX=f.x+f.width/2-dir*25;
  const tailY=f.y+f.height-20;

  ctx.strokeStyle=base;
  ctx.lineWidth=10;
  ctx.lineCap="round";
  ctx.shadowColor=base;
  ctx.shadowBlur=10;

  ctx.beginPath();
  ctx.moveTo(tailX,tailY);
  ctx.quadraticCurveTo(
    tailX-dir*40,
    tailY+2,
    tailX-dir*64,
    tailY-14
  );
  ctx.stroke();

  ctx.shadowBlur=0;
}

function drawSideQuokkaLegs(f,base){
  const dir=f.face;
  const bodyX=f.x+f.width/2;
  const footY=FLOOR_Y-2;

  ctx.strokeStyle=base;
  ctx.lineWidth=8;
  ctx.lineCap="round";
  ctx.shadowColor=base;
  ctx.shadowBlur=8;

  // back leg
  ctx.beginPath();
  ctx.moveTo(bodyX-dir*12,f.y+f.height-30);
  ctx.lineTo(bodyX-dir*20,footY-6);
  ctx.lineTo(bodyX-dir*38,footY);
  ctx.stroke();

  // front leg
  ctx.beginPath();
  ctx.moveTo(bodyX+dir*8,f.y+f.height-28);
  ctx.lineTo(bodyX+dir*18,footY-6);
  ctx.lineTo(bodyX+dir*36,footY);
  ctx.stroke();

  ctx.shadowBlur=0;
}

function drawSideQuokkaArms(f,base,visor){
  const dir=f.face;
  const shoulderX=f.x+f.width/2+dir*14;
  const shoulderY=f.y+54;

  let handX=shoulderX+dir*18;
  let handY=shoulderY+16;

  if(f.attackTimer>0){
    handX=shoulderX+dir*(34+(18-f.attackTimer)*1.6);
    handY=shoulderY+4;
  }

  if(f.specialTimer>0){
    handX=shoulderX+dir*58;
    handY=shoulderY-8;
  }

  if(f.throwTimer>0){
    handX=shoulderX+dir*44;
    handY=shoulderY+16;
  }

  ctx.strokeStyle=base;
  ctx.lineWidth=8;
  ctx.lineCap="round";
  ctx.shadowColor=base;
  ctx.shadowBlur=8;

  ctx.beginPath();
  ctx.moveTo(shoulderX,shoulderY);
  ctx.lineTo(handX,handY);
  ctx.stroke();

  ctx.shadowBlur=0;

  if(f.attackTimer>6||f.specialTimer>8||f.throwTimer>6){
    ctx.strokeStyle=f.specialTimer>0?"#cc77ff":f.throwTimer>0?"#ff9944":visor;
    ctx.lineWidth=f.specialTimer>0?10:f.throwTimer>0?8:6;
    ctx.shadowColor=ctx.strokeStyle;
    ctx.shadowBlur=14;

    ctx.beginPath();
    ctx.moveTo(handX,handY);
    ctx.lineTo(handX+dir*(f.specialTimer>0?64:f.throwTimer>0?26:34),handY);
    ctx.stroke();

    ctx.shadowBlur=0;
  }
}

function drawSideCyberLines(f,visor){
  const dir=f.face;
  const cx=f.x+f.width/2;

  ctx.strokeStyle=visor;
  ctx.lineWidth=2;
  ctx.shadowColor=visor;
  ctx.shadowBlur=8;

  ctx.beginPath();
  ctx.moveTo(cx-dir*18,f.y+52);
  ctx.lineTo(cx+dir*16,f.y+52);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(cx+dir*2,f.y+58);
  ctx.lineTo(cx+dir*8,f.y+f.height-28);
  ctx.stroke();

  ctx.shadowBlur=0;
}

function drawFighter(f,isPlayer){
  const dir=f.face;
  const cx=f.x+f.width/2;
  const base=isPlayer?"#66ccff":enemyLevelColor();
  const core=isPlayer?"#ffffff":enemyCoreColor();
  const inner=isPlayer?"#bdf5ff":"#ffe1e8";
  const visor=isPlayer?"#7dffff":level>=10?enemyCoreColor():"#ffdd66";

  ctx.save();

  if(f.knockdownTimer>0){
    const progress=1-(f.knockdownTimer/SKILL_CONFIG.throw.knockdown);
    const fallAmount=Math.min(1,Math.max(0,progress*2.4));
    const baseAngle=f.knockdownAngle||f.face||1;
    const angle=baseAngle*(Math.PI/2)*fallAmount;

    ctx.translate(cx,f.y+f.height-10);
    ctx.rotate(angle);
    ctx.translate(-cx,-(f.y+f.height-10));
  }else if(f.throwSpin>0){
    const angle=(f.face*0.18)*Math.sin(f.throwSpin*0.45);
    ctx.translate(cx,f.y+f.height/2);
    ctx.rotate(angle);
    ctx.translate(-cx,-(f.y+f.height/2));
  }

  if(f.dashTimer>0){
    ctx.globalAlpha=.48;
    ctx.fillStyle=base;
    ctx.fillRect(f.x-dir*28,f.y+22,f.width,f.height-26);
    ctx.globalAlpha=1;
  }

  if(f.guardBreakTimer>0){
    ctx.globalAlpha=Math.floor(f.guardBreakTimer/4)%2===0?.45:1;
  }

  if(f.hurtTimer>0&&Math.floor(f.hurtTimer/3)%2===0){
    ctx.globalAlpha=.68;
  }

  drawSideQuokkaTail(f,base);

  const headX=cx+dir*18;
  const headY=f.y+28;
  const bodyX=cx-dir*2;
  const bodyY=f.y+62;

  // back ear then front ear
  drawSideQuokkaEar(headX-dir*14,headY-18,dir*-0.45,base,inner);
  drawSideQuokkaEar(headX+dir*4,headY-22,dir*-0.25,base,inner);

  // body
  ctx.fillStyle=base;
  ctx.shadowColor=base;
  ctx.shadowBlur=14;
  ctx.beginPath();
  ctx.ellipse(bodyX,bodyY,28,38,dir*0.05,0,Math.PI*2);
  ctx.fill();

  // belly/core plate
  ctx.fillStyle="rgba(255,255,255,.16)";
  ctx.shadowBlur=0;
  ctx.beginPath();
  ctx.ellipse(bodyX+dir*4,bodyY+4,15,23,0,0,Math.PI*2);
  ctx.fill();

  // head side shape
  ctx.fillStyle=base;
  ctx.shadowColor=base;
  ctx.shadowBlur=12;
  ctx.beginPath();
  ctx.ellipse(headX,headY,24,22,0,0,Math.PI*2);
  ctx.fill();

  // muzzle / nose protrudes toward opponent
  ctx.fillStyle=inner;
  ctx.shadowBlur=0;
  ctx.beginPath();
  ctx.ellipse(headX+dir*18,headY+8,16,11,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#07111f";
  ctx.beginPath();
  ctx.ellipse(headX+dir*30,headY+5,5,4,0,0,Math.PI*2);
  ctx.fill();

  // single visible eye
  ctx.fillStyle="#ffffff";
  ctx.beginPath();
  ctx.arc(headX+dir*8,headY-3,4,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#07111f";
  ctx.beginPath();
  ctx.arc(headX+dir*9,headY-3,2,0,Math.PI*2);
  ctx.fill();

  // cyber visor, side-mounted
  ctx.fillStyle="#07111f";
  ctx.fillRect(headX-dir*4,headY-11,dir*24,8);

  ctx.fillStyle=visor;
  ctx.shadowColor=visor;
  ctx.shadowBlur=12;
  ctx.fillRect(headX+dir*0,headY-9,dir*20,4);
  ctx.shadowBlur=0;

  // smiling quokka mouth
  ctx.strokeStyle="#07111f";
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(headX+dir*17,headY+13,8,0.15,Math.PI-0.15);
  ctx.stroke();

  // glowing chest core
  ctx.fillStyle=core;
  ctx.shadowColor=core;
  ctx.shadowBlur=16;
  ctx.beginPath();
  ctx.arc(bodyX+dir*7,bodyY-5,8,0,Math.PI*2);
  ctx.fill();

  drawSideCyberLines(f,visor);
  drawSideQuokkaArms(f,base,visor);
  drawSideQuokkaLegs(f,base);

  if(f.thrownFreezeTimer>0){
    ctx.strokeStyle="#ff9944";
    ctx.lineWidth=5;
    ctx.shadowColor="#ff9944";
    ctx.shadowBlur=18;
    ctx.beginPath();
    ctx.arc(cx,f.y+44,50,0,Math.PI*2);
    ctx.stroke();

    ctx.fillStyle="#ffcc66";
    ctx.font="bold 13px sans-serif";
    ctx.textAlign="center";
    ctx.fillText("GRABBED",cx,f.y-8);
    ctx.textAlign="left";
  }

  if(f.throwInvulnTimer>0&&f.throwInvulnTimer>0&&f.throwInvulnTimer>SKILL_CONFIG.throw.afterWakeInvuln-18){
    ctx.strokeStyle="rgba(255,204,102,0.7)";
    ctx.lineWidth=3;
    ctx.shadowColor="#ffcc66";
    ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.arc(cx,f.y+44,44,0,Math.PI*2);
    ctx.stroke();

    ctx.fillStyle="#ffcc66";
    ctx.font="bold 11px sans-serif";
    ctx.textAlign="center";
    ctx.fillText("THROW SAFE",cx,f.y-8);
    ctx.textAlign="left";
  }

  if(f.guardBreakTimer>0){
    ctx.strokeStyle="#ffcc33";
    ctx.lineWidth=4;
    ctx.shadowColor="#ffcc33";
    ctx.shadowBlur=16;
    ctx.beginPath();
    ctx.arc(cx,f.y+42,48,0,Math.PI*2);
    ctx.stroke();
  }

  if(f.guard){
    ctx.strokeStyle=isPlayer?"#4488ff":"#ff99aa";
    ctx.lineWidth=5;
    ctx.shadowColor=ctx.strokeStyle;
    ctx.shadowBlur=14;

    const shieldX=cx+f.face*26;
    const shieldY=f.y+46;

    ctx.beginPath();

    if(f.face===1){
      // 右向き時：キャラの右側にシールド
      ctx.arc(shieldX,shieldY,42,-1.25,1.25);
    }else{
      // 左向き時：キャラの左側にシールド
      ctx.arc(shieldX,shieldY,42,Math.PI-1.25,Math.PI+1.25);
    }

    ctx.stroke();

    // シールドの中心ライン。向きが分かるように前方へ少し伸ばす
    ctx.strokeStyle=isPlayer?"rgba(125,255,255,.8)":"rgba(255,190,210,.8)";
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(cx+f.face*10,shieldY);
    ctx.lineTo(cx+f.face*54,shieldY);
    ctx.stroke();
  }

  ctx.restore();
  ctx.shadowBlur=0;
  ctx.globalAlpha=1;
}


function drawArm(f,color){
  ctx.strokeStyle=color;
  ctx.lineWidth=8;
  ctx.lineCap="round";

  let sx=f.x+f.width/2+f.face*10;
  let sy=f.y+55;
  let hx=sx+f.face*24;
  let hy=sy+10;

  if(f.attackTimer>0){
    hx=sx+f.face*(36+(18-f.attackTimer)*1.2);
    hy=sy-2;
  }

  if(f.specialTimer>0){
    hx=sx+f.face*50;
    hy=sy-16;
  }

  if(f.throwTimer>0){
    hx=sx+f.face*46;
    hy=sy+22;
  }

  ctx.beginPath();
  ctx.moveTo(sx,sy);
  ctx.lineTo(hx,hy);
  ctx.stroke();

  if(f.attackTimer>6||f.specialTimer>8||f.throwTimer>6){
    ctx.strokeStyle=f.specialTimer>0?"#cc77ff":f.throwTimer>0?"#ff9944":"#ffffff";
    ctx.lineWidth=f.specialTimer>0?10:f.throwTimer>0?8:6;
    ctx.beginPath();
    ctx.moveTo(hx,hy);
    ctx.lineTo(hx+f.face*(f.specialTimer>0?58:f.throwTimer>0?22:30),hy);
    ctx.stroke();
  }
}

function drawLegs(f,color){
  ctx.strokeStyle=color;
  ctx.lineWidth=8;
  ctx.lineCap="round";

  const hx=f.x+f.width/2;
  const hy=f.y+f.height-20;

  ctx.beginPath();
  ctx.moveTo(hx-10,hy);
  ctx.lineTo(hx-18,FLOOR_Y-2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(hx+10,hy);
  ctx.lineTo(hx+18,FLOOR_Y-2);
  ctx.stroke();
}

function drawBar(x,y,w,h,ratio,color,label){
  ctx.fillStyle="#222";
  ctx.fillRect(x,y,w,h);

  ctx.fillStyle=color;
  ctx.fillRect(x,y,clamp(ratio,0,1)*w,h);

  ctx.strokeStyle="white";
  ctx.lineWidth=1;
  ctx.strokeRect(x,y,w,h);

  ctx.fillStyle="white";
  ctx.font="10px sans-serif";
  ctx.fillText(label,x+6,y+h-3);
}

function drawBars(){
  drawBar(24,20,260,18,player.hp/player.maxHp,"#66ccff","PLAYER HP");
  drawBar(canvas.width-284,20,260,18,enemy.hp/enemy.maxHp,"#ff6688","ENEMY HP");

  drawBar(24,46,220,12,player.energy/player.maxEnergy,"#cc77ff","SPECIAL");
  drawBar(canvas.width-244,46,220,12,enemy.energy/enemy.maxEnergy,"#cc77ff","ENEMY SP");

  drawBar(24,64,220,10,player.guardGauge/player.maxGuardGauge,"#4488ff","GUARD");
  drawBar(canvas.width-244,64,220,10,enemy.guardGauge/enemy.maxGuardGauge,"#4488ff","GUARD");

  if(player.inputBuffer){
    ctx.fillStyle="#66ffcc";
    ctx.font="11px sans-serif";
    ctx.fillText("BUFFER : "+player.inputBuffer.action.toUpperCase(),24,92);
  }

  ctx.fillStyle="white";
  ctx.font="23px sans-serif";
  ctx.fillStyle=enemyLevelColor();
  ctx.fillText("LEVEL : "+level,canvas.width/2-55,36);

  ctx.font="14px sans-serif";
  ctx.fillText("勝利LEVEL : "+defeatedLevel,canvas.width/2-55,60);
}

function drawEffects(){
  effects.forEach(e=>{
    ctx.save();
    ctx.globalAlpha=e.alpha;
    ctx.fillStyle=e.color;
    ctx.font="bold 20px sans-serif";
    ctx.textAlign="center";
    ctx.shadowColor=e.color;
    ctx.shadowBlur=10;
    ctx.fillText(e.text,e.x,e.y);
    ctx.restore();
  });

  ctx.textAlign="left";

  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;
    ctx.shadowBlur=8;
    ctx.fillRect(p.x,p.y,p.size,p.size);
    ctx.restore();
  });

  ctx.globalAlpha=1;
  ctx.shadowBlur=0;
}

function drawComboUI(){
  if(combo.count<2||combo.timer<=0)return;

  const color=combo.owner===player?"#66ffcc":"#ff99aa";
  const x=combo.owner===player?120:canvas.width-190;

  ctx.save();
  ctx.fillStyle=color;
  ctx.shadowColor=color;
  ctx.shadowBlur=14;
  ctx.font="bold 34px sans-serif";
  ctx.fillText(combo.count+" HIT",x,128);
  ctx.font="14px sans-serif";
  ctx.fillText("MAX "+combo.max,x+4,150);
  ctx.restore();
}

function drawStartScreen(){
  ctx.fillStyle="rgba(0,0,0,.82)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#66ccff";
  ctx.font="bold 50px sans-serif";
  ctx.textAlign="center";
  ctx.shadowColor="#66ccff";
  ctx.shadowBlur=18;
  ctx.fillText("CYBER QUOKKA",canvas.width/2,158);
  ctx.fillText("CORE EX4",canvas.width/2,218);

  ctx.shadowBlur=0;
  ctx.fillStyle="white";
  ctx.font="23px sans-serif";
  ctx.fillText("攻撃・移動・防御ボタンで開始",canvas.width/2,303);

  ctx.font="16px sans-serif";
  ctx.fillText("横向きサイバークアッカ / 対面バトル / 色変化ボス 搭載",canvas.width/2,342);
  ctx.textAlign="left";
}

function drawGameOver(){
  ctx.fillStyle="rgba(0,0,0,.76)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#ff3355";
  ctx.font="bold 58px sans-serif";
  ctx.textAlign="center";
  ctx.shadowColor="#ff3355";
  ctx.shadowBlur=18;
  ctx.fillText("GAME OVER",canvas.width/2,205);

  ctx.shadowBlur=0;
  ctx.fillStyle="white";
  ctx.font="25px sans-serif";
  ctx.fillText("LEVEL "+defeatedLevel+" まで勝利",canvas.width/2,270);

  ctx.font="20px sans-serif";
  ctx.fillText("RESETで再挑戦",canvas.width/2,326);
  ctx.textAlign="left";
}

function drawFinishOverlay(){
  if(finishTimer<=0)return;

  ctx.save();

  const alpha=Math.min(.78,finishTimer/45);
  ctx.fillStyle="rgba(0,0,0,"+alpha+")";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.textAlign="center";
  ctx.fillStyle="#cc77ff";
  ctx.shadowColor="#cc77ff";
  ctx.shadowBlur=24;
  ctx.font="bold 52px sans-serif";
  ctx.fillText(finishText,canvas.width/2,215);

  ctx.fillStyle="white";
  ctx.shadowBlur=0;
  ctx.font="20px sans-serif";
  ctx.fillText("LEVEL "+defeatedLevel+" CLEAR",canvas.width/2,260);

  ctx.restore();
  ctx.textAlign="left";
}

function drawScreenFlash(){
  if(screenFlash<=0)return;

  ctx.save();
  ctx.globalAlpha=screenFlash/24;
  ctx.fillStyle="#ffffff";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();

  if(screenShake>0){
    const shake=screenShake>12?6:3;
    ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  }

  drawBackground();
  drawFighter(player,true);
  drawFighter(enemy,false);
  drawEffects();
  drawBars();
  drawComboUI();

  if(!gameStarted)drawStartScreen();
  if(gameOver)drawGameOver();

  drawFinishOverlay();

  ctx.restore();

  drawScreenFlash();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener("keydown",e=>{
  const wasPressed=keys[e.code];

  if(wasPressed){
    return;
  }

  keys[e.code]=true;

  if(e.code==="KeyZ"){
    startGame();
    lastAttackPressFrame=frameCount;

    if(trySimultaneousThrow()){
      return;
    }

    pendingAttackTimer=SKILL_CONFIG.input.throwWindow;
    return;
  }

  if(e.code==="KeyX"){
    startGame();
    lastGuardPressFrame=frameCount;

    if(trySimultaneousThrow()){
      return;
    }

    pendingGuardTimer=SKILL_CONFIG.input.throwWindow;
    return;
  }

  if(e.code==="ArrowUp")jump(player);
  if(e.code==="KeyC")specialAttack(player);
  if(e.code==="ShiftLeft"||e.code==="ShiftRight")dash(player);
});

document.addEventListener("keyup",e=>{
  keys[e.code]=false;

  if(e.code==="KeyZ"){
    attackTouchHeld=false;
  }

  if(e.code==="KeyX"){
    pendingGuardTimer=0;
    guardTouchHeld=false;
  }

  if(!keys["KeyZ"]&&!keys["KeyX"]&&!attackTouchHeld&&!guardTouchHeld){
    throwInputLock=false;
  }
});

function holdButton(id,code){
  const btn=document.getElementById(id);

  btn.addEventListener("touchstart",e=>{
    e.preventDefault();
    startGame();
    keys[code]=true;
  },{passive:false});

  btn.addEventListener("touchend",e=>{
    e.preventDefault();
    keys[code]=false;
  },{passive:false});

  btn.addEventListener("touchcancel",e=>{
    e.preventDefault();
    keys[code]=false;
  },{passive:false});

  btn.addEventListener("mousedown",()=>{
    startGame();
    keys[code]=true;
  });

  btn.addEventListener("mouseup",()=>{
    keys[code]=false;
  });

  btn.addEventListener("mouseleave",()=>{
    keys[code]=false;
  });
}

function tapButton(id,func){
  const btn=document.getElementById(id);
  let touchLocked=false;

  btn.addEventListener("touchstart",e=>{
    e.preventDefault();
    touchLocked=true;
    func();

    setTimeout(()=>{
      touchLocked=false;
    },120);
  },{passive:false});

  btn.addEventListener("click",()=>{
    if(touchLocked)return;
    func();
  });
}

holdButton("leftBtn","ArrowLeft");
holdButton("rightBtn","ArrowRight");

bindAttackButton();
bindGuardButton();

tapButton("jumpBtn",()=>jump(player));
tapButton("dashBtn",()=>dash(player));
tapButton("specialBtn",()=>specialAttack(player));

function bindAttackButton(){
  const btn=document.getElementById("attackBtn");
  let touchLocked=false;

  function press(){
    startGame();

    if(attackTouchHeld){
      return;
    }

    attackTouchHeld=true;
    lastAttackPressFrame=frameCount;

    if(trySimultaneousThrow()){
      return;
    }

    pendingAttackTimer=SKILL_CONFIG.input.throwWindow;
  }

  function release(){
    attackTouchHeld=false;

    if(!guardTouchHeld&&!keys["KeyZ"]&&!keys["KeyX"]){
      throwInputLock=false;
    }
  }

  btn.addEventListener("touchstart",e=>{
    e.preventDefault();
    touchLocked=true;
    press();
  },{passive:false});

  btn.addEventListener("touchend",e=>{
    e.preventDefault();
    release();

    setTimeout(()=>{
      touchLocked=false;
    },120);
  },{passive:false});

  btn.addEventListener("touchcancel",e=>{
    e.preventDefault();
    release();
  },{passive:false});

  btn.addEventListener("mousedown",()=>{
    if(touchLocked)return;
    press();
  });

  btn.addEventListener("mouseup",release);
  btn.addEventListener("mouseleave",release);
}

function bindGuardButton(){
  const btn=document.getElementById("guardBtn");

  function press(){
    startGame();

    if(guardTouchHeld){
      return;
    }

    guardTouchHeld=true;
    keys["KeyX"]=true;
    lastGuardPressFrame=frameCount;

    if(trySimultaneousThrow()){
      return;
    }

    pendingGuardTimer=SKILL_CONFIG.input.throwWindow;
  }

  function release(){
    guardTouchHeld=false;
    keys["KeyX"]=false;
    pendingGuardTimer=0;

    if(!attackTouchHeld&&!keys["KeyZ"]&&!keys["KeyX"]){
      throwInputLock=false;
    }
  }

  btn.addEventListener("touchstart",e=>{
    e.preventDefault();
    press();
  },{passive:false});

  btn.addEventListener("touchend",e=>{
    e.preventDefault();
    release();
  },{passive:false});

  btn.addEventListener("touchcancel",e=>{
    e.preventDefault();
    release();
  },{passive:false});

  btn.addEventListener("mousedown",press);
  btn.addEventListener("mouseup",release);
  btn.addEventListener("mouseleave",release);
}

document.getElementById("resetBtn").addEventListener("click",()=>{
  resetGame();
});

resetGame();
displayHighScores();
loop();
</script>
