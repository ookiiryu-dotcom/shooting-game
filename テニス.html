<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TOY TENNIS BOT BATTLE</title>

<style>
*{
  box-sizing:border-box;
}

html{
  touch-action:manipulation;
}

body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#173b32,#030706 75%);
  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow-x:hidden;
}

h1{
  margin:18px 0 8px;
  color:#7cff9a;
  text-shadow:0 0 12px #7cff9a,0 0 26px #7cff9a;
}

p{
  margin:0 0 10px;
  color:#ddd;
  font-size:14px;
}

.top-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:12px 0 14px;
  flex-wrap:wrap;
}

.top-buttons button,
.top-buttons a{
  width:160px;
  height:44px;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:bold;
  color:white;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.start-btn{
  background:#b22222;
}

.reset-btn{
  background:#1f5fbf;
}

.back-btn{
  background:#222;
  border:1px solid #7cff9a;
}

.game-layout{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:18px;
  padding:0 12px 24px;
}

.game-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

canvas{
  width:720px;
  max-width:96vw;
  height:auto;
  background:#123d22;
  border:3px solid #7cff9a;
  box-shadow:
    0 0 20px rgba(124,255,154,0.75),
    inset 0 0 24px rgba(255,255,255,0.08);
}

.controls{
  width:720px;
  max-width:96vw;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:58px 58px 58px;
  gap:10px;
  margin-top:14px;
}

.controls button{
  border:none;
  border-radius:14px;
  color:white;
  font-size:18px;
  font-weight:bold;
  background:#222;
  border:1px solid #7cff9a;
  box-shadow:0 0 10px rgba(124,255,154,0.25);
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}

#upBtn{
  grid-column:2;
  grid-row:1;
}

#leftBtn{
  grid-column:1;
  grid-row:2;
}

#hitBtn{
  grid-column:2;
  grid-row:2;
}

#rightBtn{
  grid-column:3;
  grid-row:2;
}

#downBtn{
  grid-column:2;
  grid-row:3;
}

.move-btn{
  background:#255a9b !important;
}

.hit-btn{
  background:#258844 !important;
}

.score-board{
  width:270px;
  background:rgba(8,26,16,0.95);
  border:1px solid #7cff9a;
  border-radius:14px;
  padding:14px;
  text-align:left;
  box-shadow:0 0 15px rgba(124,255,154,0.2);
}

.score-board h2{
  text-align:center;
  color:#7cff9a;
  margin:4px 0 12px;
}

.info-line{
  margin-bottom:10px;
  font-size:14px;
  color:#eee;
}

.info-line strong{
  color:#7cff9a;
}

.score-board ol{
  padding-left:24px;
}

.score-board li{
  margin-bottom:8px;
  color:#eee;
  font-size:14px;
}

.score-note{
  margin-top:12px;
  font-size:12px;
  color:#aaa;
  text-align:center;
  line-height:1.6;
}

@media(max-width:900px){
  .game-layout{
    flex-direction:column;
    align-items:center;
  }

  .score-board{
    width:96vw;
    max-width:720px;
  }

  .controls button{
    font-size:16px;
  }
}
</style>
</head>

<body>

<h1>TOY TENNIS BOT BATTLE</h1>

<p>PC：↑↓←→で移動 / Spaceでショット / Enterで開始 / Rでリセット</p>

<div class="top-buttons">
  <button id="startBtn" class="start-btn">START</button>
  <button id="resetBtn" class="reset-btn">RESET</button>
  <a href="index.html" class="back-btn">← ホームへ戻る</a>
</div>

<div class="game-layout">

  <div class="game-wrap">

    <canvas id="game" width="720" height="520"></canvas>

    <div class="controls">
      <button id="upBtn" class="move-btn">↑</button>
      <button id="leftBtn" class="move-btn">←</button>
      <button id="hitBtn" class="hit-btn">SHOT</button>
      <button id="rightBtn" class="move-btn">→</button>
      <button id="downBtn" class="move-btn">↓</button>
    </div>

  </div>

  <div class="score-board">
    <h2>Status</h2>
    <div class="info-line">LEVEL：<strong id="levelInfo">1</strong></div>
    <div class="info-line">PLAYER：<strong id="playerScoreInfo">0</strong></div>
    <div class="info-line">BOT：<strong id="botScoreInfo">0</strong></div>
    <div class="info-line">RALLY：<strong id="rallyInfo">0</strong></div>
    <div class="info-line">SHOT：<strong id="shotInfo">NORMAL</strong></div>

    <h2>High Scores</h2>
    <ol id="highScores"></ol>

    <div class="score-note">
      5点取るとLEVEL UP<br>
      BOTが5点取るとGAME OVER<br>
      上側で打つとSMASH
    </div>
  </div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const startBtn = document.getElementById("startBtn");
const resetBtn = document.getElementById("resetBtn");

const upBtn = document.getElementById("upBtn");
const downBtn = document.getElementById("downBtn");
const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");
const hitBtn = document.getElementById("hitBtn");

const levelInfo = document.getElementById("levelInfo");
const playerScoreInfo = document.getElementById("playerScoreInfo");
const botScoreInfo = document.getElementById("botScoreInfo");
const rallyInfo = document.getElementById("rallyInfo");
const shotInfo = document.getElementById("shotInfo");
const highScoresList = document.getElementById("highScores");

const SCORE_KEY = "toyTennisBotBattleScoresV2";

let keys = {};
let gameStarted = false;
let gameOver = false;

let level = 1;
let playerScore = 0;
let botScore = 0;
let rally = 0;
let maxLevelReached = 1;

let pointMessage = "";
let pointMessageTimer = 0;

let player;
let bot;
let ball;

let hitCooldown = 0;
let lastShotName = "NORMAL";

const court = {
  x:70,
  y:35,
  width:580,
  height:450,
  netY:260
};

const playerArea = {
  x:90,
  y:275,
  width:540,
  height:190
};

const botArea = {
  x:90,
  y:55,
  width:540,
  height:185
};

const smashZone = {
  x:90,
  y:275,
  width:540,
  height:55
};

function resetGame(){
  level = 1;
  playerScore = 0;
  botScore = 0;
  rally = 0;
  maxLevelReached = 1;

  gameStarted = false;
  gameOver = false;

  pointMessage = "";
  pointMessageTimer = 0;

  hitCooldown = 0;
  lastShotName = "NORMAL";

  player = {
    x:330,
    y:390,
    width:34,
    height:56,
    speed:6.2,
    swingTimer:0,
    swingHitFrame:0,
    facing:1
  };

  bot = {
    x:345,
    y:95,
    width:34,
    height:56,
    speed:4.3,
    swingTimer:0,
    swingHitFrame:0,
    facing:-1
  };

  resetBall(1);
  updateInfo();
}

function startGame(){
  if(gameOver){
    return;
  }

  gameStarted = true;
}

function resetBall(direction){
  ball = {
    x:canvas.width / 2,
    y:canvas.height / 2,
    radius:10,
    vx:direction * (4.7 + level * 0.23),
    vy:direction > 0 ? 3.2 : -3.2,
    speedLimit:12.5 + level * 0.48
  };

  rally = 0;
}

function botStats(){
  return {
    speed:4.0 + level * 0.45,
    error:Math.max(5,42 - level * 3.1),
    reaction:Math.max(0.055,0.22 - level * 0.012),
    hitPower:1.01 + level * 0.012
  };
}

function update(){
  if(!gameStarted || gameOver){
    return;
  }

  updatePlayer();
  updateBot();
  updateBall();
  updateTimers();
  updateInfo();
}

function updatePlayer(){
  let nextX = player.x;
  let nextY = player.y;

  if(keys["ArrowUp"]){
    nextY -= player.speed;
  }

  if(keys["ArrowDown"]){
    nextY += player.speed;
  }

  if(keys["ArrowLeft"]){
    nextX -= player.speed;
  }

  if(keys["ArrowRight"]){
    nextX += player.speed;
  }

  player.x = clamp(
    nextX,
    playerArea.x,
    playerArea.x + playerArea.width - player.width
  );

  player.y = clamp(
    nextY,
    playerArea.y,
    playerArea.y + playerArea.height - player.height
  );

  if(hitCooldown > 0){
    hitCooldown--;
  }

  if(player.swingTimer > 0){
    player.swingTimer--;
  }

  if(player.swingHitFrame > 0){
    player.swingHitFrame--;
  }
}

function updateBot(){
  const stats = botStats();

  let targetX = ball.x - bot.width / 2;
  let targetY = ball.y - bot.height / 2;

  if(ball.vy < 0){
    targetX += Math.sin(Date.now() * 0.006) * stats.error;
    targetY += Math.cos(Date.now() * 0.005) * stats.error;
  }else{
    targetX = botArea.x + botArea.width / 2 - bot.width / 2;
    targetY = botArea.y + botArea.height / 2 - bot.height / 2;
  }

  bot.x += (targetX - bot.x) * stats.reaction;
  bot.y += (targetY - bot.y) * stats.reaction;

  if(bot.x < targetX){
    bot.x += Math.min(stats.speed,targetX - bot.x);
  }

  if(bot.x > targetX){
    bot.x -= Math.min(stats.speed,bot.x - targetX);
  }

  if(bot.y < targetY){
    bot.y += Math.min(stats.speed,targetY - bot.y);
  }

  if(bot.y > targetY){
    bot.y -= Math.min(stats.speed,bot.y - targetY);
  }

  bot.x = clamp(bot.x,botArea.x,botArea.x + botArea.width - bot.width);
  bot.y = clamp(bot.y,botArea.y,botArea.y + botArea.height - bot.height);

  if(bot.swingTimer > 0){
    bot.swingTimer--;
  }

  if(bot.swingHitFrame > 0){
    bot.swingHitFrame--;
  }
}

function updateBall(){
  ball.x += ball.vx;
  ball.y += ball.vy;

  if(ball.x - ball.radius <= court.x){
    ball.x = court.x + ball.radius;
    ball.vx *= -1;
  }

  if(ball.x + ball.radius >= court.x + court.width){
    ball.x = court.x + court.width - ball.radius;
    ball.vx *= -1;
  }

  checkPlayerHit();
  checkBotHit();

  if(ball.y > court.y + court.height + 45){
    botScore++;
    pointMessage = "BOT POINT";
    pointMessageTimer = 70;
    checkScore();
    resetBall(1);
  }

  if(ball.y < court.y - 45){
    playerScore++;
    pointMessage = "PLAYER POINT";
    pointMessageTimer = 70;
    checkScore();
    resetBall(-1);
  }
}

function startPlayerSwing(){
  if(hitCooldown > 0){
    return;
  }

  player.swingTimer = 18;
  player.swingHitFrame = 9;
  hitCooldown = 22;
}

function checkPlayerHit(){
  const manualHit = player.swingHitFrame > 0;

  if(!manualHit){
    return;
  }

  const racket = getRacketHitBox(player,true);

  const b = {
    x:ball.x - ball.radius,
    y:ball.y - ball.radius,
    width:ball.radius * 2,
    height:ball.radius * 2
  };

  if(!rectHit(racket,b)){
    return;
  }

  if(ball.vy <= 0){
    return;
  }

  const smash = isPlayerInSmashZone();
  const slowLong = keys["ArrowDown"];

  let xAim = 0;
  let yPower = 1.16;
  let addSpeed = 0.5;

  lastShotName = "SHOT";

  if(keys["ArrowLeft"]){
    xAim -= 4.8;
    lastShotName = "LEFT SHOT";
  }

  if(keys["ArrowRight"]){
    xAim += 4.8;
    lastShotName = "RIGHT SHOT";
  }

  if(slowLong){
    yPower = 0.72;
    addSpeed = 0.08;
    xAim *= 0.65;
    lastShotName = "SLOW LONG";
  }

  if(smash){
    yPower = 1.65;
    addSpeed = 1.35;
    lastShotName = "SMASH";

    if(keys["ArrowLeft"]){
      xAim -= 5.8;
    }

    if(keys["ArrowRight"]){
      xAim += 5.8;
    }
  }

  const hitPos =
    (ball.x - (player.x + player.width / 2)) /
    (player.width / 2);

  ball.y = player.y - ball.radius - 12;

  ball.vy = -Math.min(
    Math.abs(ball.vy) * yPower + addSpeed,
    ball.speedLimit
  );

  ball.vx = clamp(
    hitPos * 3.4 + xAim,
    -10,
    10
  );

  player.swingHitFrame = 0;
  rally++;
}

function checkBotHit(){
  const stats = botStats();

  const botReach = {
    x:bot.x - 26,
    y:bot.y + 24,
    width:bot.width + 52,
    height:bot.height + 40
  };

  const b = {
    x:ball.x - ball.radius,
    y:ball.y - ball.radius,
    width:ball.radius * 2,
    height:ball.radius * 2
  };

  if(rectHit(botReach,b) && ball.vy < 0 && bot.swingTimer <= 0){
    bot.swingTimer = 16;
    bot.swingHitFrame = 8;
  }

  if(bot.swingHitFrame <= 0){
    return;
  }

  const racket = getRacketHitBox(bot,false);

  if(!rectHit(racket,b)){
    return;
  }

  if(ball.vy >= 0){
    return;
  }

  const hitPos =
    (ball.x - (bot.x + bot.width / 2)) /
    (bot.width / 2);

  const mistake =
    (Math.random() - 0.5) * (stats.error / 8);

  ball.y = bot.y + bot.height + ball.radius + 12;

  ball.vy = Math.min(
    Math.abs(ball.vy) * stats.hitPower + 0.35,
    ball.speedLimit
  );

  ball.vx = clamp(
    hitPos * 3.2 + mistake,
    -9,
    9
  );

  bot.swingHitFrame = 0;
  rally++;
}

function getRacketHitBox(obj,isPlayer){
  const swingProgress =
    obj.swingTimer > 0
      ? obj.swingTimer / 18
      : 0;

  let offsetX = isPlayer ? 8 : 8;
  let offsetY = isPlayer ? -8 : obj.height + 2;

  if(obj.swingTimer > 0){
    offsetX = isPlayer
      ? 24 - swingProgress * 38
      : 24 - swingProgress * 38;

    offsetY = isPlayer
      ? -22 + swingProgress * 28
      : obj.height - 6 - swingProgress * 24;
  }

  return {
    x:obj.x + obj.width / 2 + offsetX - 18,
    y:obj.y + offsetY - 18,
    width:46,
    height:46
  };
}

function isPlayerInSmashZone(){
  const cx = player.x + player.width / 2;
  const cy = player.y + player.height / 2;

  return (
    cx >= smashZone.x &&
    cx <= smashZone.x + smashZone.width &&
    cy >= smashZone.y &&
    cy <= smashZone.y + smashZone.height
  );
}

function checkScore(){
  if(playerScore >= 5){
    level++;
    maxLevelReached = Math.max(maxLevelReached,level);

    playerScore = 0;
    botScore = 0;

    pointMessage = "LEVEL UP!";
    pointMessageTimer = 100;
  }

  if(botScore >= 5){
    gameOver = true;
    saveHighScore(maxLevelReached);
  }
}

function updateTimers(){
  if(pointMessageTimer > 0){
    pointMessageTimer--;
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawToyCourt();
  drawMoveAreas();
  drawPlayerToy(player,"#3b80ff",true);
  drawPlayerToy(bot,"#ff5e7a",false);
  drawBall();
  drawHud();

  if(!gameStarted){
    drawStartScreen();
  }

  if(gameOver){
    drawGameOver();
  }
}

function drawToyCourt(){
  ctx.fillStyle = "#1f6b36";
  ctx.fillRect(court.x,court.y,court.width,court.height);

  ctx.strokeStyle = "rgba(255,255,255,0.88)";
  ctx.lineWidth = 4;

  ctx.strokeRect(court.x,court.y,court.width,court.height);

  ctx.lineWidth = 3;

  ctx.beginPath();
  ctx.moveTo(court.x + 70,court.y);
  ctx.lineTo(court.x + 70,court.y + court.height);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(court.x + court.width - 70,court.y);
  ctx.lineTo(court.x + court.width - 70,court.y + court.height);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(court.x,court.netY);
  ctx.lineTo(court.x + court.width,court.netY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(court.x + court.width / 2,court.y);
  ctx.lineTo(court.x + court.width / 2,court.y + court.height);
  ctx.stroke();

  ctx.lineWidth = 2;

  ctx.strokeRect(court.x + 70,court.y + 35,court.width - 140,155);
  ctx.strokeRect(court.x + 70,court.netY + 35,court.width - 140,155);

  drawNet();

  drawBanner(35,385,"Cyber","#53dfff");
  drawBanner(585,315,"Tennis","#d26743");
  drawBanner(98,92,"TOY","#e46e9a");
  drawBanner(550,94,"BOT","#58c6df");
}

function drawNet(){
  const netX = court.x + 35;
  const netY = court.netY - 12;
  const netW = court.width - 70;
  const netH = 24;

  ctx.fillStyle = "#e8e8e8";
  ctx.fillRect(netX,netY,netW,netH);

  ctx.strokeStyle = "#666";
  ctx.lineWidth = 1;

  for(let x = netX; x <= netX + netW; x += 12){
    ctx.beginPath();
    ctx.moveTo(x,netY);
    ctx.lineTo(x,netY + netH);
    ctx.stroke();
  }

  for(let y = netY; y <= netY + netH; y += 6){
    ctx.beginPath();
    ctx.moveTo(netX,y);
    ctx.lineTo(netX + netW,y);
    ctx.stroke();
  }
}

function drawBanner(x,y,text,color){
  ctx.save();

  ctx.translate(x,y);
  ctx.rotate(-0.22);

  ctx.fillStyle = color;
  ctx.fillRect(0,0,92,34);

  ctx.strokeStyle = "rgba(255,255,255,0.45)";
  ctx.lineWidth = 2;
  ctx.strokeRect(0,0,92,34);

  ctx.fillStyle = "white";
  ctx.font = "14px sans-serif";
  ctx.fillText(text,14,22);

  ctx.restore();
}

function drawMoveAreas(){
  ctx.fillStyle = "rgba(102,204,255,0.09)";
  ctx.fillRect(playerArea.x,playerArea.y,playerArea.width,playerArea.height);

  ctx.strokeStyle = "rgba(102,204,255,0.45)";
  ctx.lineWidth = 2;
  ctx.strokeRect(playerArea.x,playerArea.y,playerArea.width,playerArea.height);

  ctx.fillStyle = "rgba(255,255,255,0.13)";
  ctx.fillRect(smashZone.x,smashZone.y,smashZone.width,smashZone.height);

  ctx.fillStyle = "#ffffff";
  ctx.font = "13px sans-serif";
  ctx.fillText("SMASH ZONE",smashZone.x + 210,smashZone.y + 34);

  ctx.fillStyle = "rgba(255,90,120,0.10)";
  ctx.fillRect(botArea.x,botArea.y,botArea.width,botArea.height);

  ctx.strokeStyle = "rgba(255,90,120,0.45)";
  ctx.strokeRect(botArea.x,botArea.y,botArea.width,botArea.height);
}

function drawPlayerToy(obj,color,isPlayer){
  const x = obj.x;
  const y = obj.y;

  ctx.save();

  ctx.shadowColor = color;
  ctx.shadowBlur = 12;

  ctx.fillStyle = color;
  ctx.fillRect(x,y + 20,obj.width,obj.height - 18);

  ctx.fillStyle = isPlayer ? "#ffe066" : "#d8b4ff";
  ctx.beginPath();
  ctx.arc(x + obj.width / 2,y + 12,13,0,Math.PI * 2);
  ctx.fill();

  const swing = obj.swingTimer > 0;
  const swingRate = swing ? obj.swingTimer / 18 : 0;

  let armAngle;

  if(isPlayer){
    armAngle = swing
      ? -2.25 + swingRate * 2.15
      : -0.65;
  }else{
    armAngle = swing
      ? 2.25 - swingRate * 2.15
      : 0.65;
  }

  const shoulderX = x + obj.width / 2;
  const shoulderY = y + 35;
  const armLen = 38;

  const racketX = shoulderX + Math.cos(armAngle) * armLen;
  const racketY = shoulderY + Math.sin(armAngle) * armLen;

  ctx.strokeStyle = "#f0d8b8";
  ctx.lineWidth = 5;

  ctx.beginPath();
  ctx.moveTo(shoulderX,shoulderY);
  ctx.lineTo(racketX,racketY);
  ctx.stroke();

  ctx.strokeStyle = isPlayer ? "#2540dd" : "#dd2540";
  ctx.lineWidth = 4;

  ctx.beginPath();
  ctx.ellipse(racketX + 8,racketY,12,17,armAngle,0,Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,0.25)";
  ctx.beginPath();
  ctx.ellipse(racketX + 8,racketY,8,12,armAngle,0,Math.PI * 2);
  ctx.fill();

  if(swing){
    ctx.strokeStyle = "rgba(255,255,255,0.8)";
    ctx.lineWidth = 4;

    ctx.beginPath();

    ctx.arc(
      shoulderX,
      shoulderY,
      58,
      isPlayer ? -2.2 : -0.8,
      isPlayer ? -0.4 : 1.0
    );

    ctx.stroke();

    ctx.strokeStyle = "rgba(255,255,255,0.35)";
    ctx.lineWidth = 9;

    ctx.beginPath();

    ctx.arc(
      shoulderX,
      shoulderY,
      58,
      isPlayer ? -2.0 : -0.6,
      isPlayer ? -0.5 : 0.9
    );

    ctx.stroke();
  }

  ctx.restore();
}

function drawBall(){
  ctx.save();

  ctx.shadowColor = "#d7ff31";
  ctx.shadowBlur = 18;

  ctx.fillStyle = "#d7ff31";

  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawHud(){
  ctx.fillStyle = "white";
  ctx.font = "28px sans-serif";

  ctx.fillText(playerScore,court.x + 20,court.y + 38);
  ctx.fillText(botScore,court.x + 20,court.y + 78);

  ctx.fillStyle = "#7cff9a";
  ctx.font = "18px sans-serif";
  ctx.fillText("LEVEL " + level,canvas.width / 2 - 40,28);

  ctx.fillStyle = "#ddd";
  ctx.font = "14px sans-serif";
  ctx.fillText("RALLY " + rally,canvas.width / 2 - 35,50);
  ctx.fillText("SHOT " + lastShotName,canvas.width / 2 - 55,70);

  if(pointMessageTimer > 0){
    ctx.fillStyle = "#ffffff";
    ctx.font = "36px sans-serif";

    ctx.fillText(
      pointMessage,
      canvas.width / 2 - ctx.measureText(pointMessage).width / 2,
      canvas.height / 2 - 35
    );
  }
}

function drawStartScreen(){
  ctx.fillStyle = "rgba(0,0,0,0.78)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#7cff9a";
  ctx.font = "52px sans-serif";
  ctx.fillText("TOY TENNIS",205,175);

  ctx.fillStyle = "white";
  ctx.font = "24px sans-serif";
  ctx.fillText("Enter または STARTで開始",205,260);

  ctx.font = "17px sans-serif";
  ctx.fillText("↑↓←→で自陣全面を移動",235,305);
  ctx.fillText("Spaceでラケットを振ってショット",220,335);
  ctx.fillText("上エリアでSMASH / ↓を押しながらSLOW LONG",165,365);
}

function drawGameOver(){
  ctx.fillStyle = "rgba(0,0,0,0.76)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#ff3355";
  ctx.font = "58px sans-serif";
  ctx.fillText("GAME OVER",175,210);

  ctx.fillStyle = "white";
  ctx.font = "26px sans-serif";
  ctx.fillText("到達LEVEL : " + maxLevelReached,260,275);

  ctx.font = "20px sans-serif";
  ctx.fillText("RESETで再挑戦",292,330);
}

function updateInfo(){
  levelInfo.textContent = level;
  playerScoreInfo.textContent = playerScore;
  botScoreInfo.textContent = botScore;
  rallyInfo.textContent = rally;
  shotInfo.textContent = lastShotName;
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function clamp(value,min,max){
  return Math.max(min,Math.min(max,value));
}

function rectHit(a,b){
  return (
    a.x < b.x + b.width &&
    a.x + a.width > b.x &&
    a.y < b.y + b.height &&
    a.y + a.height > b.y
  );
}

function getHighScores(){
  const data = localStorage.getItem(SCORE_KEY);

  if(!data){
    return [];
  }

  try{
    const parsed = JSON.parse(data);
    return Array.isArray(parsed) ? parsed : [];
  }catch(e){
    return [];
  }
}

function saveHighScore(score){
  let scores = getHighScores();

  scores.push(score);
  scores.sort((a,b)=>b-a);
  scores = scores.slice(0,10);

  localStorage.setItem(SCORE_KEY,JSON.stringify(scores));
  showHighScores();
}

function showHighScores(){
  const scores = getHighScores();

  highScoresList.innerHTML = "";

  for(let i = 0; i < 10; i++){
    const li = document.createElement("li");

    if(scores[i] !== undefined){
      li.textContent = "LEVEL " + scores[i];
    }else{
      li.textContent = "-";
    }

    highScoresList.appendChild(li);
  }
}

document.addEventListener("keydown",e=>{
  keys[e.code] = true;

  if(e.code === "Enter"){
    startGame();
  }

  if(e.code === "Space"){
    e.preventDefault();
    startPlayerSwing();
  }

  if(e.code === "KeyR"){
    resetGame();
    gameStarted = true;
  }
});

document.addEventListener("keyup",e=>{
  keys[e.code] = false;
});

function holdButton(button,code){
  button.addEventListener("touchstart",e=>{
    e.preventDefault();
    keys[code] = true;
  },{passive:false});

  button.addEventListener("touchend",e=>{
    e.preventDefault();
    keys[code] = false;
  },{passive:false});

  button.addEventListener("touchcancel",e=>{
    e.preventDefault();
    keys[code] = false;
  },{passive:false});

  button.addEventListener("mousedown",()=>{
    keys[code] = true;
  });

  button.addEventListener("mouseup",()=>{
    keys[code] = false;
  });

  button.addEventListener("mouseleave",()=>{
    keys[code] = false;
  });
}

function tapHitButton(button){
  button.addEventListener("touchstart",e=>{
    e.preventDefault();
    startPlayerSwing();
  },{passive:false});

  button.addEventListener("click",()=>{
    startPlayerSwing();
  });
}

holdButton(upBtn,"ArrowUp");
holdButton(downBtn,"ArrowDown");
holdButton(leftBtn,"ArrowLeft");
holdButton(rightBtn,"ArrowRight");
tapHitButton(hitBtn);

startBtn.addEventListener("click",()=>{
  startGame();
});

startBtn.addEventListener("touchstart",e=>{
  e.preventDefault();
  startGame();
},{passive:false});

resetBtn.addEventListener("click",()=>{
  resetGame();
  gameStarted = true;
});

resetBtn.addEventListener("touchstart",e=>{
  e.preventDefault();
  resetGame();
  gameStarted = true;
},{passive:false});

resetGame();
showHighScores();
loop();
</script>

</body>
</html>
