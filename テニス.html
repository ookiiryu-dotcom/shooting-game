<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CYBER TENNIS BOT BATTLE</title>

<style>
*{
  box-sizing:border-box;
}

html{
  touch-action:manipulation;
}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 50% 0%,rgba(35,255,240,0.26),transparent 34%),
    radial-gradient(circle at 18% 20%,rgba(65,126,255,0.24),transparent 28%),
    linear-gradient(180deg,#050914,#020409 78%);
  color:white;
  font-family:Arial,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  text-align:center;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(rgba(94,255,244,0.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(94,255,244,0.045) 1px,transparent 1px);
  background-size:38px 38px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent 85%);
}

h1{
  margin:18px 0 8px;
  color:#6ffcff;
  letter-spacing:0.08em;
  text-shadow:0 0 12px #28f7ff,0 0 34px rgba(40,247,255,0.72);
}

p{
  margin:0 0 10px;
  color:#cfefff;
  font-size:14px;
}

.top-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:12px 0 14px;
  flex-wrap:wrap;
}

.top-buttons button,
.top-buttons a{
  width:160px;
  height:44px;
  border:1px solid rgba(111,252,255,0.7);
  border-radius:12px;
  font-size:15px;
  font-weight:bold;
  color:white;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 0 16px rgba(35,255,245,0.22);
}

.start-btn{
  background:linear-gradient(135deg,#ff235f,#7b1dff);
}

.reset-btn{
  background:linear-gradient(135deg,#115bff,#00b8ff);
}

.back-btn{
  background:rgba(8,13,28,0.92);
}

.game-layout{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:18px;
  padding:0 12px 24px;
}

.game-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

canvas{
  width:720px;
  max-width:96vw;
  height:auto;
  background:#06111f;
  border:3px solid #6ffcff;
  border-radius:18px;
  box-shadow:
    0 0 28px rgba(111,252,255,0.7),
    inset 0 0 28px rgba(111,252,255,0.12);
}

.controls{
  width:720px;
  max-width:96vw;
  display:grid;
  grid-template-columns:1.1fr 1fr;
  gap:12px;
  margin-top:14px;
  align-items:stretch;
}

.move-pad{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:58px 58px 58px;
  gap:10px;
}

.shot-pad{
  display:grid;
  grid-template-columns:1fr;
  grid-template-rows:1fr 1fr;
  gap:10px;
}

.controls button{
  border:none;
  border-radius:14px;
  color:white;
  font-size:16px;
  font-weight:bold;
  background:rgba(9,18,36,0.94);
  border:1px solid rgba(111,252,255,0.75);
  box-shadow:0 0 12px rgba(111,252,255,0.28), inset 0 0 14px rgba(111,252,255,0.08);
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}

#upBtn{ grid-column:2; grid-row:1; }
#leftBtn{ grid-column:1; grid-row:2; }
#rightBtn{ grid-column:3; grid-row:2; }
#downBtn{ grid-column:2; grid-row:3; }

.move-btn{
  background:linear-gradient(135deg,#123d82,#0b8ee8) !important;
}

.aim-btn{
  background:linear-gradient(135deg,#7a2cff,#00a8ff) !important;
}

.score-board{
  width:270px;
  background:rgba(3,10,24,0.95);
  border:1px solid rgba(111,252,255,0.75);
  border-radius:14px;
  padding:14px;
  text-align:left;
  box-shadow:0 0 18px rgba(111,252,255,0.2);
}

.score-board h2{
  text-align:center;
  color:#6ffcff;
  margin:4px 0 12px;
  text-shadow:0 0 10px rgba(111,252,255,0.65);
}

.info-line{
  margin-bottom:10px;
  font-size:14px;
  color:#e9fbff;
}

.info-line strong{
  color:#6ffcff;
}

.score-board ol{
  padding-left:24px;
}

.score-board li{
  margin-bottom:8px;
  color:#e9fbff;
  font-size:14px;
}

.score-note{
  margin-top:12px;
  font-size:12px;
  color:#a8d8df;
  text-align:center;
  line-height:1.6;
}

@media(max-width:900px){
  .game-layout{
    flex-direction:column;
    align-items:center;
  }

  .score-board{
    width:96vw;
    max-width:720px;
  }

  .controls{
    grid-template-columns:1.15fr 0.95fr;
    gap:8px;
  }

  .move-pad{
    grid-template-rows:54px 54px 54px;
    gap:7px;
  }

  .shot-pad{
    gap:7px;
  }

  .controls button{
    font-size:12px;
    border-radius:11px;
  }
}
</style>
</head>

<body>

<h1>CYBER TENNIS BOT BATTLE</h1>

<p>PC：↑↓←→で移動 / A=LEFT SHOT / D=RIGHT SHOT / Enter=開始 / R=リセット</p>

<div class="top-buttons">
  <button id="startBtn" class="start-btn">START</button>
  <button id="resetBtn" class="reset-btn">RESET</button>
  <a href="index.html" class="back-btn">← ホームへ戻る</a>
</div>

<div class="game-layout">

  <div class="game-wrap">

    <canvas id="game" width="720" height="520"></canvas>

    <div class="controls">
      <div class="move-pad" aria-label="移動ボタン">
        <button id="upBtn" class="move-btn">↑</button>
        <button id="leftBtn" class="move-btn">←</button>
        <button id="rightBtn" class="move-btn">→</button>
        <button id="downBtn" class="move-btn">↓</button>
      </div>

      <div class="shot-pad" aria-label="ショットボタン">
        <button id="leftHitBtn" class="aim-btn">LEFT<br>SHOT</button>
        <button id="rightHitBtn" class="aim-btn">RIGHT<br>SHOT</button>
      </div>
    </div>

  </div>

  <div class="score-board">
    <h2>Status</h2>
    <div class="info-line">LEVEL：<strong id="levelInfo">1</strong></div>
    <div class="info-line">PLAYER：<strong id="playerScoreInfo">0</strong></div>
    <div class="info-line">BOT：<strong id="botScoreInfo">0</strong></div>
    <div class="info-line">RALLY：<strong id="rallyInfo">0</strong></div>
    <div class="info-line">SHOT：<strong id="shotInfo">NORMAL</strong></div>

    <h2>High Scores</h2>
    <ol id="highScores"></ol>

    <div class="score-note">
      5点取るとLEVEL UP<br>
      BOTが5点取るとGAME OVER<br>
      上側で打つとSMASH<br>
      ↓を押しながら打つとSLOW LONG
    </div>
  </div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const startBtn = document.getElementById("startBtn");
const resetBtn = document.getElementById("resetBtn");

const upBtn = document.getElementById("upBtn");
const downBtn = document.getElementById("downBtn");
const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");
const leftHitBtn = document.getElementById("leftHitBtn");
const rightHitBtn = document.getElementById("rightHitBtn");

const levelInfo = document.getElementById("levelInfo");
const playerScoreInfo = document.getElementById("playerScoreInfo");
const botScoreInfo = document.getElementById("botScoreInfo");
const rallyInfo = document.getElementById("rallyInfo");
const shotInfo = document.getElementById("shotInfo");
const highScoresList = document.getElementById("highScores");

const SCORE_KEY = "cyberTennisBotBattleScoresV3";

let keys = {};
let gameStarted = false;
let gameOver = false;

let level = 1;
let playerScore = 0;
let botScore = 0;
let rally = 0;
let maxLevelReached = 1;

let pointMessage = "";
let pointMessageTimer = 0;

let player;
let bot;
let ball;

let hitCooldown = 0;
let lastShotName = "READY";
let waitingServe = true;

const court = {
  x:70,
  y:35,
  width:580,
  height:450,
  netY:260
};

const playerArea = {
  x:90,
  y:275,
  width:540,
  height:190
};

const botArea = {
  x:90,
  y:55,
  width:540,
  height:185
};

const smashZone = {
  x:90,
  y:275,
  width:540,
  height:55
};

function resetGame(){
  level = 1;
  playerScore = 0;
  botScore = 0;
  rally = 0;
  maxLevelReached = 1;

  gameStarted = false;
  gameOver = false;

  pointMessage = "";
  pointMessageTimer = 0;

  hitCooldown = 0;
 lastShotName = "READY";
 waitingServe = true;
  queuedAim = 0;

  player = {
    x:330,
    y:390,
    width:36,
    height:58,
    speed:13.95,
    swingTimer:0,
    swingHitFrame:0,
    facing:-1
  };

  bot = {
    x:345,
    y:95,
    width:34,
    height:56,
    speed:4.3,
    swingTimer:0,
    swingHitFrame:0,
    facing:1
  };

  resetBallForPlayerServe();
  updateInfo();
}

function startGame(){
  if(gameOver){
    return;
  }

  gameStarted = true;
}

function resetBallForPlayerServe(){
  ball = {
    x:player.x + player.width / 2,
    y:player.y - 24,
    radius:10,
    vx:0,
    vy:0,
    speedLimit:12.5 + level * 0.48,
    waitingServe:true
  };

  rally = 0;
}

function launchPlayerServe(){
  if(!ball.waitingServe){
    return;
  }

  ball.x = player.x + player.width / 2;
  ball.y = player.y - 24;
  ball.vx = 0;
  ball.vy = -(4.7 + level * 0.23);

  ball.waitingServe = false;
  waitingServe = false;

  lastShotName = "PLAYER SERVE";
}

function botStats(){
  return {
    speed:2.0 + level * 0.25,
    error:Math.max(5,42 - level * 3.1),
    reaction:Math.max(0.055,0.22 - level * 0.012),
    hitPower:1.01 + level * 0.012
  };
}

function update(){
  if(!gameStarted || gameOver){
    if(ball && ball.waitingServe){
      ball.x = player.x + player.width / 2;
      ball.y = player.y - 24;
    }
    return;
  }

  updatePlayer();
  updateBot();
  updateBall();
  updateTimers();
  updateInfo();
}

function updatePlayer(){
  let nextX = player.x;
  let nextY = player.y;

  if(keys["ArrowUp"]){
    nextY -= player.speed;
  }

  if(keys["ArrowDown"]){
    nextY += player.speed;
  }

  if(keys["ArrowLeft"]){
    nextX -= player.speed;
  }

  if(keys["ArrowRight"]){
    nextX += player.speed;
  }

  player.x = clamp(nextX,playerArea.x,playerArea.x + playerArea.width - player.width);
  player.y = clamp(nextY,playerArea.y,playerArea.y + playerArea.height - player.height);

  if(ball.waitingServe){
    ball.x = player.x + player.width / 2;
    ball.y = player.y - 24;
  }

  if(hitCooldown > 0){
    hitCooldown--;
  }

  if(player.swingTimer > 0){
    player.swingTimer--;
  }

  if(player.swingHitFrame > 0){
    player.swingHitFrame--;
  }
}

function updateBot(){
  const stats = botStats();

  let targetX = ball.x - bot.width / 2;
  let targetY = ball.y - bot.height / 2;

  if(ball.vy < 0){
    targetX += Math.sin(Date.now() * 0.006) * stats.error;
    targetY += Math.cos(Date.now() * 0.005) * stats.error;
  }else{
    targetX = botArea.x + botArea.width / 2 - bot.width / 2;
    targetY = botArea.y + botArea.height / 2 - bot.height / 2;
  }

  bot.x += (targetX - bot.x) * stats.reaction;
  bot.y += (targetY - bot.y) * stats.reaction;

  if(bot.x < targetX){
    bot.x += Math.min(stats.speed,targetX - bot.x);
  }

  if(bot.x > targetX){
    bot.x -= Math.min(stats.speed,bot.x - targetX);
  }

  if(bot.y < targetY){
    bot.y += Math.min(stats.speed,targetY - bot.y);
  }

  if(bot.y > targetY){
    bot.y -= Math.min(stats.speed,bot.y - targetY);
  }

  bot.x = clamp(bot.x,botArea.x,botArea.x + botArea.width - bot.width);
  bot.y = clamp(bot.y,botArea.y,botArea.y + botArea.height - bot.height);

  if(bot.swingTimer > 0){
    bot.swingTimer--;
  }

  if(bot.swingHitFrame > 0){
    bot.swingHitFrame--;
  }
}

function updateBall(){
  if(ball.waitingServe){
    ball.x = player.x + player.width / 2;
    ball.y = player.y - ball.radius - 18;
    ball.vx = 0;
    ball.vy = 0;
    return;
  }

  ball.x += ball.vx;
  ball.y += ball.vy;

  if(ball.x - ball.radius <= court.x){
    ball.x = court.x + ball.radius;
    ball.vx *= -1;
  }

  if(ball.x + ball.radius >= court.x + court.width){
    ball.x = court.x + court.width - ball.radius;
    ball.vx *= -1;
  }

  checkPlayerHit();
  checkBotHit();

  if(ball.y > court.y + court.height + 45){
    botScore++;
    pointMessage = "BOT POINT";
    pointMessageTimer = 70;
    checkScore();
    resetBallForPlayerServe();
  }

  if(ball.y < court.y - 45){
    playerScore++;
    pointMessage = "PLAYER POINT";
    pointMessageTimer = 70;
    checkScore();
    resetBallForPlayerServe();
  }
}

function startPlayerSwing(aim){
  if(hitCooldown > 0){
    return;
  }

  queuedAim = aim || 0;
  player.swingTimer = 18;
  player.swingHitFrame = 9;
  hitCooldown = 22;

  if(ball.waitingServe){
    launchPlayerServe();
    if(queuedAim < 0){
      ball.vx = -4.8;
      lastShotName = "LEFT SERVE";
    }else if(queuedAim > 0){
      ball.vx = 4.8;
      lastShotName = "RIGHT SERVE";
    }else{
      lastShotName = "PLAYER SERVE";
    }
  }
}

function checkPlayerHit(){
  const manualHit = player.swingHitFrame > 0;

  if(!manualHit){
    return;
  }

  const racket = getRacketHitBox(player,true);

  const b = {
    x:ball.x - ball.radius,
    y:ball.y - ball.radius,
    width:ball.radius * 2,
    height:ball.radius * 2
  };

  if(!rectHit(racket,b)){
    return;
  }

  if(ball.vy <= 0){
    return;
  }

  const smash = isPlayerInSmashZone();
  const slowLong = keys["ArrowDown"];

  let xAim = 0;
  let yPower = 1.16;
  let addSpeed = 0.5;

  lastShotName = "SHOT";

  if(queuedAim < 0 || keys["KeyA"]){
    xAim -= 5.6;
    lastShotName = "LEFT SHOT";
  }

  if(queuedAim > 0 || keys["KeyD"]){
    xAim += 5.6;
    lastShotName = "RIGHT SHOT";
  }

  if(keys["ArrowLeft"]){
    xAim -= 2.4;
  }

  if(keys["ArrowRight"]){
    xAim += 2.4;
  }

  if(slowLong){
    yPower = 0.72;
    addSpeed = 0.08;
    xAim *= 0.65;
    lastShotName = xAim < 0 ? "LEFT SLOW" : xAim > 0 ? "RIGHT SLOW" : "SLOW LONG";
  }

  if(smash){
    yPower = 1.65;
    addSpeed = 1.35;
    lastShotName = xAim < 0 ? "LEFT SMASH" : xAim > 0 ? "RIGHT SMASH" : "SMASH";
  }

  const hitPos = (ball.x - (player.x + player.width / 2)) / (player.width / 2);

  ball.y = player.y - ball.radius - 12;

  ball.vy = -Math.min(Math.abs(ball.vy) * yPower + addSpeed,ball.speedLimit);
  ball.vx = clamp(hitPos * 3.4 + xAim,-10.5,10.5);

  player.swingHitFrame = 0;
  queuedAim = 0;
  rally++;
}

function checkBotHit(){
  const stats = botStats();

  const botReach = {
    x:bot.x - 26,
    y:bot.y + 24,
    width:bot.width + 52,
    height:bot.height + 40
  };

  const b = {
    x:ball.x - ball.radius,
    y:ball.y - ball.radius,
    width:ball.radius * 2,
    height:ball.radius * 2
  };

  if(rectHit(botReach,b) && ball.vy < 0 && bot.swingTimer <= 0){
    bot.swingTimer = 16;
    bot.swingHitFrame = 8;
  }

  if(bot.swingHitFrame <= 0){
    return;
  }

  const racket = getRacketHitBox(bot,false);

  if(!rectHit(racket,b)){
    return;
  }

  if(ball.vy >= 0){
    return;
  }

  const hitPos = (ball.x - (bot.x + bot.width / 2)) / (bot.width / 2);
  const mistake = (Math.random() - 0.5) * (stats.error / 8);

  ball.y = bot.y + bot.height + ball.radius + 12;
  ball.vy = Math.min(Math.abs(ball.vy) * stats.hitPower + 0.35,ball.speedLimit);
  ball.vx = clamp(hitPos * 3.2 + mistake,-9,9);

  bot.swingHitFrame = 0;
  rally++;
}

function getRacketHitBox(obj,isPlayer){
  const swingProgress = obj.swingTimer > 0 ? obj.swingTimer / 18 : 0;

  let offsetX = 8;
  let offsetY = isPlayer ? -8 : obj.height + 2;

  if(obj.swingTimer > 0){
    offsetX = 24 - swingProgress * 38;
    offsetY = isPlayer ? -22 + swingProgress * 28 : obj.height - 6 - swingProgress * 24;
  }

  const racketSize = isPlayer ? 69 : 46;

  return {
    x:obj.x + obj.width / 2 + offsetX - racketSize / 2,
    y:obj.y + offsetY - racketSize / 2,
    width:racketSize,
    height:racketSize
  };
}

function isPlayerInSmashZone(){
  const cx = player.x + player.width / 2;
  const cy = player.y + player.height / 2;

  return cx >= smashZone.x && cx <= smashZone.x + smashZone.width && cy >= smashZone.y && cy <= smashZone.y + smashZone.height;
}

function checkScore(){
  if(playerScore >= 5){
    level++;
    maxLevelReached = Math.max(maxLevelReached,level);
    playerScore = 0;
    botScore = 0;
    pointMessage = "LEVEL UP!";
    pointMessageTimer = 100;
  }

  if(botScore >= 5){
    gameOver = true;
    saveHighScore(maxLevelReached);
  }
}

function updateTimers(){
  if(pointMessageTimer > 0){
    pointMessageTimer--;
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawCyberCourt();
  drawMoveAreas();
  drawCyberPlayer(player,"#28f7ff",true);
  drawCyberPlayer(bot,"#ff3d77",false);
  drawBall();
  drawHud();

  if(!gameStarted){
    drawStartScreen();
  }

  if(gameOver){
    drawGameOver();
  }
}

function drawCyberCourt(){
  const g = ctx.createLinearGradient(court.x,court.y,court.x,court.y + court.height);
  g.addColorStop(0,"#0b2340");
  g.addColorStop(0.5,"#071527");
  g.addColorStop(1,"#0b2340");
  ctx.fillStyle = g;
  ctx.fillRect(court.x,court.y,court.width,court.height);

  ctx.strokeStyle = "rgba(111,252,255,0.95)";
  ctx.lineWidth = 4;
  ctx.shadowColor = "rgba(111,252,255,0.8)";
  ctx.shadowBlur = 12;
  ctx.strokeRect(court.x,court.y,court.width,court.height);

  ctx.shadowBlur = 0;
  ctx.lineWidth = 2;
  ctx.strokeStyle = "rgba(111,252,255,0.42)";

  for(let x = court.x + 40; x < court.x + court.width; x += 40){
    ctx.beginPath();
    ctx.moveTo(x,court.y);
    ctx.lineTo(x,court.y + court.height);
    ctx.stroke();
  }

  for(let y = court.y + 30; y < court.y + court.height; y += 30){
    ctx.beginPath();
    ctx.moveTo(court.x,y);
    ctx.lineTo(court.x + court.width,y);
    ctx.stroke();
  }

  ctx.strokeStyle = "rgba(255,255,255,0.75)";
  ctx.lineWidth = 3;
  ctx.strokeRect(court.x + 70,court.y + 35,court.width - 140,155);
  ctx.strokeRect(court.x + 70,court.netY + 35,court.width - 140,155);

  ctx.beginPath();
  ctx.moveTo(court.x + 70,court.y);
  ctx.lineTo(court.x + 70,court.y + court.height);
  ctx.moveTo(court.x + court.width - 70,court.y);
  ctx.lineTo(court.x + court.width - 70,court.y + court.height);
  ctx.moveTo(court.x + court.width / 2,court.y);
  ctx.lineTo(court.x + court.width / 2,court.y + court.height);
  ctx.stroke();

  drawNet();
}

function drawNet(){
  const netX = court.x + 35;
  const netY = court.netY - 12;
  const netW = court.width - 70;
  const netH = 24;

  ctx.save();
  ctx.fillStyle = "rgba(111,252,255,0.22)";
  ctx.fillRect(netX,netY,netW,netH);

  ctx.strokeStyle = "rgba(111,252,255,0.82)";
  ctx.lineWidth = 1;
  ctx.shadowColor = "#6ffcff";
  ctx.shadowBlur = 8;

  for(let x = netX; x <= netX + netW; x += 12){
    ctx.beginPath();
    ctx.moveTo(x,netY);
    ctx.lineTo(x,netY + netH);
    ctx.stroke();
  }

  for(let y = netY; y <= netY + netH; y += 6){
    ctx.beginPath();
    ctx.moveTo(netX,y);
    ctx.lineTo(netX + netW,y);
    ctx.stroke();
  }

  ctx.restore();
}

function drawMoveAreas(){
  ctx.fillStyle = "rgba(40,247,255,0.06)";
  ctx.fillRect(playerArea.x,playerArea.y,playerArea.width,playerArea.height);

  ctx.strokeStyle = "rgba(40,247,255,0.48)";
  ctx.lineWidth = 2;
  ctx.strokeRect(playerArea.x,playerArea.y,playerArea.width,playerArea.height);

  ctx.fillStyle = "rgba(255,255,255,0.13)";
  ctx.fillRect(smashZone.x,smashZone.y,smashZone.width,smashZone.height);

  ctx.fillStyle = "#ffffff";
  ctx.font = "13px sans-serif";
  ctx.fillText("SMASH ZONE",smashZone.x + 210,smashZone.y + 34);

  ctx.fillStyle = "rgba(255,61,119,0.08)";
  ctx.fillRect(botArea.x,botArea.y,botArea.width,botArea.height);

  ctx.strokeStyle = "rgba(255,61,119,0.48)";
  ctx.strokeRect(botArea.x,botArea.y,botArea.width,botArea.height);
}

function drawCyberPlayer(obj,color,isPlayer){
  const x = obj.x;
  const y = obj.y;

  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = 14;

  const bodyG = ctx.createLinearGradient(x,y,x + obj.width,y + obj.height);
  bodyG.addColorStop(0,isPlayer ? "#c9feff" : "#ffd1df");
  bodyG.addColorStop(0.28,color);
  bodyG.addColorStop(1,isPlayer ? "#1237a8" : "#731629");

  ctx.fillStyle = bodyG;
  roundedRect(x,y + 20,obj.width,obj.height - 18,8,true,false);

  ctx.strokeStyle = "rgba(255,255,255,0.7)";
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x + 6,y + 28,obj.width - 12,11);
  ctx.beginPath();
  ctx.moveTo(x + obj.width / 2,y + 39);
  ctx.lineTo(x + obj.width / 2,y + obj.height - 2);
  ctx.moveTo(x + 8,y + 49);
  ctx.lineTo(x + obj.width - 8,y + 49);
  ctx.stroke();

  ctx.fillStyle = isPlayer ? "#06121f" : "#170711";
  ctx.beginPath();
  ctx.arc(x + obj.width / 2,y + 12,14,0,Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = color;
  roundedRect(x + 7,y + 8,obj.width - 14,8,4,true,false);

  ctx.strokeStyle = color;
  ctx.beginPath();
  ctx.moveTo(x + obj.width / 2,y - 2);
  ctx.lineTo(x + obj.width / 2,y - 12);
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x + obj.width / 2,y - 13,3,0,Math.PI * 2);
  ctx.fill();

  const swing = obj.swingTimer > 0;
  const swingRate = swing ? obj.swingTimer / 18 : 0;

  let armAngle;

  if(isPlayer){
    armAngle = swing ? -2.25 + swingRate * 2.15 : -0.65;
  }else{
    armAngle = swing ? 2.25 - swingRate * 2.15 : 0.65;
  }

  const shoulderX = x + obj.width / 2;
  const shoulderY = y + 35;
  const armLen = 39;

  const racketX = shoulderX + Math.cos(armAngle) * armLen;
  const racketY = shoulderY + Math.sin(armAngle) * armLen;

  ctx.strokeStyle = "rgba(255,255,255,0.9)";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(shoulderX,shoulderY);
  ctx.lineTo(racketX,racketY);
  ctx.stroke();

  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.ellipse(racketX + 8,racketY,12,18,armAngle,0,Math.PI * 2);
  ctx.stroke();

  ctx.strokeStyle = "rgba(255,255,255,0.45)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(racketX - 3,racketY - 12);
  ctx.lineTo(racketX + 17,racketY + 12);
  ctx.moveTo(racketX + 17,racketY - 12);
  ctx.lineTo(racketX - 3,racketY + 12);
  ctx.stroke();

  if(swing){
    ctx.strokeStyle = color;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(shoulderX,shoulderY,58,isPlayer ? -2.2 : -0.8,isPlayer ? -0.4 : 1.0);
    ctx.stroke();

    ctx.strokeStyle = "rgba(255,255,255,0.28)";
    ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.arc(shoulderX,shoulderY,58,isPlayer ? -2.0 : -0.6,isPlayer ? -0.5 : 0.9);
    ctx.stroke();
  }

  ctx.restore();
}

function roundedRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x + r,y);
  ctx.lineTo(x + w - r,y);
  ctx.quadraticCurveTo(x + w,y,x + w,y + r);
  ctx.lineTo(x + w,y + h - r);
  ctx.quadraticCurveTo(x + w,y + h,x + w - r,y + h);
  ctx.lineTo(x + r,y + h);
  ctx.quadraticCurveTo(x,y + h,x,y + h - r);
  ctx.lineTo(x,y + r);
  ctx.quadraticCurveTo(x,y,x + r,y);
  if(fill){ ctx.fill(); }
  if(stroke){ ctx.stroke(); }
}

function drawBall(){
  ctx.save();
  ctx.shadowColor = "#e9ff3a";
  ctx.shadowBlur = 20;
  ctx.fillStyle = "#e9ff3a";
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,0.65)";
  ctx.beginPath();
  ctx.arc(ball.x - 3,ball.y - 3,3,0,Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawHud(){

  ctx.font = "28px sans-serif";

  ctx.fillText(playerScore,court.x + 20,court.y + 78);

  ctx.font = "18px sans-serif";

  ctx.fillStyle = "#d6fbff";
  ctx.font = "14px sans-serif";
  ctx.fillText("RALLY " + rally,canvas.width / 2 - 35,50);
  ctx.fillText("SHOT " + lastShotName,canvas.width / 2 - 60,70);

  if(pointMessageTimer > 0){
    ctx.fillStyle = "#ffffff";
    ctx.font = "36px sans-serif";
    ctx.fillText(pointMessage,canvas.width / 2 - ctx.measureText(pointMessage).width / 2,canvas.height / 2 - 35);
  }
}

function updateInfo(){
  levelInfo.textContent = level;
  playerScoreInfo.textContent = playerScore;
  botScoreInfo.textContent = botScore;
  rallyInfo.textContent = rally;
  shotInfo.textContent = lastShotName;
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function clamp(value,min,max){
  return Math.max(min,Math.min(max,value));
}

function rectHit(a,b){
  return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
}

function getHighScores(){
  const data = localStorage.getItem(SCORE_KEY);

  if(!data){
    return [];
  }

  try{
    const parsed = JSON.parse(data);
    return Array.isArray(parsed) ? parsed : [];
  }catch(e){
    return [];
  }
}

function saveHighScore(score){
  let scores = getHighScores();
  scores.push(score);
  scores.sort((a,b)=>b-a);
  scores = scores.slice(0,10);
  localStorage.setItem(SCORE_KEY,JSON.stringify(scores));
  showHighScores();
}

function showHighScores(){
  const scores = getHighScores();
  highScoresList.innerHTML = "";

  for(let i = 0; i < 10; i++){
    const li = document.createElement("li");
    li.textContent = scores[i] !== undefined ? "LEVEL " + scores[i] : "-";
    highScoresList.appendChild(li);
  }
}

document.addEventListener("keydown",e=>{
  keys[e.code] = true;

  if(e.code === "Enter"){
    startGame();
  }

  if(e.code === "KeyA"){
    startPlayerSwing(-1);
  }

  if(e.code === "KeyD"){
    startPlayerSwing(1);
  }

  if(e.code === "KeyR"){
  resetGame();
  gameStarted = true;
  }
});

document.addEventListener("keyup",e=>{
  keys[e.code] = false;
});

function holdButton(button,code){
  button.addEventListener("touchstart",e=>{
    e.preventDefault();
    keys[code] = true;
  },{passive:false});

  button.addEventListener("touchend",e=>{
    e.preventDefault();
    keys[code] = false;
  },{passive:false});

  button.addEventListener("touchcancel",e=>{
    e.preventDefault();
    keys[code] = false;
  },{passive:false});

  button.addEventListener("mousedown",()=>{
    keys[code] = true;
  });

  button.addEventListener("mouseup",()=>{
    keys[code] = false;
  });

  button.addEventListener("mouseleave",()=>{
    keys[code] = false;
  });
}

function tapHitButton(button,aim){
  button.addEventListener("touchstart",e=>{
    e.preventDefault();
    startPlayerSwing(aim);
  },{passive:false});

  button.addEventListener("click",()=>{
    startPlayerSwing(aim);
  });
}

holdButton(upBtn,"ArrowUp");
holdButton(downBtn,"ArrowDown");
holdButton(leftBtn,"ArrowLeft");
holdButton(rightBtn,"ArrowRight");
tapHitButton(leftHitBtn,-1);
tapHitButton(rightHitBtn,1);

startBtn.addEventListener("click",()=>{
  startGame();
});

startBtn.addEventListener("touchstart",e=>{
  e.preventDefault();
  startGame();
},{passive:false});

resetBtn.addEventListener("click",()=>{
  resetGame();
  gameStarted = true;
});

resetBtn.addEventListener("touchstart",e=>{
  e.preventDefault();
  resetGame();
  gameStarted = true;
},{passive:false});

resetGame();
showHighScores();
loop();
</script>
