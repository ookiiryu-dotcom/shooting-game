<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SERVER CORE BATTLE</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:radial-gradient(circle at top,#152033,#03060d 70%);
  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

h1{
  margin:18px 0 8px;
  color:#66ccff;
  text-shadow:0 0 10px #66ccff,0 0 25px #66ccff;
}

p{
  color:#ddd;
}

.top-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.top-buttons button,
.top-buttons a{
  width:160px;
  height:46px;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:bold;
  color:white;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
}

.reset-btn{
  background:#1f5fbf;
}

.back-btn{
  background:#222;
  border:1px solid #66ccff;
}

.game-layout{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:18px;
  padding:0 12px 24px;
}

.game-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

canvas{
  width:720px;
  max-width:96vw;
  height:auto;
  background:linear-gradient(to bottom,#09111f,#02040a);
  border:2px solid #66ccff;
  box-shadow:
    0 0 20px #66ccff,
    inset 0 0 20px rgba(0,255,255,0.08);
}

.controls{
  width:720px;
  max-width:96vw;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:64px 64px 64px;
  gap:10px;
  margin-top:14px;
}

.controls button{
  border:none;
  border-radius:14px;
  color:white;
  font-size:15px;
  font-weight:bold;
  background:#1a1a1a;
  border:1px solid #66ccff;
  box-shadow:0 0 10px rgba(0,255,255,0.3);
}

#redGuardBtn{
  grid-column:1;
  grid-row:1;
}

#redAttackBtn{
  grid-column:2;
  grid-row:1;
}

#blueGuardBtn{
  grid-column:1;
  grid-row:2;
}

#blueAttackBtn{
  grid-column:2;
  grid-row:2;
}

#greenGuardBtn{
  grid-column:1;
  grid-row:3;
}

#greenAttackBtn{
  grid-column:2;
  grid-row:3;
}

.move-panel{
  grid-column:3;
  grid-row:1 / 4;
  display:grid;
  grid-template-rows:1fr 1fr;
  gap:10px;
}

.vertical-btn{
  font-size:42px !important;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}

.red{
  background:#992222 !important;
}

.blue{
  background:#224499 !important;
}

.green{
  background:#228844 !important;
}

.move{
  background:#333 !important;
}

.score-board{
  width:240px;
  background:rgba(10,20,35,0.95);
  border:1px solid #66ccff;
  border-radius:14px;
  padding:14px;
  text-align:left;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.score-board h2{
  text-align:center;
  color:#66ccff;
}

.score-board li{
  margin-bottom:7px;
}

@media(max-width:900px){
  .game-layout{
    flex-direction:column;
    align-items:center;
  }

  .score-board{
    width:96vw;
    max-width:720px;
  }

  .vertical-btn{
    font-size:36px !important;
  }
}
</style>
</head>

<body>

<h1>SERVER CORE BATTLE</h1>

<p>↑ ↓ 移動 / 色攻撃 / 色防御</p>

<div class="top-buttons">
  <button id="resetBtn" class="reset-btn">RESET</button>
  <a href="index.html" class="back-btn">← ホームへ戻る</a>
</div>

<div class="game-layout">

  <div class="game-wrap">

    <canvas id="game" width="720" height="480"></canvas>

    <div class="controls">

      <button id="redGuardBtn" class="red">赤防御</button>
      <button id="redAttackBtn" class="red">赤攻撃</button>

      <button id="blueGuardBtn" class="blue">青防御</button>
      <button id="blueAttackBtn" class="blue">青攻撃</button>

      <button id="greenGuardBtn" class="green">緑防御</button>
      <button id="greenAttackBtn" class="green">緑攻撃</button>

      <div class="move-panel">
        <button id="upBtn" class="move vertical-btn">↑</button>
        <button id="downBtn" class="move vertical-btn">↓</button>
      </div>

    </div>

  </div>

  <div class="score-board">
    <h2>High Scores</h2>
    <ol id="highScores"></ol>
  </div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameStarted = false;
let gameOver = false;

let keys = {};

let level = 1;

let player;
let enemy;

let playerShots = [];
let enemyShots = [];

function resetGame(){
  player = {
    x:80,
    y:200,
    targetY:200,
    width:60,
    height:60,
    hp:100,
    barrier:null,
    barrierTimer:0
  };

  level = 1;

  spawnEnemy();

  playerShots = [];
  enemyShots = [];

  gameOver = false;
}

function spawnEnemy(){
  enemy = {
    x:580,
    y:200,
    targetY:200,
    width:60,
    height:60,
    hp:120 + level * 25,
    maxHp:120 + level * 25,
    barrier:null,
    barrierTimer:0,
    aiLevel:0.25 + level * 0.06,
    moveTimer:0,
    shootCooldown:80,
    burstCount:0,
    burstTimer:0
  };
}

function enemyColor(){
  if(level < 4){
    return "#55ff88";
  }

  if(level < 7){
    return "#ffaa33";
  }

  if(level < 10){
    return "#ff4444";
  }

  return "#cc44ff";
}

function shoot(color){
  if(!gameStarted){
    gameStarted = true;
    return;
  }

  playerShots.push({
    x:player.x + 55,
    y:player.y + 24,
    width:22,
    height:12,
    speed:10,
    color:color
  });
}

function activateBarrier(color){
  player.barrier = color;
  player.barrierTimer = 180;
}

function enemyShoot(color){
  enemyShots.push({
    x:enemy.x,
    y:enemy.y + 24,
    width:22,
    height:12,
    speed:9 + level * 0.15,
    color:color
  });
}

function randomColor(){
  const colors = ["red","blue","green"];
  return colors[Math.floor(Math.random() * 3)];
}
function update(){
  if(!gameStarted) return;
  if(gameOver) return;

  if(keys["ArrowUp"]){
    player.targetY -= 10;
  }

  if(keys["ArrowDown"]){
    player.targetY += 10;
  }

  player.targetY = Math.max(
    0,
    Math.min(canvas.height - player.height, player.targetY)
  );

  player.y += (player.targetY - player.y) * 0.22;

  enemy.moveTimer--;

  if(enemy.moveTimer <= 0){
    enemy.targetY = Math.random() * (canvas.height - enemy.height);
    enemy.moveTimer = Math.max(12, 45 - level * 2);
  }

  enemy.y += (enemy.targetY - enemy.y) * Math.min(0.32, 0.12 + level * 0.012);

  enemy.shootCooldown--;

  if(enemy.shootCooldown <= 0){
    enemy.burstCount = 1 + Math.min(4, Math.floor(level / 3));
    enemy.burstTimer = 0;
    enemy.shootCooldown = Math.max(28, 95 - level * 5);
  }

  if(enemy.burstCount > 0){
    enemy.burstTimer--;

    if(enemy.burstTimer <= 0){
      enemyShoot(randomColor());
      enemy.burstCount--;
      enemy.burstTimer = Math.max(8, 18 - level);
    }
  }

  if(Math.random() < enemy.aiLevel * 0.012){
    enemy.barrier = randomColor();
    enemy.barrierTimer = 180;
  }

  enemy.hp = Math.min(
    enemy.maxHp,
    enemy.hp + 0.02 * level
  );

  playerShots.forEach(s=>{
    s.x += s.speed;
  });

  enemyShots.forEach(s=>{
    s.x -= s.speed;
  });

  playerShots.forEach(s=>{
    if(
      s.x < enemy.x + enemy.width &&
      s.x + s.width > enemy.x &&
      s.y < enemy.y + enemy.height &&
      s.y + s.height > enemy.y
    ){
      if(enemy.barrier === s.color){
        enemy.barrier = null;
      }else{
        enemy.hp -= 16;
      }

      s.hit = true;
    }
  });

  enemyShots.forEach(s=>{
    if(
      s.x < player.x + player.width &&
      s.x + s.width > player.x &&
      s.y < player.y + player.height &&
      s.y + s.height > player.y
    ){
      if(player.barrier === s.color){
        player.barrier = null;
      }else{
        player.hp -= 15;
      }

      s.hit = true;
    }
  });

  playerShots = playerShots.filter(
    s=>!s.hit && s.x < canvas.width
  );

  enemyShots = enemyShots.filter(
    s=>!s.hit && s.x > -40
  );

  if(player.barrierTimer > 0){
    player.barrierTimer--;

    if(player.barrierTimer <= 0){
      player.barrier = null;
    }
  }

  if(enemy.barrierTimer > 0){
    enemy.barrierTimer--;

    if(enemy.barrierTimer <= 0){
      enemy.barrier = null;
    }
  }

  if(enemy.hp <= 0){
    level++;
    player.hp = 100;
    spawnEnemy();
  }

  if(player.hp <= 0){
    gameOver = true;
  }
}

function drawBarrier(obj){
  if(!obj.barrier) return;

  if(obj.barrier === "red"){
    ctx.strokeStyle = "#ff4444";
  }

  if(obj.barrier === "blue"){
    ctx.strokeStyle = "#4488ff";
  }

  if(obj.barrier === "green"){
    ctx.strokeStyle = "#44ff88";
  }

  ctx.lineWidth = 5;

  ctx.beginPath();

  ctx.arc(
    obj.x + 30,
    obj.y + 30,
    45,
    0,
    Math.PI * 2
  );

  ctx.stroke();
}

function drawPlayer(){
  ctx.fillStyle = "#66ccff";

  ctx.fillRect(
    player.x,
    player.y,
    60,
    60
  );

  ctx.fillStyle = "#ffffff";

  ctx.fillRect(
    player.x + 14,
    player.y + 18,
    32,
    10
  );

  ctx.fillRect(
    player.x + 22,
    player.y + 35,
    16,
    10
  );

  drawBarrier(player);
}

function drawEnemy(){
  ctx.fillStyle = enemyColor();

  ctx.beginPath();

  ctx.arc(
    enemy.x + 30,
    enemy.y + 30,
    28,
    0,
    Math.PI * 2
  );

  ctx.fill();

  for(let i = 0; i < 8; i++){
    const angle = (Math.PI * 2 / 8) * i;

    ctx.strokeStyle = enemyColor();
    ctx.lineWidth = 4;

    ctx.beginPath();

    ctx.moveTo(
      enemy.x + 30,
      enemy.y + 30
    );

    ctx.lineTo(
      enemy.x + 30 + Math.cos(angle) * 42,
      enemy.y + 30 + Math.sin(angle) * 42
    );

    ctx.stroke();
  }

  drawBarrier(enemy);
}

function drawShot(s){
  if(s.color === "red"){
    ctx.fillStyle = "#ff4444";
  }

  if(s.color === "blue"){
    ctx.fillStyle = "#4488ff";
  }

  if(s.color === "green"){
    ctx.fillStyle = "#44ff88";
  }

  ctx.shadowColor = ctx.fillStyle;
  ctx.shadowBlur = 10;

  ctx.fillRect(
    s.x,
    s.y,
    s.width,
    s.height
  );

  ctx.shadowBlur = 0;
}

function drawStartScreen(){
  ctx.fillStyle = "rgba(0,0,0,0.82)";

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.fillStyle = "#66ccff";

  ctx.font = "54px sans-serif";

  ctx.fillText(
    "SERVER CORE",
    180,
    170
  );

  ctx.fillText(
    "BATTLE",
    250,
    240
  );

  ctx.fillStyle = "white";

  ctx.font = "28px sans-serif";

  ctx.fillText(
    "赤攻撃ボタンで開始",
    220,
    340
  );
}

function draw(){
  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.fillStyle = "rgba(0,255,255,0.06)";

  for(let i = 0; i < canvas.height; i += 40){
    ctx.fillRect(
      0,
      i,
      canvas.width,
      1
    );
  }

  drawPlayer();
  drawEnemy();

  playerShots.forEach(drawShot);
  enemyShots.forEach(drawShot);

  ctx.fillStyle = "#333";

  ctx.fillRect(20,20,220,18);

  ctx.fillStyle = "#66ccff";

  ctx.fillRect(
    20,
    20,
    player.hp * 2.2,
    18
  );

  ctx.fillStyle = "#333";

  ctx.fillRect(480,20,220,18);

  ctx.fillStyle = enemyColor();

  ctx.fillRect(
    480,
    20,
    enemy.hp / enemy.maxHp * 220,
    18
  );

  ctx.fillStyle = "white";

  ctx.font = "24px sans-serif";

  ctx.fillText(
    "LEVEL : " + level,
    300,
    40
  );

  if(!gameStarted){
    drawStartScreen();
  }

  if(gameOver){
    ctx.fillStyle = "rgba(0,0,0,0.7)";

    ctx.fillRect(
      0,
      0,
      canvas.width,
      canvas.height
    );

    ctx.fillStyle = "#ff3355";

    ctx.font = "60px sans-serif";

    ctx.fillText(
      "GAME OVER",
      170,
      220
    );
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener("keydown",e=>{
  keys[e.code] = true;

  if(e.code === "KeyZ"){
    shoot("red");
  }

  if(e.code === "KeyX"){
    shoot("blue");
  }

  if(e.code === "KeyC"){
    shoot("green");
  }

  if(e.code === "KeyA"){
    activateBarrier("red");
  }

  if(e.code === "KeyS"){
    activateBarrier("blue");
  }

  if(e.code === "KeyD"){
    activateBarrier("green");
  }
});

document.addEventListener("keyup",e=>{
  keys[e.code] = false;
});

function holdButton(id,code){
  const btn = document.getElementById(id);

  btn.addEventListener("touchstart",e=>{
    e.preventDefault();
    keys[code] = true;
  });

  btn.addEventListener("touchend",e=>{
    e.preventDefault();
    keys[code] = false;
  });

  btn.addEventListener("mousedown",()=>{
    keys[code] = true;
  });

  btn.addEventListener("mouseup",()=>{
    keys[code] = false;
  });

  btn.addEventListener("mouseleave",()=>{
    keys[code] = false;
  });
}

holdButton("upBtn","ArrowUp");
holdButton("downBtn","ArrowDown");

function tapButton(id,func){
  const btn = document.getElementById(id);

  btn.addEventListener("touchstart",e=>{
    e.preventDefault();
    func();
  });

  btn.addEventListener("click",func);
}

tapButton("redAttackBtn",()=>shoot("red"));
tapButton("blueAttackBtn",()=>shoot("blue"));
tapButton("greenAttackBtn",()=>shoot("green"));

tapButton("redGuardBtn",()=>activateBarrier("red"));
tapButton("blueGuardBtn",()=>activateBarrier("blue"));
tapButton("greenGuardBtn",()=>activateBarrier("green"));

document.getElementById("resetBtn").addEventListener("click",()=>{
  gameStarted = true;
  resetGame();
});

resetGame();
loop();
</script>

</body>
</html>
