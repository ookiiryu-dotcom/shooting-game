<!-- 変更点まとめ -->
<!-- ========================= -->

<!--
■ ゲーム性変更

・左右移動 → 縦移動のみ
・ジャンプ削除
・ダッシュ削除
・近距離攻撃削除
・遠距離攻撃のみ

■ 色属性追加

赤攻撃
青攻撃
緑攻撃

赤防御
青防御
緑防御

→ 同じ色だけ防げる
→ 別色は貫通

■ 防御仕様

・3秒で消滅
・1回受けると消滅

■ 敵AI強化

・上下ランダム移動
・ランダム攻撃
・ランダム防御
・高レベルほど反応精度上昇

■ ボタン配置

        赤防御 赤攻撃
上      青防御 青攻撃      下
        緑防御 緑攻撃

-->

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>COLOR BATTLE AI</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:
  radial-gradient(circle at top,#101830,#050510 70%);
  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow-x:hidden;
}

h1{
  margin:18px 0 8px;
  color:#66ccff;
  text-shadow:0 0 16px #66ccff;
}

p{
  margin:0 0 12px;
  color:#ddd;
  font-size:14px;
}

.top-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.top-buttons button,
.top-buttons a{
  width:150px;
  height:44px;
  line-height:44px;
  border:none;
  border-radius:12px;
  color:white;
  font-size:15px;
  font-weight:bold;
  text-decoration:none;
}

.reset-btn{
  background:#1f5fbf;
}

.back-btn{
  background:#333;
  border:1px solid #666;
}

.game-layout{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:18px;
  padding:0 12px 24px;
}

.game-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

canvas{
  background:
  linear-gradient(to bottom,#0b1025,#050510);

  border:2px solid #66ccff;

  box-shadow:
    0 0 25px #66ccff;

  width:720px;
  max-width:96vw;
  height:auto;
}

.controls{

  width:720px;
  max-width:96vw;

  display:grid;

  grid-template-columns:
  1fr 1fr 1fr 1fr;

  gap:10px;

  margin-top:14px;
}

.controls button{

  height:58px;

  border:none;
  border-radius:14px;

  color:white;
  font-size:15px;
  font-weight:bold;

  background:#222;

  border:1px solid #66ccff;
}

.red{
  background:#992222 !important;
}

.blue{
  background:#224499 !important;
}

.green{
  background:#228844 !important;
}

.move{
  background:#444 !important;
}

.score-board{
  width:230px;

  background:rgba(10,20,35,0.92);

  border:1px solid #66ccff;

  border-radius:14px;

  padding:14px;

  text-align:left;
}

.score-board h2{
  margin:0 0 10px;
  text-align:center;
  color:#66ccff;
}

.score-board ol{
  margin:0;
  padding-left:24px;
}

.score-board li{
  margin-bottom:7px;
}

@media(max-width:900px){

  .game-layout{
    flex-direction:column;
    align-items:center;
  }

  .score-board{
    width:96vw;
    max-width:720px;
  }

}

</style>
</head>

<body>

<h1>COLOR BATTLE AI</h1>

<p>
↑ ↓ 移動 /
色攻撃 /
色防御
</p>

<div class="top-buttons">

  <button
  id="resetBtn"
  class="reset-btn">
    RESET
  </button>

  <a
  href="index.html"
  class="back-btn">
    ← ホームへ戻る
  </a>

</div>

<div class="game-layout">

  <div class="game-wrap">

    <canvas
    id="game"
    width="720"
    height="480">
    </canvas>

    <div class="controls">

      <button id="upBtn" class="move">
        ↑
      </button>

      <button id="redGuardBtn" class="red">
        赤防御
      </button>

      <button id="redAttackBtn" class="red">
        赤攻撃
      </button>

      <button id="downBtn" class="move">
        ↓
      </button>

      <button style="opacity:0"></button>

      <button id="blueGuardBtn" class="blue">
        青防御
      </button>

      <button id="blueAttackBtn" class="blue">
        青攻撃
      </button>

      <button style="opacity:0"></button>

      <button style="opacity:0"></button>

      <button id="greenGuardBtn" class="green">
        緑防御
      </button>

      <button id="greenAttackBtn" class="green">
        緑攻撃
      </button>

      <button style="opacity:0"></button>

    </div>

  </div>

  <div class="score-board">

    <h2>High Scores</h2>

    <ol id="highScores"></ol>

  </div>

</div>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

const highScoresList =
document.getElementById("highScores");

let keys = {};

let level = 1;

let gameStarted = true;
let gameOver = false;

let player;
let enemy;

let playerShots = [];
let enemyShots = [];

function resetGame(){

  player = {

    x:80,
    y:200,

    width:60,
    height:60,

    hp:100,

    speed:7,

    barrier:null,

    barrierTimer:0
  };

  spawnEnemy();

  level = 1;

  playerShots = [];
  enemyShots = [];

  gameOver = false;
}

function spawnEnemy(){

  enemy = {

    x:580,
    y:200,

    width:60,
    height:60,

    hp:100 + level*20,

    speed:4 + level*0.2,

    barrier:null,

    barrierTimer:0,

    aiLevel:
    0.3 + level*0.08,

    thinkTimer:0
  };
}

function shoot(color){

  playerShots.push({

    x:player.x + 50,

    y:player.y + 25,

    width:20,
    height:12,

    speed:10,

    color:color
  });
}

function activateBarrier(color){

  player.barrier = color;

  player.barrierTimer = 180;
}

function enemyShoot(color){

  enemyShots.push({

    x:enemy.x,

    y:enemy.y + 25,

    width:20,
    height:12,

    speed:9,

    color:color
  });
}

function enemyBarrier(color){

  enemy.barrier = color;

  enemy.barrierTimer = 180;
}

function randomColor(){

  const colors =
  ["red","blue","green"];

  return colors[
    Math.floor(Math.random()*3)
  ];
}

function update(){

  if(gameOver) return;

  if(keys["ArrowUp"]){
    player.y -= player.speed;
  }

  if(keys["ArrowDown"]){
    player.y += player.speed;
  }

  player.y = Math.max(
    0,
    Math.min(
      canvas.height-player.height,
      player.y
    )
  );

  enemy.thinkTimer--;

  if(enemy.thinkTimer <= 0){

    const move =
    Math.random() < 0.5
    ? -1
    : 1;

    enemy.y +=
    move *
    enemy.speed *
    (4 + Math.random()*4);

    enemy.thinkTimer =
    8 + Math.random()*15;

    if(Math.random() <
       enemy.aiLevel){

      enemyShoot(
        randomColor()
      );
    }

    if(Math.random() <
       enemy.aiLevel * 0.7){

      enemyBarrier(
        randomColor()
      );
    }
  }

  enemy.y = Math.max(
    0,
    Math.min(
      canvas.height-enemy.height,
      enemy.y
    )
  );

  playerShots.forEach(s=>{
    s.x += s.speed;
  });

  enemyShots.forEach(s=>{
    s.x -= s.speed;
  });

  playerShots.forEach(s=>{

    if(
      s.x <
      enemy.x + enemy.width &&

      s.x + s.width >
      enemy.x &&

      s.y <
      enemy.y + enemy.height &&

      s.y + s.height >
      enemy.y
    ){

      if(enemy.barrier === s.color){

        enemy.barrier = null;

      }else{

        enemy.hp -= 12;
      }

      s.hit = true;
    }

  });

  enemyShots.forEach(s=>{

    if(
      s.x <
      player.x + player.width &&

      s.x + s.width >
      player.x &&

      s.y <
      player.y + player.height &&

      s.y + s.height >
      player.y
    ){

      if(player.barrier === s.color){

        player.barrier = null;

      }else{

        player.hp -= 12;
      }

      s.hit = true;
    }

  });

  playerShots =
  playerShots.filter(
    s=>!s.hit && s.x < canvas.width
  );

  enemyShots =
  enemyShots.filter(
    s=>!s.hit && s.x > -40
  );

  if(player.barrierTimer > 0){

    player.barrierTimer--;

    if(player.barrierTimer <= 0){

      player.barrier = null;
    }
  }

  if(enemy.barrierTimer > 0){

    enemy.barrierTimer--;

    if(enemy.barrierTimer <= 0){

      enemy.barrier = null;
    }
  }

  if(enemy.hp <= 0){

    level++;

    spawnEnemy();
  }

  if(player.hp <= 0){

    gameOver = true;
  }
}

function drawCharacter(obj,isPlayer){

  ctx.fillStyle =
  isPlayer
  ? "#66ccff"
  : "#ff4444";

  ctx.fillRect(
    obj.x,
    obj.y,
    obj.width,
    obj.height
  );

  ctx.fillStyle =
  "white";

  ctx.fillRect(
    obj.x + 15,
    obj.y + 15,
    30,
    10
  );

  if(obj.barrier){

    ctx.lineWidth = 6;

    if(obj.barrier==="red"){
      ctx.strokeStyle="#ff4444";
    }

    if(obj.barrier==="blue"){
      ctx.strokeStyle="#4488ff";
    }

    if(obj.barrier==="green"){
      ctx.strokeStyle="#44ff88";
    }

    ctx.beginPath();

    ctx.arc(
      obj.x + 30,
      obj.y + 30,
      48,
      0,
      Math.PI*2
    );

    ctx.stroke();
  }
}

function drawShot(s){

  if(s.color==="red"){
    ctx.fillStyle="#ff4444";
  }

  if(s.color==="blue"){
    ctx.fillStyle="#4488ff";
  }

  if(s.color==="green"){
    ctx.fillStyle="#44ff88";
  }

  ctx.fillRect(
    s.x,
    s.y,
    s.width,
    s.height
  );
}

function draw(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  drawCharacter(player,true);

  drawCharacter(enemy,false);

  playerShots.forEach(drawShot);

  enemyShots.forEach(drawShot);

  ctx.fillStyle="#333";

  ctx.fillRect(20,20,220,20);

  ctx.fillStyle="#66ccff";

  ctx.fillRect(
    20,
    20,
    player.hp * 2.2,
    20
  );

  ctx.fillStyle="#333";

  ctx.fillRect(480,20,220,20);

  ctx.fillStyle="#ff4444";

  ctx.fillRect(
    480,
    20,
    enemy.hp * 1.5,
    20
  );

  ctx.fillStyle="white";

  ctx.font="24px sans-serif";

  ctx.fillText(
    "LEVEL : " + level,
    300,
    40
  );

  if(gameOver){

    ctx.fillStyle =
    "rgba(0,0,0,0.7)";

    ctx.fillRect(
      0,
      0,
      canvas.width,
      canvas.height
    );

    ctx.fillStyle =
    "#ff3355";

    ctx.font =
    "56px sans-serif";

    ctx.fillText(
      "GAME OVER",
      180,
      180
    );
  }
}

function loop(){

  update();

  draw();

  requestAnimationFrame(loop);
}

function addButton(id,action){

  const btn =
  document.getElementById(id);

  btn.addEventListener(
    "touchstart",
    e=>{
      e.preventDefault();
      action();
    }
  );

  btn.addEventListener(
    "click",
    action
  );
}

document.addEventListener(
"keydown",
e=>{

  keys[e.code]=true;

  if(e.code==="KeyZ"){
    shoot("red");
  }

  if(e.code==="KeyX"){
    shoot("blue");
  }

  if(e.code==="KeyC"){
    shoot("green");
  }

  if(e.code==="KeyA"){
    activateBarrier("red");
  }

  if(e.code==="KeyS"){
    activateBarrier("blue");
  }

  if(e.code==="KeyD"){
    activateBarrier("green");
  }

});

document.addEventListener(
"keyup",
e=>{
  keys[e.code]=false;
});

addButton(
"redAttackBtn",
()=>shoot("red")
);

addButton(
"blueAttackBtn",
()=>shoot("blue")
);

addButton(
"greenAttackBtn",
()=>shoot("green")
);

addButton(
"redGuardBtn",
()=>activateBarrier("red")
);

addButton(
"blueGuardBtn",
()=>activateBarrier("blue")
);

addButton(
"greenGuardBtn",
()=>activateBarrier("green")
);

addButton(
"upBtn",
()=>player.y -= 40
);

addButton(
"downBtn",
()=>player.y += 40
);

document.getElementById(
"resetBtn"
).addEventListener(
"click",
resetGame
);

resetGame();

loop();

</script>

</body>
</html>
