<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Cyber Hero Battle</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:
  radial-gradient(circle at top,
  #1a1a4a,#050510 70%);

  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow-x:hidden;
}

h1{
  margin:18px 0 8px;
  color:#00ffff;

  text-shadow:
  0 0 10px #00ffff;
}

p{
  margin:0 0 12px;
  color:#ddd;
  font-size:14px;
}

.top-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.top-buttons button,
.top-buttons a{

  width:140px;
  height:42px;

  line-height:42px;

  border:none;
  border-radius:10px;

  color:white;
  font-size:15px;
  font-weight:bold;

  text-decoration:none;
}

.reset-btn{
  background:#1f5fbf;
}

.back-btn{
  background:#333;
  border:1px solid #555;
}

.game-layout{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:18px;

  padding:0 12px 24px;
}

.game-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

canvas{

  background:
  linear-gradient(
    to bottom,
    #091020,
    #050510
  );

  border:2px solid #00ffff;

  box-shadow:
    0 0 20px #00ffff,
    0 0 40px #00ffff;

  width:700px;
  max-width:96vw;
  height:auto;
}

.controls{

  width:700px;
  max-width:96vw;

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:10px;

  margin-top:14px;
}

.controls button{

  height:58px;

  border:none;
  border-radius:12px;

  background:#222;

  color:white;

  font-size:18px;
  font-weight:bold;

  border:1px solid #00ffff;
}

.score-board{

  width:220px;

  background:
  rgba(10,10,30,0.9);

  border:1px solid #00ffff;

  border-radius:12px;

  padding:12px;

  text-align:left;
}

.score-board h2{
  margin:0 0 10px;

  text-align:center;

  color:#00ffff;
}

.score-board ol{
  margin:0;
  padding-left:24px;
}

.score-board li{
  margin-bottom:6px;
}

@media(max-width:850px){

  .game-layout{
    flex-direction:column;
    align-items:center;
  }

  .score-board{
    width:96vw;
    max-width:700px;
  }

}

</style>
</head>

<body>

<h1>Cyber Hero Battle</h1>

<p>
← → 移動 /
Spaceでジャンプ /
Enterで開始
</p>

<div class="top-buttons">

  <button
  id="resetBtn"
  class="reset-btn">
  RESET
  </button>

  <a
  href="index.html"
  class="back-btn">

  ← ホームへ戻る

  </a>

</div>

<div class="game-layout">

  <div class="game-wrap">

    <canvas
    id="game"
    width="700"
    height="450">
    </canvas>

    <div class="controls">

      <button id="leftBtn">
      ← 移動
      </button>

      <button id="jumpBtn">
      ジャンプ
      </button>

    </div>

  </div>

  <div class="score-board">

    <h2>High Scores</h2>

    <ol id="highScores"></ol>

  </div>

</div>

<script>

// ========================
// 基本取得
// ========================

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

const highScoresList =
document.getElementById("highScores");

// ========================
// 拡張システム
// ========================

const extraUpdates = [];
const extraDraws = [];

// ========================
// 状態
// ========================

let keys = {};

let gameStarted = false;
let gameOver = false;

let scoreSaved = false;

let gravity = 0.8;

let level = 1;

// ========================
// プレイヤー
// ========================

let player = {

  x:120,
  y:260,

  width:70,
  height:110,

  hp:100,
  maxHp:100,

  speed:6,

  vy:0,

  jumping:false
};

// ========================
// 敵
// ========================

let enemy = {

  x:520,
  y:260,

  width:70,
  height:110,

  hp:100,
  maxHp:100,

  speed:2
};

// ========================
// リセット
// ========================

function resetGame(){

  player.hp = 100;

  player.x = 120;
  player.y = 260;

  player.vy = 0;

  player.jumping = false;

  enemy.hp = 100;

  enemy.x = 520;

  level = 1;

  gameOver = false;

  scoreSaved = false;
}

// ========================
// スタート
// ========================

function startGame(){

  if(!gameStarted){

    gameStarted = true;

    resetGame();
  }
}

// ========================
// ジャンプ
// ========================

function jump(){

  if(player.jumping) return;

  player.vy = -16;

  player.jumping = true;
}

// ========================
// 敵色
// ========================

function getEnemyColor(){

  if(level < 3){
    return "#00ff66";
  }

  if(level < 5){
    return "#ffee00";
  }

  if(level < 8){
    return "#ff4444";
  }

  return "#bb66ff";
}

// ========================
// ランキング
// ========================

function getHighScores(){

  const data =
  localStorage.getItem(
    "cyberHeroScores"
  );

  return data
  ? JSON.parse(data)
  : [];
}

function saveHighScore(){

  if(scoreSaved) return;

  let scores =
  getHighScores();

  scores.push(level);

  scores.sort((a,b)=>b-a);

  scores =
  scores.slice(0,10);

  localStorage.setItem(
    "cyberHeroScores",
    JSON.stringify(scores)
  );

  scoreSaved = true;

  showHighScores();
}

function showHighScores(){

  const scores =
  getHighScores();

  highScoresList.innerHTML = "";

  for(let i=0;i<10;i++){

    const li =
    document.createElement("li");

    li.textContent =
    scores[i] !== undefined
    ? "Lv " + Math.floor(scores[i])
    : "-";

    highScoresList.appendChild(li);
  }
}

// ========================
// キー
// ========================

document.addEventListener(
"keydown",
e=>{

  keys[e.code] = true;

  if(
    !gameStarted &&
    e.code==="Enter"
  ){

    startGame();
  }

  if(e.code==="Space"){
    jump();
  }

  if(e.code==="KeyR"){

    gameStarted = true;

    resetGame();
  }

});

document.addEventListener(
"keyup",
e=>{
  keys[e.code] = false;
});

// ========================
// 更新
// ========================

function update(){

  if(!gameStarted) return;

  if(gameOver) return;

  // 左右移動
  if(keys["ArrowLeft"]){

    player.x -= player.speed;
  }

  if(keys["ArrowRight"]){

    player.x += player.speed;
  }

  // 重力
  player.y += player.vy;

  player.vy += gravity;

  if(player.y >= 260){

    player.y = 260;

    player.vy = 0;

    player.jumping = false;
  }

  // 敵追尾
  if(enemy.x > player.x + 80){

    enemy.x -= enemy.speed;
  }

  if(enemy.x < player.x - 80){

    enemy.x += enemy.speed;
  }

  // 接触判定
  const distance =
  Math.abs(player.x - enemy.x);

  if(distance < 90){

    if(Math.random() < 0.02){

      player.hp -= 3;

      if(player.hp <= 0){

        player.hp = 0;

        gameOver = true;

        saveHighScore();
      }
    }
  }

  // レベル上昇
  level += 0.002;

  // 拡張更新
  extraUpdates.forEach(fn=>{
    fn();
  });
}

// ========================
// HPバー
// ========================

function drawHpBar(
x,
y,
hp,
maxHp,
color
){

  ctx.fillStyle="#333";

  ctx.fillRect(x,y,220,20);

  ctx.fillStyle=color;

  ctx.fillRect(
    x,
    y,
    (hp/maxHp)*220,
    20
  );

  ctx.strokeStyle="white";

  ctx.strokeRect(x,y,220,20);
}

// ========================
// プレイヤー描画
// ========================

function drawPlayer(){

  const x = player.x;
  const y = player.y;

  ctx.save();

  ctx.shadowColor="#00ffff";
  ctx.shadowBlur=25;

  // マント
  ctx.fillStyle="#004477";

  ctx.beginPath();

  ctx.moveTo(x+20,y+35);
  ctx.lineTo(x-10,y+90);
  ctx.lineTo(x+30,y+100);

  ctx.fill();

  // 体
  ctx.fillStyle="#66ccff";

  ctx.fillRect(
    x+10,
    y+20,
    40,
    60
  );

  // 頭
  ctx.fillStyle="#d9f7ff";

  ctx.beginPath();

  ctx.arc(
    x+30,
    y,
    20,
    0,
    Math.PI*2
  );

  ctx.fill();

  ctx.restore();
}

// ========================
// 敵描画
// ========================

function drawEnemy(){

  const x = enemy.x;
  const y = enemy.y;

  const color =
  getEnemyColor();

  ctx.save();

  ctx.shadowColor=color;
  ctx.shadowBlur=20;

  for(let i=0;i<10;i++){

    const angle =
    (Math.PI*2/10)*i;

    const tx =
    x+35+
    Math.cos(angle)*45;

    const ty =
    y+35+
    Math.sin(angle)*45;

    ctx.strokeStyle=color;

    ctx.lineWidth=6;

    ctx.beginPath();

    ctx.moveTo(x+35,y+35);

    ctx.lineTo(tx,ty);

    ctx.stroke();
  }

  ctx.fillStyle=color;

  ctx.beginPath();

  ctx.arc(
    x+35,
    y+35,
    38,
    0,
    Math.PI*2
  );

  ctx.fill();

  ctx.restore();
}

// ========================
// スタート画面
// ========================

function drawStartScreen(){

  ctx.fillStyle=
  "rgba(0,0,0,0.75)";

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.fillStyle="#00ffff";

  ctx.font="52px sans-serif";

  ctx.fillText(
    "CYBER HERO",
    170,
    170
  );

  ctx.fillStyle="white";

  ctx.font="28px sans-serif";

  ctx.fillText(
    "スタートしますか？",
    220,
    250
  );
}

// ========================
// 描画
// ========================

function draw(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.fillStyle="#111a33";

  ctx.fillRect(
    0,
    380,
    canvas.width,
    70
  );

  if(!gameStarted){

    drawStartScreen();

    return;
  }

  drawPlayer();

  drawEnemy();

  drawHpBar(
    20,
    20,
    player.hp,
    player.maxHp,
    "#00ccff"
  );

  drawHpBar(
    460,
    20,
    enemy.hp,
    enemy.maxHp,
    getEnemyColor()
  );

  ctx.fillStyle="white";

  ctx.font="24px sans-serif";

  ctx.fillText(
    "LEVEL : " +
    Math.floor(level),
    280,
    60
  );

  // 拡張描画
  extraDraws.forEach(fn=>{
    fn();
  });

  if(gameOver){

    ctx.fillStyle=
    "rgba(0,0,0,0.7)";

    ctx.fillRect(
      0,
      0,
      canvas.width,
      canvas.height
    );

    ctx.fillStyle="#ff3355";

    ctx.font="58px sans-serif";

    ctx.fillText(
      "GAME OVER",
      170,
      180
    );
  }
}

// ========================
// ループ
// ========================

function loop(){

  update();

  draw();

  requestAnimationFrame(loop);
}

// ========================
// ボタン
// ========================

function pressKey(code){
  keys[code] = true;
}

function releaseKey(code){
  keys[code] = false;
}

function addHoldButton(
button,
code
){

  button.addEventListener(
    "touchstart",
    e=>{
      e.preventDefault();
      pressKey(code);
    }
  );

  button.addEventListener(
    "touchend",
    e=>{
      e.preventDefault();
      releaseKey(code);
    }
  );
}

addHoldButton(
document.getElementById("leftBtn"),
"ArrowLeft"
);

document
.getElementById("jumpBtn")
.addEventListener(
"click",
()=>{
  jump();
}
);

document
.getElementById("resetBtn")
.addEventListener(
"click",
()=>{

  gameStarted = true;

  resetGame();
}
);

// ========================
// 開始
// ========================

showHighScores();

loop();

</script>

</body>
</html>

<script>

// ========================
// 第2回追加機能
// ========================

// 攻撃ボタン取得
const attackBtn =
document.getElementById("attackBtn");

const shotBtn =
document.getElementById("shotBtn");

// 電子弾
let shots = [];

// 攻撃エフェクト
let hitEffects = [];

// プレイヤー状態追加
player.attacking = false;

// ========================
// 近距離攻撃
// ========================

function attack(){

  if(gameOver) return;

  player.attacking = true;

  setTimeout(()=>{
    player.attacking = false;
  },200);

  const distance =
  Math.abs(player.x - enemy.x);

  if(distance < 120){

    enemy.hp -= 10;

    createHitEffect(
      enemy.x + 30,
      enemy.y + 30
    );

    if(enemy.hp <= 0){

      level++;

      enemy.hp =
      100 + level * 20;

      enemy.maxHp =
      enemy.hp;

      enemy.speed =
      2 + level * 0.3;

      enemy.x = 520;
    }
  }
}

// ========================
// 遠距離攻撃
// ========================

function shootBullet(){

  if(gameOver) return;

  shots.push({

    x:player.x + 60,
    y:player.y + 40,

    width:22,
    height:8,

    speed:12
  });
}

// ========================
// ヒット演出
// ========================

function createHitEffect(x,y){

  hitEffects.push({

    x:x,
    y:y,

    life:20
  });
}

// ========================
// 更新追加
// ========================

extraUpdates.push(function(){

  // 電子弾移動
  shots.forEach(shot=>{

    shot.x += shot.speed;

    // 命中
    if(

      shot.x <
      enemy.x + enemy.width &&

      shot.x + shot.width >
      enemy.x &&

      shot.y <
      enemy.y + enemy.height &&

      shot.y + shot.height >
      enemy.y

    ){

      enemy.hp -= 6;

      createHitEffect(
        enemy.x + 30,
        enemy.y + 30
      );

      shot.hit = true;

      if(enemy.hp <= 0){

        level++;

        enemy.hp =
        100 + level * 20;

        enemy.maxHp =
        enemy.hp;

        enemy.speed =
        2 + level * 0.3;

        enemy.x = 520;
      }
    }

  });

  // 消去
  shots =
  shots.filter(shot=>
    shot.x < canvas.width + 100 &&
    !shot.hit
  );

  // エフェクト寿命
  hitEffects.forEach(effect=>{
    effect.life--;
  });

  hitEffects =
  hitEffects.filter(
    effect=>effect.life > 0
  );

});

// ========================
// 描画追加
// ========================

extraDraws.push(function(){

  // 近距離攻撃エフェクト
  if(player.attacking){

    ctx.fillStyle =
    "rgba(0,255,255,0.4)";

    ctx.fillRect(
      player.x + 60,
      player.y + 10,
      60,
      70
    );
  }

  // 電子弾
  shots.forEach(shot=>{

    ctx.save();

    ctx.shadowColor="#00ffff";
    ctx.shadowBlur=20;

    ctx.fillStyle="#66ffff";

    ctx.fillRect(
      shot.x,
      shot.y,
      shot.width,
      shot.height
    );

    ctx.restore();
  });

  // ヒット演出
  hitEffects.forEach(effect=>{

    ctx.save();

    ctx.globalAlpha =
    effect.life / 20;

    ctx.strokeStyle="#ffffff";

    ctx.lineWidth=4;

    ctx.beginPath();

    ctx.arc(
      effect.x,
      effect.y,
      40-effect.life,
      0,
      Math.PI*2
    );

    ctx.stroke();

    ctx.restore();
  });

});

// ========================
// ボタン
// ========================

attackBtn.addEventListener(
"click",
()=>{
  attack();
}
);

shotBtn.addEventListener(
"click",
()=>{
  shootBullet();
}
);

// ========================
// キーボード
// ========================

document.addEventListener(
"keydown",
e=>{

  if(e.code==="KeyZ"){
    attack();
  }

  if(e.code==="KeyX"){
    shootBullet();
  }

});

</script>
