<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SERVER CORE BATTLE</title>

<style>
*{
  box-sizing:border-box;
}

html{
  touch-action:manipulation;
}

body{
  margin:0;
  background:radial-gradient(circle at top,#152033,#03060d 70%);
  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

h1{
  margin:18px 0 8px;
  color:#66ccff;
  text-shadow:0 0 10px #66ccff,0 0 25px #66ccff;
}

p{
  color:#ddd;
}

.top-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.top-buttons button,
.top-buttons a{
  width:160px;
  height:46px;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:bold;
  color:white;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.reset-btn{
  background:#1f5fbf;
}

.back-btn{
  background:#222;
  border:1px solid #66ccff;
}

.game-layout{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:18px;
  padding:0 12px 24px;
}

.game-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

canvas{
  width:720px;
  max-width:96vw;
  height:auto;
  background:linear-gradient(to bottom,#09111f,#02040a);
  border:2px solid #66ccff;
  box-shadow:
    0 0 20px #66ccff,
    inset 0 0 20px rgba(0,255,255,0.08);
}

.controls{
  width:720px;
  max-width:96vw;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:64px 64px 64px;
  gap:10px;
  margin-top:14px;
}

.controls button{
  border:none;
  border-radius:14px;
  color:white;
  font-size:15px;
  font-weight:bold;
  background:#1a1a1a;
  border:1px solid #66ccff;
  box-shadow:0 0 10px rgba(0,255,255,0.3);
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}

#redGuardBtn{
  grid-column:1;
  grid-row:1;
}

#redAttackBtn{
  grid-column:2;
  grid-row:1;
}

#blueGuardBtn{
  grid-column:1;
  grid-row:2;
}

#blueAttackBtn{
  grid-column:2;
  grid-row:2;
}

#greenGuardBtn{
  grid-column:1;
  grid-row:3;
}

#greenAttackBtn{
  grid-column:2;
  grid-row:3;
}

.move-panel{
  grid-column:3;
  grid-row:1 / 4;
  display:grid;
  grid-template-rows:1fr 1fr;
  gap:10px;
}

.vertical-btn{
  font-size:42px !important;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}

.red{
  background:#992222 !important;
}

.blue{
  background:#224499 !important;
}

.green{
  background:#228844 !important;
}

.move{
  background:#333 !important;
}

.score-board{
  width:260px;
  background:rgba(10,20,35,0.95);
  border:1px solid #66ccff;
  border-radius:14px;
  padding:14px;
  text-align:left;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.score-board h2{
  text-align:center;
  color:#66ccff;
  margin-top:4px;
}

.score-board ol{
  padding-left:24px;
}

.score-board li{
  margin-bottom:8px;
  color:#eee;
  font-size:14px;
}

.score-note{
  font-size:12px;
  color:#aaa;
  text-align:center;
  line-height:1.6;
}

@media(max-width:900px){
  .game-layout{
    flex-direction:column;
    align-items:center;
  }

  .score-board{
    width:96vw;
    max-width:720px;
  }

  .vertical-btn{
    font-size:36px !important;
  }
}
</style>
</head>

<body>

<h1>SERVER CORE BATTLE</h1>

<p>↑ ↓ 移動 / 色攻撃 / 色防御/Z赤攻撃/X青攻撃/C緑攻撃/A赤防御/S青防御/D緑防御
</p>

<div class="top-buttons">
  <button id="resetBtn" class="reset-btn">RESET</button>
  <a href="index.html" class="back-btn">← ホームへ戻る</a>
</div>

<div class="game-layout">

  <div class="game-wrap">

    <canvas id="game" width="720" height="480"></canvas>

    <div class="controls">

      <button id="redGuardBtn" class="red">赤防御</button>
      <button id="redAttackBtn" class="red">赤攻撃</button>

      <button id="blueGuardBtn" class="blue">青防御</button>
      <button id="blueAttackBtn" class="blue">青攻撃</button>

      <button id="greenGuardBtn" class="green">緑防御</button>
      <button id="greenAttackBtn" class="green">緑攻撃</button>

      <div class="move-panel">
        <button id="upBtn" class="move vertical-btn">↑</button>
        <button id="downBtn" class="move vertical-btn">↓</button>
      </div>

    </div>

  </div>

  <div class="score-board">
    <h2>High Scores</h2>
    <ol id="highScores"></ol>
    <div class="score-note">
      ゲームオーバー時に<br>
      倒した最高レベルを保存します
    </div>
  </div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameStarted = false;
let gameOver = false;
let scoreSaved = false;

let keys = {};

let level = 1;
let defeatedLevel = 0;

let player;
let enemy;

let playerShots = [];
let enemyShots = [];

const SCORE_KEY = "serverCoreBattleHighScores";

let highScores = loadHighScores();

function loadHighScores(){
  const data = localStorage.getItem(SCORE_KEY);

  if(!data){
    return [];
  }

  try{
    const parsed = JSON.parse(data);

    if(Array.isArray(parsed)){
      return parsed
        .filter(score=>Number.isFinite(score))
        .slice(0,10);
    }

    return [];
  }catch(e){
    return [];
  }
}

function saveHighScores(){
  localStorage.setItem(
    SCORE_KEY,
    JSON.stringify(highScores)
  );
}

function addHighScore(score){
  if(score <= 0){
    displayHighScores();
    return;
  }

  highScores.push(score);

  highScores.sort((a,b)=>{
    return b - a;
  });

  highScores = highScores.slice(0,10);

  saveHighScores();
  displayHighScores();
}

function displayHighScores(){
  const list = document.getElementById("highScores");

  list.innerHTML = "";

  if(highScores.length === 0){
    const li = document.createElement("li");
    li.textContent = "まだスコアなし";
    list.appendChild(li);
    return;
  }

  highScores.forEach((score,index)=>{
    const li = document.createElement("li");
    li.textContent = (index + 1) + "位：LEVEL " + score + " まで撃破";
    list.appendChild(li);
  });
}

function resetGame(){
  player = {
    x:80,
    y:200,
    targetY:200,
    width:60,
    height:60,
    hp:100,
    maxHp:100,
    barrier:null,
    barrierTimer:0
  };

  level = 1;
  defeatedLevel = 0;

  spawnEnemy();

  playerShots = [];
  enemyShots = [];

  gameOver = false;
  scoreSaved = false;
  gameStarted = false;

  keys = {};
}

function spawnEnemy(){
  enemy = {
    x:580,
    y:200,
    targetY:200,
    width:60,
    height:60,
    hp:120 + level * 25,
    maxHp:120 + level * 25,
    barrier:null,
    barrierTimer:0,
    aiLevel:0.25 + level * 0.06,
    moveTimer:0,
    shootCooldown:80,
    burstCount:0,
    burstTimer:0
  };
}

function enemyColor(){
  if(level < 4){
    return "#55ff88";
  }

  if(level < 7){
    return "#ffaa33";
  }

  if(level < 10){
    return "#ff4444";
  }

  return "#cc44ff";
}

function startGame(){
  if(gameOver){
    return;
  }

  if(!gameStarted){
    gameStarted = true;
  }
}

function shoot(color){
  startGame();

  if(gameOver){
    return;
  }

  playerShots.push({
    x:player.x + 55,
    y:player.y + 24,
    width:22,
    height:12,
    speed:10,
    color:color
  });
}

function activateBarrier(color){
  startGame();

  if(gameOver){
    return;
  }

  player.barrier = color;
  player.barrierTimer = 180;
}

function enemyShoot(color){
  enemyShots.push({
    x:enemy.x,
    y:enemy.y + 24,
    width:22,
    height:12,
    speed:9 + level * 0.15,
    color:color
  });
}

function randomColor(){
  const colors = ["red","blue","green"];
  return colors[Math.floor(Math.random() * colors.length)];
}

function update(){
  if(!gameStarted){
    return;
  }

  if(gameOver){
    return;
  }

  updatePlayerMove();
  updateEnemyMove();
  updateEnemyAttack();
  updateEnemyBarrier();
  updateEnemyHeal();
  updateShots();
  checkPlayerShotHits();
  checkEnemyShotHits();
  cleanShots();
  updateBarriers();
  checkEnemyDefeat();
  checkPlayerDefeat();
}

function updatePlayerMove(){
  if(keys["ArrowUp"]){
    player.targetY -= 10;
  }

  if(keys["ArrowDown"]){
    player.targetY += 10;
  }

  player.targetY = Math.max(
    0,
    Math.min(canvas.height - player.height, player.targetY)
  );

  player.y += (player.targetY - player.y) * 0.22;
}

function updateEnemyMove(){
  enemy.moveTimer--;

  if(enemy.moveTimer <= 0){
    enemy.targetY = Math.random() * (canvas.height - enemy.height);
    enemy.moveTimer = Math.max(12,45 - level * 2);
  }

  enemy.y += (enemy.targetY - enemy.y) * Math.min(
    0.32,
    0.12 + level * 0.012
  );
}

function updateEnemyAttack(){
  enemy.shootCooldown--;

  if(enemy.shootCooldown <= 0){
    enemy.burstCount = 1 + Math.min(4,Math.floor(level / 3));
    enemy.burstTimer = 0;
    enemy.shootCooldown = Math.max(28,95 - level * 5);
  }

  if(enemy.burstCount > 0){
    enemy.burstTimer--;

    if(enemy.burstTimer <= 0){
      enemyShoot(randomColor());
      enemy.burstCount--;
      enemy.burstTimer = Math.max(8,18 - level);
    }
  }
}

function updateEnemyBarrier(){
  if(Math.random() < enemy.aiLevel * 0.012){
    enemy.barrier = randomColor();
    enemy.barrierTimer = 180;
  }
}

function updateEnemyHeal(){
  enemy.hp = Math.min(
    enemy.maxHp,
    enemy.hp + 0.02 * level
  );
}

function updateShots(){
  playerShots.forEach(shot=>{
    shot.x += shot.speed;
  });

  enemyShots.forEach(shot=>{
    shot.x -= shot.speed;
  });
}

function hitTest(a,b){
  return (
    a.x < b.x + b.width &&
    a.x + a.width > b.x &&
    a.y < b.y + b.height &&
    a.y + a.height > b.y
  );
}

function checkPlayerShotHits(){
  playerShots.forEach(shot=>{
    if(hitTest(shot,enemy)){
      if(enemy.barrier === shot.color){
        enemy.barrier = null;
        enemy.barrierTimer = 0;
      }else{
        enemy.hp -= 16;
      }

      shot.hit = true;
    }
  });
}

function checkEnemyShotHits(){
  enemyShots.forEach(shot=>{
    if(hitTest(shot,player)){
      if(player.barrier === shot.color){
        player.barrier = null;
        player.barrierTimer = 0;
      }else{
        player.hp -= 15;
      }

      shot.hit = true;
    }
  });
}

function cleanShots(){
  playerShots = playerShots.filter(shot=>{
    return !shot.hit && shot.x < canvas.width;
  });

  enemyShots = enemyShots.filter(shot=>{
    return !shot.hit && shot.x > -40;
  });
}

function updateBarriers(){
  if(player.barrierTimer > 0){
    player.barrierTimer--;

    if(player.barrierTimer <= 0){
      player.barrier = null;
    }
  }

  if(enemy.barrierTimer > 0){
    enemy.barrierTimer--;

    if(enemy.barrierTimer <= 0){
      enemy.barrier = null;
    }
  }
}

function checkEnemyDefeat(){
  if(enemy.hp <= 0){
    defeatedLevel = level;

    level++;

    player.hp = player.maxHp;

    playerShots = [];
    enemyShots = [];

    spawnEnemy();
  }
}

function checkPlayerDefeat(){
  if(player.hp <= 0){
    player.hp = 0;
    gameOver = true;

    if(!scoreSaved){
      scoreSaved = true;
      addHighScore(defeatedLevel);
    }
  }
}

function drawBarrier(obj){
  if(!obj.barrier){
    return;
  }

  if(obj.barrier === "red"){
    ctx.strokeStyle = "#ff4444";
  }

  if(obj.barrier === "blue"){
    ctx.strokeStyle = "#4488ff";
  }

  if(obj.barrier === "green"){
    ctx.strokeStyle = "#44ff88";
  }

  ctx.lineWidth = 5;

  ctx.beginPath();

  ctx.arc(
    obj.x + 30,
    obj.y + 30,
    45,
    0,
    Math.PI * 2
  );

  ctx.stroke();
}

function drawPlayer(){
  ctx.fillStyle = "#66ccff";

  ctx.fillRect(
    player.x,
    player.y,
    player.width,
    player.height
  );

  ctx.fillStyle = "#ffffff";

  ctx.fillRect(
    player.x + 14,
    player.y + 18,
    32,
    10
  );

  ctx.fillRect(
    player.x + 22,
    player.y + 35,
    16,
    10
  );

  ctx.strokeStyle = "rgba(255,255,255,0.35)";
  ctx.lineWidth = 2;

  ctx.strokeRect(
    player.x + 6,
    player.y + 6,
    player.width - 12,
    player.height - 12
  );

  drawBarrier(player);
}

function drawEnemy(){
  ctx.fillStyle = enemyColor();

  ctx.beginPath();

  ctx.arc(
    enemy.x + 30,
    enemy.y + 30,
    28,
    0,
    Math.PI * 2
  );

  ctx.fill();

  for(let i = 0; i < 8; i++){
    const angle = (Math.PI * 2 / 8) * i;

    ctx.strokeStyle = enemyColor();
    ctx.lineWidth = 4;

    ctx.beginPath();

    ctx.moveTo(
      enemy.x + 30,
      enemy.y + 30
    );

    ctx.lineTo(
      enemy.x + 30 + Math.cos(angle) * 42,
      enemy.y + 30 + Math.sin(angle) * 42
    );

    ctx.stroke();
  }

  drawBarrier(enemy);
}

function drawShot(shot){
  if(shot.color === "red"){
    ctx.fillStyle = "#ff4444";
  }

  if(shot.color === "blue"){
    ctx.fillStyle = "#4488ff";
  }

  if(shot.color === "green"){
    ctx.fillStyle = "#44ff88";
  }

  ctx.shadowColor = ctx.fillStyle;
  ctx.shadowBlur = 10;

  ctx.fillRect(
    shot.x,
    shot.y,
    shot.width,
    shot.height
  );

  ctx.shadowBlur = 0;
}

function drawBackgroundLines(){
  ctx.fillStyle = "rgba(0,255,255,0.06)";

  for(let i = 0; i < canvas.height; i += 40){
    ctx.fillRect(
      0,
      i,
      canvas.width,
      1
    );
  }

  ctx.fillStyle = "rgba(0,255,255,0.04)";

  for(let x = 0; x < canvas.width; x += 40){
    ctx.fillRect(
      x,
      0,
      1,
      canvas.height
    );
  }
}

function drawHpBars(){
  ctx.fillStyle = "#333";
  ctx.fillRect(20,20,220,18);

  ctx.fillStyle = "#66ccff";
  ctx.fillRect(
    20,
    20,
    Math.max(0,player.hp) / player.maxHp * 220,
    18
  );

  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 1;
  ctx.strokeRect(20,20,220,18);

  ctx.fillStyle = "#333";
  ctx.fillRect(480,20,220,18);

  ctx.fillStyle = enemyColor();
  ctx.fillRect(
    480,
    20,
    Math.max(0,enemy.hp) / enemy.maxHp * 220,
    18
  );

  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 1;
  ctx.strokeRect(480,20,220,18);
}

function drawTexts(){
  ctx.fillStyle = "white";
  ctx.font = "24px sans-serif";

  ctx.fillText(
    "LEVEL : " + level,
    300,
    40
  );

  ctx.font = "14px sans-serif";

  ctx.fillText(
    "倒したLEVEL : " + defeatedLevel,
    300,
    65
  );
}

function drawStartScreen(){
  ctx.fillStyle = "rgba(0,0,0,0.82)";

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.fillStyle = "#66ccff";
  ctx.font = "54px sans-serif";

  ctx.fillText(
    "SERVER CORE",
    180,
    170
  );

  ctx.fillText(
    "BATTLE",
    250,
    240
  );

  ctx.fillStyle = "white";
  ctx.font = "26px sans-serif";

  ctx.fillText(
    "攻撃または防御ボタンで開始",
    190,
    330
  );

  ctx.font = "18px sans-serif";

  ctx.fillText(
    "敵を倒すとLEVELが上がり、HPが全回復します",
    155,
    370
  );
}

function drawGameOver(){
  ctx.fillStyle = "rgba(0,0,0,0.74)";

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.fillStyle = "#ff3355";
  ctx.font = "60px sans-serif";

  ctx.fillText(
    "GAME OVER",
    170,
    210
  );

  ctx.fillStyle = "white";
  ctx.font = "26px sans-serif";

  ctx.fillText(
    "LEVEL " + defeatedLevel + " まで撃破",
    235,
    275
  );

  ctx.font = "20px sans-serif";

  ctx.fillText(
    "RESETで再挑戦",
    285,
    330
  );
}

function draw(){
  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  drawBackgroundLines();

  drawPlayer();
  drawEnemy();

  playerShots.forEach(drawShot);
  enemyShots.forEach(drawShot);

  drawHpBars();
  drawTexts();

  if(!gameStarted){
    drawStartScreen();
  }

  if(gameOver){
    drawGameOver();
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener("keydown",e=>{
  keys[e.code] = true;

  if(e.code === "KeyZ"){
    shoot("red");
  }

  if(e.code === "KeyX"){
    shoot("blue");
  }

  if(e.code === "KeyC"){
    shoot("green");
  }

  if(e.code === "KeyA"){
    activateBarrier("red");
  }

  if(e.code === "KeyS"){
    activateBarrier("blue");
  }

  if(e.code === "KeyD"){
    activateBarrier("green");
  }
});

document.addEventListener("keyup",e=>{
  keys[e.code] = false;
});

function holdButton(id,code){
  const btn = document.getElementById(id);

  btn.addEventListener("touchstart",e=>{
    e.preventDefault();
    startGame();
    keys[code] = true;
  },{passive:false});

  btn.addEventListener("touchend",e=>{
    e.preventDefault();
    keys[code] = false;
  },{passive:false});

  btn.addEventListener("touchcancel",e=>{
    e.preventDefault();
    keys[code] = false;
  },{passive:false});

  btn.addEventListener("mousedown",()=>{
    startGame();
    keys[code] = true;
  });

  btn.addEventListener("mouseup",()=>{
    keys[code] = false;
  });

  btn.addEventListener("mouseleave",()=>{
    keys[code] = false;
  });
}

function tapButton(id,func){
  const btn = document.getElementById(id);

  btn.addEventListener("touchstart",e=>{
    e.preventDefault();
    func();
  },{passive:false});

  btn.addEventListener("click",func);
}

holdButton("upBtn","ArrowUp");
holdButton("downBtn","ArrowDown");

tapButton("redAttackBtn",()=>{
  shoot("red");
});

tapButton("blueAttackBtn",()=>{
  shoot("blue");
});

tapButton("greenAttackBtn",()=>{
  shoot("green");
});

tapButton("redGuardBtn",()=>{
  activateBarrier("red");
});

tapButton("blueGuardBtn",()=>{
  activateBarrier("blue");
});

tapButton("greenGuardBtn",()=>{
  activateBarrier("green");
});

document.getElementById("resetBtn").addEventListener("click",()=>{
  resetGame();
});

resetGame();
displayHighScores();
loop();
</script>

</body>
</html>
