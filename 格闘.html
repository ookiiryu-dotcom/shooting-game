<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Fighting Battle DX</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:
  radial-gradient(circle at top,#1d0d2d,#050510 70%);
  color:white;
  font-family:sans-serif;
  text-align:center;
  overflow-x:hidden;
}

h1{
  margin:18px 0 8px;
  color:#66ccff;
  text-shadow:0 0 18px #66ccff;
}

p{
  margin:0 0 12px;
  color:#ddd;
  font-size:14px;
}

.top-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.top-buttons button,
.top-buttons a{
  width:150px;
  height:44px;
  line-height:44px;
  border:none;
  border-radius:12px;
  color:white;
  font-size:15px;
  font-weight:bold;
  text-decoration:none;
}

.reset-btn{
  background:#1f5fbf;
}

.back-btn{
  background:#333;
  border:1px solid #666;
}

.game-layout{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:18px;
  padding:0 12px 24px;
}

.game-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

canvas{
  background:
  linear-gradient(to bottom,#0b1025,#050510);
  border:2px solid #66ccff;

  box-shadow:
    0 0 25px #66ccff,
    0 0 50px rgba(102,204,255,0.4);

  width:720px;
  max-width:96vw;
  height:auto;
}

.controls{
  width:720px;
  max-width:96vw;

  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;

  margin-top:14px;
}

.controls button{
  height:60px;
  border:none;
  border-radius:14px;
  color:white;
  font-size:17px;
  font-weight:bold;
  background:#222;
  border:1px solid #66ccff;

  box-shadow:
    0 0 10px rgba(102,204,255,0.3);
}

.score-board{
  width:230px;
  background:rgba(10,20,35,0.92);

  border:1px solid #66ccff;
  border-radius:14px;

  padding:14px;
  text-align:left;
}

.score-board h2{
  margin:0 0 10px;
  text-align:center;
  color:#66ccff;
}

.score-board ol{
  margin:0;
  padding-left:24px;
}

.score-board li{
  margin-bottom:7px;
}

@media(max-width:900px){

  .game-layout{
    flex-direction:column;
    align-items:center;
  }

  .score-board{
    width:96vw;
    max-width:720px;
  }

}

</style>
</head>

<body>

<h1>AI Fighting Battle DX</h1>

<p>
← → 移動 /
ジャンプ /
攻撃 /
バリア /
ダッシュ
</p>

<div class="top-buttons">

  <button
  id="resetBtn"
  class="reset-btn">
    RESET
  </button>

  <a
  href="index.html"
  class="back-btn">
    ← ホームへ戻る
  </a>

</div>

<div class="game-layout">

  <div class="game-wrap">

    <canvas
    id="game"
    width="720"
    height="480">
    </canvas>

    <div class="controls">

      <button id="jumpBtn">
        ジャンプ
      </button>

      <button id="attackBtn">
        攻撃
      </button>

      <button id="meleeBarrierBtn">
        近距離バリア
      </button>

      <button id="rangeAttackBtn">
        遠距離攻撃
      </button>

      <button id="rangeBarrierBtn">
        遠距離バリア
      </button>

      <button id="dashBtn">
        近距離ダッシュ
      </button>

    </div>

  </div>

  <div class="score-board">

    <h2>High Scores</h2>

    <ol id="highScores"></ol>

  </div>

</div>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

const jumpBtn =
document.getElementById("jumpBtn");

const attackBtn =
document.getElementById("attackBtn");

const meleeBarrierBtn =
document.getElementById("meleeBarrierBtn");

const rangeAttackBtn =
document.getElementById("rangeAttackBtn");

const rangeBarrierBtn =
document.getElementById("rangeBarrierBtn");

const dashBtn =
document.getElementById("dashBtn");

const resetBtn =
document.getElementById("resetBtn");

const highScoresList =
document.getElementById("highScores");

let keys = {};

let gameStarted = false;
let gameOver = false;
let scoreSaved = false;

let level = 1;

let player;
let enemy;

let projectiles = [];
let enemyProjectiles = [];

function resetGame(){

  player = {

    x:120,
    y:320,

    width:60,
    height:90,

    hp:100,

    speed:6,

    vy:0,

    jumping:false,

    meleeBarrier:false,
    rangeBarrier:false,

    dashTimer:0
  };

  spawnEnemy();

  level = 1;

  gameOver = false;

  scoreSaved = false;

  projectiles = [];
  enemyProjectiles = [];
}

function spawnEnemy(){

  const colors = [
    "#55ff55",
    "#ffee55",
    "#ff8844",
    "#ff4444",
    "#bb44ff",
    "#00ffff"
  ];

  const color =
  colors[
    Math.min(
      colors.length-1,
      Math.floor(level/2)
    )
  ];

  enemy = {

    x:560,
    y:320,

    width:70,
    height:70,

    hp:50 + level*25,

    attack:4 + level,

    speed:2 + level*0.25,

    color:color,

    shootTimer:0
  };
}

function startGame(){

  if(!gameStarted){

    gameStarted = true;

    resetGame();
  }
}

function getHighScores(){

  const data =
  localStorage.getItem(
    "fightDXScores"
  );

  return data
  ? JSON.parse(data)
  : [];
}

function saveHighScore(){

  if(scoreSaved) return;

  let scores =
  getHighScores();

  scores.push(level);

  scores.sort((a,b)=>b-a);

  scores =
  scores.slice(0,10);

  localStorage.setItem(
    "fightDXScores",
    JSON.stringify(scores)
  );

  scoreSaved = true;

  showHighScores();
}

function showHighScores(){

  const scores =
  getHighScores();

  highScoresList.innerHTML="";

  for(let i=0;i<10;i++){

    const li =
    document.createElement("li");

    li.textContent =
    scores[i] !== undefined
    ? "Lv " + scores[i]
    : "-";

    highScoresList.appendChild(li);
  }
}

function meleeAttack(){

  if(!gameStarted){
    startGame();
    return;
  }

  const distance =
  Math.abs(player.x-enemy.x);

  if(distance < 110){

    enemy.hp -= 14;

    if(enemy.hp <= 0){

      level++;

      player.hp =
      Math.min(
        100,
        player.hp + 20
      );

      spawnEnemy();
    }
  }
}

function rangeAttack(){

  projectiles.push({

    x:
    player.x + 50,

    y:
    player.y + 35,

    width:18,
    height:8,

    speed:10
  });
}

function jump(){

  if(!player.jumping){

    player.vy = -18;

    player.jumping = true;
  }
}

function dash(){

  if(player.dashTimer <= 0){

    player.x += 100;

    player.dashTimer = 40;
  }
}

function activateMeleeBarrier(){

  player.meleeBarrier = true;

  setTimeout(()=>{

    player.meleeBarrier = false;

  },2000);
}

function activateRangeBarrier(){

  player.rangeBarrier = true;

  setTimeout(()=>{

    player.rangeBarrier = false;

  },2000);
}

function enemyShoot(){

  enemyProjectiles.push({

    x:enemy.x,

    y:enemy.y + 30,

    width:16,
    height:8,

    speed:7
  });
}

document.addEventListener(
"keydown",
e=>{

  keys[e.code]=true;

  if(
    !gameStarted &&
    e.code==="Enter"
  ){
    startGame();
  }

  if(e.code==="KeyZ"){
    meleeAttack();
  }

  if(e.code==="KeyX"){
    rangeAttack();
  }

  if(e.code==="Space"){
    jump();
  }

  if(e.code==="KeyC"){
    dash();
  }

  if(e.code==="KeyA"){
    activateMeleeBarrier();
  }

  if(e.code==="KeyS"){
    activateRangeBarrier();
  }

  if(e.code==="KeyR"){

    gameStarted = true;

    resetGame();
  }

});

document.addEventListener(
"keyup",
e=>{
  keys[e.code]=false;
});

function collision(a,b){

  return (

    a.x < b.x+b.width &&
    a.x+a.width > b.x &&

    a.y < b.y+b.height &&
    a.y+a.height > b.y
  );
}

function update(){

  if(!gameStarted) return;

  if(gameOver) return;

  if(keys["ArrowLeft"]){
    player.x -= player.speed;
  }

  if(keys["ArrowRight"]){
    player.x += player.speed;
  }

  player.vy += 1;

  player.y += player.vy;

  if(player.y >= 320){

    player.y = 320;

    player.vy = 0;

    player.jumping = false;
  }

  player.x = Math.max(
    0,
    Math.min(
      canvas.width-player.width,
      player.x
    )
  );

  if(player.dashTimer > 0){
    player.dashTimer--;
  }

  if(enemy.x > player.x + 90){
    enemy.x -= enemy.speed;
  }

  if(enemy.x < player.x - 90){
    enemy.x += enemy.speed;
  }

  enemy.shootTimer++;

  if(enemy.shootTimer > 90){

    enemyShoot();

    enemy.shootTimer = 0;
  }

  projectiles.forEach(p=>{
    p.x += p.speed;
  });

  enemyProjectiles.forEach(p=>{
    p.x -= p.speed;
  });

  projectiles.forEach(p=>{

    if(collision(
      p,
      {
        x:enemy.x,
        y:enemy.y,
        width:enemy.width,
        height:enemy.height
      }
    )){

      enemy.hp -= 10;

      p.hit = true;

      if(enemy.hp <= 0){

        level++;

        spawnEnemy();
      }
    }

  });

  enemyProjectiles.forEach(p=>{

    if(collision(
      p,
      {
        x:player.x,
        y:player.y,
        width:player.width,
        height:player.height
      }
    )){

      if(!player.rangeBarrier){

        player.hp -= enemy.attack;
      }

      p.hit = true;
    }

  });

  const distance =
  Math.abs(player.x-enemy.x);

  if(
    distance < 80 &&
    Math.random() < 0.02
  ){

    if(!player.meleeBarrier){

      player.hp -= enemy.attack;
    }
  }

  if(player.hp <= 0){

    player.hp = 0;

    gameOver = true;

    saveHighScore();
  }

  projectiles =
  projectiles.filter(
    p=>!p.hit && p.x < canvas.width
  );

  enemyProjectiles =
  enemyProjectiles.filter(
    p=>!p.hit && p.x > -50
  );
}

function drawVirus(){

  ctx.save();

  ctx.fillStyle =
  enemy.color;

  ctx.beginPath();

  ctx.arc(
    enemy.x + 35,
    enemy.y + 35,
    30,
    0,
    Math.PI*2
  );

  ctx.fill();

  for(let i=0;i<10;i++){

    const angle =
    (Math.PI*2/10)*i;

    const sx =
    enemy.x + 35 +
    Math.cos(angle)*42;

    const sy =
    enemy.y + 35 +
    Math.sin(angle)*42;

    ctx.beginPath();

    ctx.arc(
      sx,
      sy,
      6,
      0,
      Math.PI*2
    );

    ctx.fill();
  }

  ctx.restore();
}

function drawHero(){

  ctx.save();

  ctx.fillStyle =
  "#66ccff";

  ctx.fillRect(
    player.x,
    player.y,
    player.width,
    player.height
  );

  ctx.fillStyle =
  "#ffffff";

  ctx.fillRect(
    player.x + 12,
    player.y + 10,
    36,
    12
  );

  ctx.fillStyle =
  "#00ffff";

  ctx.fillRect(
    player.x + 18,
    player.y + 38,
    24,
    40
  );

  if(player.meleeBarrier){

    ctx.strokeStyle =
    "#ffee55";

    ctx.lineWidth = 5;

    ctx.beginPath();

    ctx.arc(
      player.x + 30,
      player.y + 45,
      55,
      0,
      Math.PI*2
    );

    ctx.stroke();
  }

  if(player.rangeBarrier){

    ctx.strokeStyle =
    "#ff55ff";

    ctx.lineWidth = 5;

    ctx.beginPath();

    ctx.arc(
      player.x + 30,
      player.y + 45,
      70,
      0,
      Math.PI*2
    );

    ctx.stroke();
  }

  ctx.restore();
}

function draw(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.fillStyle =
  "#111933";

  ctx.fillRect(
    0,
    410,
    canvas.width,
    70
  );

  if(!gameStarted){

    ctx.fillStyle =
    "rgba(0,0,0,0.8)";

    ctx.fillRect(
      0,
      0,
      canvas.width,
      canvas.height
    );

    ctx.fillStyle =
    "#66ccff";

    ctx.font =
    "52px sans-serif";

    ctx.fillText(
      "AI BATTLE DX",
      180,
      180
    );

    ctx.fillStyle =
    "white";

    ctx.font =
    "30px sans-serif";

    ctx.fillText(
      "スタートしますか？",
      210,
      270
    );

    ctx.font =
    "22px sans-serif";

    ctx.fillText(
      "ENTERで開始",
      255,
      330
    );

    return;
  }

  drawHero();

  drawVirus();

  ctx.fillStyle =
  "#00ffff";

  projectiles.forEach(p=>{

    ctx.fillRect(
      p.x,
      p.y,
      p.width,
      p.height
    );
  });

  ctx.fillStyle =
  "#ff4444";

  enemyProjectiles.forEach(p=>{

    ctx.fillRect(
      p.x,
      p.y,
      p.width,
      p.height
    );
  });

  ctx.fillStyle =
  "#333";

  ctx.fillRect(
    20,
    20,
    220,
    20
  );

  ctx.fillStyle =
  "#00ccff";

  ctx.fillRect(
    20,
    20,
    player.hp * 2.2,
    20
  );

  ctx.fillStyle =
  "#333";

  ctx.fillRect(
    480,
    20,
    220,
    20
  );

  ctx.fillStyle =
  enemy.color;

  ctx.fillRect(
    480,
    20,
    (
      enemy.hp /
      (50 + level*25)
    ) * 220,
    20
  );

  ctx.fillStyle =
  "white";

  ctx.font =
  "24px sans-serif";

  ctx.fillText(
    "LEVEL : " + level,
    300,
    40
  );

  if(gameOver){

    ctx.fillStyle =
    "rgba(0,0,0,0.7)";

    ctx.fillRect(
      0,
      0,
      canvas.width,
      canvas.height
    );

    ctx.fillStyle =
    "#ff3355";

    ctx.font =
    "56px sans-serif";

    ctx.fillText(
      "GAME OVER",
      180,
      180
    );

    ctx.fillStyle =
    "white";

    ctx.font =
    "28px sans-serif";

    ctx.fillText(
      "到達レベル : " + level,
      240,
      260
    );

  }
}

function loop(){

  update();

  draw();

  requestAnimationFrame(loop);
}

function addButtonAction(
button,
action
){

  button.addEventListener(
    "touchstart",
    e=>{
      e.preventDefault();
      action();
    }
  );

  button.addEventListener(
    "click",
    action
  );
}

addButtonAction(
jumpBtn,
jump
);

addButtonAction(
attackBtn,
meleeAttack
);

addButtonAction(
rangeAttackBtn,
rangeAttack
);

addButtonAction(
meleeBarrierBtn,
activateMeleeBarrier
);

addButtonAction(
rangeBarrierBtn,
activateRangeBarrier
);

addButtonAction(
dashBtn,
dash
);

resetBtn.addEventListener(
"click",
()=>{

  gameStarted = true;

  resetGame();
});

showHighScores();

resetGame();

loop();

</script>

</body>
</html>
