function drawRoundBanner(){
  if(roundBanner.timer<=0||finishTimer>0)return;

  const t=roundBanner.timer/roundBanner.maxTimer;
  const enter=clamp((roundBanner.maxTimer-roundBanner.timer)/12,0,1);
  const alpha=clamp(Math.min(t*1.3,enter*1.2),0,1);
  const pop=1+Math.sin((1-t)*Math.PI)*.08;

  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.textAlign="center";
  ctx.translate(canvas.width/2,canvas.height/2-38);
  ctx.scale(pop,pop);

  ctx.font="bold 62px sans-serif";
  ctx.lineWidth=8;
  ctx.strokeStyle="rgba(0,0,0,.78)";
  ctx.strokeText(roundBanner.text,0,0);
  ctx.fillStyle=roundBanner.color;
  ctx.shadowColor=roundBanner.color;
  ctx.shadowBlur=24;
  ctx.fillText(roundBanner.text,0,0);

  if(roundBanner.subText){
    ctx.shadowBlur=0;
    ctx.font="bold 19px sans-serif";
    ctx.fillStyle="white";
    ctx.fillText(roundBanner.subText,0,34);
  }

  ctx.restore();
  ctx.textAlign="left";
}

function drawScreenFlash(){
  if(screenFlash<=0)return;

  ctx.save();
  ctx.globalAlpha=screenFlash/24;
  ctx.fillStyle="#ffffff";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.restore();
}


/* ===================== MAIN DRAW LOOP ===================== */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();

  if(screenShake>0&&!gamePaused){
    const shake=screenShake>12?6:3;
    ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  }

  drawBackground();
  drawFighter(player,true);
  drawFighter(enemy,false);
  drawEffects();
  drawBars();
  drawComboUI();

  if(!gameStarted)drawStartScreen();
  if(gameOver)drawGameOver();

  drawFinishOverlay();
  drawRoundBanner();
  drawPauseOverlay();

  ctx.restore();

  if(!gamePaused)drawScreenFlash();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}


/* ===================== KEYBOARD INPUT ===================== */
document.addEventListener("keydown",e=>{
  const wasPressed=keys[e.code];

  if(wasPressed){
    return;
  }

  keys[e.code]=true;

  if(gamePaused){
    return;
  }

  if(e.code==="KeyZ"){
    startGame();
    lastAttackPressFrame=frameCount;

    if(trySimultaneousThrow()){
      return;
    }

    pendingAttackTimer=SKILL_CONFIG.input.throwWindow;
    return;
  }

  if(e.code==="KeyX"){
    startGame();
    lastGuardPressFrame=frameCount;

    if(trySimultaneousThrow()){
      return;
    }

    pendingGuardTimer=SKILL_CONFIG.input.throwWindow;
    return;
  }

  if(e.code==="ArrowUp")jump(player);
  if(e.code==="KeyC")specialAttack(player);
  if(e.code==="ShiftLeft"||e.code==="ShiftRight")dash(player);
});

document.addEventListener("keyup",e=>{
  keys[e.code]=false;

  if(e.code==="KeyZ"){
    attackTouchHeld=false;
  }

  if(e.code==="KeyX"){
    pendingGuardTimer=0;
    guardTouchHeld=false;
  }

  if(!keys["KeyZ"]&&!keys["KeyX"]&&!attackTouchHeld&&!guardTouchHeld){
    throwInputLock=false;
  }
});


/* ===================== TOUCH / MOUSE INPUT ===================== */
function holdButton(id,code){
  const btn=document.getElementById(id);

  btn.addEventListener("touchstart",e=>{
    e.preventDefault();
    startGame();
    keys[code]=true;
  },{passive:false});

  btn.addEventListener("touchend",e=>{
    e.preventDefault();
    keys[code]=false;
  },{passive:false});

  btn.addEventListener("touchcancel",e=>{
    e.preventDefault();
    keys[code]=false;
  },{passive:false});

  btn.addEventListener("mousedown",()=>{
    startGame();
    keys[code]=true;
  });

  btn.addEventListener("mouseup",()=>{
    keys[code]=false;
  });

  btn.addEventListener("mouseleave",()=>{
    keys[code]=false;
  });
}

function tapButton(id,func){
  const btn=document.getElementById(id);
  let touchLocked=false;

  btn.addEventListener("touchstart",e=>{
    e.preventDefault();
    touchLocked=true;
    func();

    setTimeout(()=>{
      touchLocked=false;
    },120);
  },{passive:false});

  btn.addEventListener("click",()=>{
    if(touchLocked)return;
    func();
  });
}

holdButton("leftBtn","ArrowLeft");
holdButton("rightBtn","ArrowRight");

bindAttackButton();
bindGuardButton();

tapButton("jumpBtn",()=>jump(player));
tapButton("dashBtn",()=>dash(player));
tapButton("specialBtn",()=>specialAttack(player));

function bindAttackButton(){
  const btn=document.getElementById("attackBtn");
  let touchLocked=false;

  function press(){
    if(gamePaused)return;

    startGame();

    if(attackTouchHeld){
      return;
    }

    attackTouchHeld=true;
    lastAttackPressFrame=frameCount;

    if(trySimultaneousThrow()){
      return;
    }

    pendingAttackTimer=SKILL_CONFIG.input.throwWindow;
  }

  function release(){
    attackTouchHeld=false;

    if(!guardTouchHeld&&!keys["KeyZ"]&&!keys["KeyX"]){
      throwInputLock=false;
    }
  }

  btn.addEventListener("touchstart",e=>{
    e.preventDefault();
    touchLocked=true;
    press();
  },{passive:false});

  btn.addEventListener("touchend",e=>{
    e.preventDefault();
    release();

    setTimeout(()=>{
      touchLocked=false;
    },120);
  },{passive:false});

  btn.addEventListener("touchcancel",e=>{
    e.preventDefault();
    release();
  },{passive:false});

  btn.addEventListener("mousedown",()=>{
    if(touchLocked)return;
    press();
  });

  btn.addEventListener("mouseup",release);
  btn.addEventListener("mouseleave",release);
}

function bindGuardButton(){
  const btn=document.getElementById("guardBtn");

  function press(){
    if(gamePaused)return;

    startGame();

    if(guardTouchHeld){
      return;
    }

    guardTouchHeld=true;
    keys["KeyX"]=true;
    lastGuardPressFrame=frameCount;

    if(trySimultaneousThrow()){
      return;
    }

    pendingGuardTimer=SKILL_CONFIG.input.throwWindow;
  }

  function release(){
    guardTouchHeld=false;
    keys["KeyX"]=false;
    pendingGuardTimer=0;

    if(!attackTouchHeld&&!keys["KeyZ"]&&!keys["KeyX"]){
      throwInputLock=false;
    }
  }

  btn.addEventListener("touchstart",e=>{
    e.preventDefault();
    press();
  },{passive:false});

  btn.addEventListener("touchend",e=>{
    e.preventDefault();
    release();
  },{passive:false});

  btn.addEventListener("touchcancel",e=>{
    e.preventDefault();
    release();
  },{passive:false});

  btn.addEventListener("mousedown",press);
  btn.addEventListener("mouseup",release);
  btn.addEventListener("mouseleave",release);
}

function populateMatchSetup(){
  const playerSelect=document.getElementById("playerSelect");
  const enemySelect=document.getElementById("enemySelect");
  const levelInput=document.getElementById("enemyLevelInput");

  playerSelect.innerHTML="";
  PLAYER_ROSTER.forEach(profile=>{
    const option=document.createElement("option");
    option.value=profile.id;
    option.textContent=profile.name;
    playerSelect.appendChild(option);
  });

  enemySelect.innerHTML="";
  ENEMY_ARCHETYPES.forEach(profile=>{
    const option=document.createElement("option");
    option.value=profile.id;
    option.textContent=profile.name;
    enemySelect.appendChild(option);
  });

  playerSelect.value=selectedPlayerId;
  enemySelect.value=selectedEnemyId;
  levelInput.value=selectedStartLevel;
  updateMatchupInfo();
}

function syncMatchSetupFromUI(){
  const playerSelect=document.getElementById("playerSelect");
  const enemySelect=document.getElementById("enemySelect");
  const levelInput=document.getElementById("enemyLevelInput");
  const parsed=Math.floor(Number(levelInput.value));

  selectedPlayerId=playerSelect.value;
  selectedEnemyId=enemySelect.value;
  selectedStartLevel=clamp(Number.isFinite(parsed)?parsed:1,1,30);
  levelInput.value=selectedStartLevel;
  updateMatchupInfo();
}

function profileSpecHtml(profile,isEnemy){
  const normal=profile.normal;
  const special=profile.special;
  const stats=profile.stats||{};
  const role=isEnemy?"敵":"自分";
  const hpText=isEnemy?"HP倍率 "+valueOr(stats.hpScale,1).toFixed(2):"HP "+valueOr(stats.hp,100);
  const guardText=isEnemy?"ガード倍率 "+valueOr(stats.guardScale,1).toFixed(2):"ガード "+valueOr(stats.guard,100);
  const speedText="速さ "+valueOr(stats.speed,1).toFixed(2);
  const typeNames={laser:"レーザー",projectile:"飛び道具",speedBoost:"強化",perfectGuard:"完全ガード",rush:"突進"};
  const durationText=special.duration?Math.round(special.duration/6)/10+"秒":"";

  return '<section class="spec-block">'+
    '<div class="spec-title">'+role+'：'+profile.name+'</div>'+
    '<p class="spec-desc">'+profile.tag+'</p>'+
    '<div class="spec-row"><span class="spec-label">能力</span><span class="stat-list">'+
      '<span class="stat-chip">'+hpText+'</span>'+
      '<span class="stat-chip">'+guardText+'</span>'+
      '<span class="stat-chip">'+speedText+'</span>'+
    '</span></div>'+
    '<div class="spec-row"><span class="spec-label">通常</span><span class="stat-list">'+
      '<span class="stat-chip">威力 '+normal.damage+'</span>'+
      '<span class="stat-chip">射程 '+normal.range+'</span>'+
      '<span class="stat-chip">発生 '+normal.hitFrame+'F</span>'+
    '</span></div>'+
    '<div class="spec-row"><span class="spec-label">必殺</span><span class="stat-list">'+
      '<span class="stat-chip">'+special.name+'</span>'+
      '<span class="stat-chip">'+(typeNames[special.kind]||"打撃")+'</span>'+
      (special.damage>0?'<span class="stat-chip">威力 '+special.damage+'</span>':'<span class="stat-chip">直接ダメージなし</span>')+
      (special.damageBoost?'<span class="stat-chip">攻撃 x'+special.damageBoost.toFixed(2)+'</span>':'')+
      (special.range>0?'<span class="stat-chip">射程 '+special.range+'</span>':'')+
      (durationText?'<span class="stat-chip">持続 '+durationText+'</span>':'')+
      '<span class="stat-chip">消費 '+special.cost+'</span>'+
    '</span></div>'+
    '<p class="spec-desc special-note">必殺：'+special.desc+'</p>'+
  '</section>';
}

function updateMatchupInfo(){
  const info=document.getElementById("matchupInfo");
  if(!info)return;

  const playerProfile=getPlayerProfile();
  const enemyProfile=getEnemyProfile();
  info.innerHTML=
    '<div class="match-title">選択中の対戦</div>'+
    '<div class="match-names">'+
      '<span class="match-name">'+playerProfile.name+'</span>'+
      '<span class="versus">対</span>'+
      '<span class="match-name">'+enemyProfile.name+'</span>'+
      '<span class="match-level">レベル '+selectedStartLevel+'</span>'+
    '</div>'+
    profileSpecHtml(playerProfile,false)+
    profileSpecHtml(enemyProfile,true);
}

document.getElementById("playerSelect").addEventListener("change",()=>{
  syncMatchSetupFromUI();
});

document.getElementById("enemySelect").addEventListener("change",()=>{
  syncMatchSetupFromUI();
});

document.getElementById("enemyLevelInput").addEventListener("change",()=>{
  syncMatchSetupFromUI();
});

document.getElementById("applyMatchBtn").addEventListener("click",()=>{
  syncMatchSetupFromUI();
  resetGame();
  startGame();
});

document.getElementById("pauseBtn").addEventListener("click",()=>{
  togglePause();
});

document.getElementById("resetBtn").addEventListener("click",()=>{
  syncMatchSetupFromUI();
  resetGame();
});

populateMatchSetup();
resetGame();
displayHighScores();
loop();
</script>
